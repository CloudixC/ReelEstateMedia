<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Review</title>
<script>
(function(){
  var xs = new URLSearchParams(location.search);
  var x = xs.get('x');
  if(!x) return;
  var RESOLVER = 'https://script.google.com/macros/s/AKfycbyALH9lG_dzg13ooj1brWBifZfAWVcZ3JgtJc617PPLii4kK1igFyU4Gu41Lzwy5gGEiw/exec';
  function splash(msg){
    var f = function(){ document.body.innerHTML = '<div style="min-height:70vh;display:flex;align-items:center;justify-content:center;color:#a6a49d;font-family:-apple-system,sans-serif;text-align:center;padding:20px;font-size:15px">' + msg + '</div>'; };
    if(document.body) f(); else document.addEventListener('DOMContentLoaded', f);
  }
  splash('Loading your review…');
  fetch(RESOLVER + '?link=' + encodeURIComponent(x))
    .then(function(r){ return r.json(); })
    .then(function(j){
      if(j.ok && j.qs) location.replace(location.pathname + '?' + j.qs);
      else splash('This review link looks expired or invalid — please ask for a fresh one.');
    })
    .catch(function(){ splash('Couldn’t load the review — check your connection and refresh.'); });
})();
</script>
<style>
:root{--red:#e3222c;--bg:#0a0a0c;--panel:#161619;--line:#2c2c33;--txt:#f4f1ea;--dim:#a6a49d;--teal:#4cc38a}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,'Segoe UI',sans-serif;padding:18px 14px 80px;line-height:1.5}
.wrap{max-width:900px;margin:0 auto}
h1{font-family:Georgia,serif;font-size:23px}h1 em{color:var(--red);font-style:italic}
.sub{color:var(--dim);font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;margin:2px 0 4px;font-weight:600}
.proj{color:var(--dim);font-size:14px;margin-bottom:14px}
.vtabs{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.vtabs button{background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:4px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer}
.vtabs button.on{background:var(--red);border-color:var(--red);color:#fff}
.player{background:#000;border-radius:10px;overflow:hidden;border:1px solid var(--line)}
.player video{width:100%;display:block;max-height:72vh;background:#000}
.player iframe{width:100%;aspect-ratio:16/9;border:none;display:block;min-height:230px}
.player iframe.tall{aspect-ratio:auto;height:74vh}
.player.vertical video,.player.vertical iframe:not(.tall),.player.vertical .vprev{
  width:min(100%, calc(76vh * 9 / 16));aspect-ratio:9/16;height:auto;max-height:none;margin:0 auto;display:block}
@media(max-width:560px){
  .player iframe:not(.tall){min-height:56vh}
  .vprev{min-height:56vh}
  .player.vertical iframe:not(.tall),.player.vertical .vprev,.player.vertical video{width:min(100%, calc(72vh * 9 / 16))}
}
.bigimg{width:100%;max-height:72vh;object-fit:contain;display:block;background:#000}
.gnav{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--panel);border-top:1px solid var(--line)}
.gnav button{background:transparent;border:1px solid #6d6d77;color:var(--txt);border-radius:4px;padding:8px 16px;font-weight:700;cursor:pointer;font-size:14px}
.gnav .lbl{font-weight:700;font-size:13px}
.thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:6px;margin-top:10px}
.thumbs img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:6px;border:2px solid transparent;cursor:pointer;background:#000;display:block}
.thumbs img.on{border-color:var(--red)}
.thumbwrap{position:relative;cursor:pointer}
.thumbwrap .pb{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.9);pointer-events:none}
.thumbph{width:100%;aspect-ratio:1;border-radius:6px;background:#1b1b20;border:2px solid transparent;display:flex;align-items:center;justify-content:center;font-size:22px}
.tsec{grid-column:1/-1;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);font-weight:800;margin-top:8px}
.vprev{width:100%;aspect-ratio:16/9;border:none;display:block;max-height:72vh;background:#000}
.compose{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;margin-top:14px}
.crow{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap}
.tchip{background:var(--red);color:#fff;border:none;border-radius:4px;padding:11px 14px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap}
input,textarea{background:#1b1b20;border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:11px 12px;font-size:16px;width:100%;font-family:inherit;outline:none}
input:focus,textarea:focus{border-color:var(--red)}
.tin{width:130px;text-align:center}
textarea{flex:1;min-width:200px}
.addbtn{background:transparent;border:1px solid #6d6d77;color:var(--txt);border-radius:4px;padding:11px 18px;font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer}
.hint{color:var(--dim);font-size:12px;margin-top:8px}
.clist{margin-top:14px}
.cmt{display:flex;gap:10px;align-items:flex-start;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:11px 12px;margin-bottom:8px}
.cmt .tt{background:rgba(227,34,44,.18);color:#ff7078;border-radius:4px;padding:2px 8px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap}
.cmt .tt.na{background:rgba(76,195,138,.16);color:var(--teal);cursor:default}
.cmt .x{background:none;border:none;color:var(--dim);font-size:16px;cursor:pointer;margin-left:auto}
.actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.send{flex:1;min-width:220px;background:var(--red);color:#fff;border:none;border-radius:4px;padding:15px;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;text-align:center;text-decoration:none;cursor:pointer}
.ok{flex:1;min-width:180px;background:transparent;color:var(--teal);border:1px solid var(--teal);border-radius:4px;padding:15px;font-size:13px;font-weight:700;text-transform:uppercase;cursor:pointer}
.dl{display:none;background:rgba(76,195,138,.08);border:1px solid var(--teal);border-radius:10px;padding:16px;margin-top:14px}
.dlh{font-weight:800;color:var(--teal);margin-bottom:10px;letter-spacing:.03em}
.dlbtn{display:inline-block;background:var(--teal);color:#08130d;border:none;border-radius:4px;padding:13px 20px;font-size:13px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;text-decoration:none;margin:0 8px 8px 0;cursor:pointer}
.dlnote{font-size:12px;color:var(--dim);margin-top:2px}
#out{display:none;margin-top:12px}
.small{font-size:12px;color:var(--dim)}

.thread{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;margin-top:16px}
.thread h2{font-size:15px;margin-bottom:10px;letter-spacing:.04em}
.bubs{display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto;margin-bottom:10px}
.bub{max-width:82%;padding:9px 12px;border-radius:12px;font-size:14px;white-space:pre-wrap;line-height:1.45}
.bub .bwho{display:block;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;opacity:.65;margin-bottom:2px;font-weight:700}
.bub.them{align-self:flex-start;background:#1f1f24;border:1px solid var(--line)}
.bub.me{align-self:flex-end;background:rgba(227,34,44,.16);border:1px solid rgba(227,34,44,.4)}
.trow{display:flex;gap:8px}
.trow textarea{flex:1}
.tsend{background:var(--red);color:#fff;border:none;border-radius:4px;padding:0 18px;font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer}
.tempty{color:var(--dim);font-size:12.5px;text-align:center;padding:8px}
.bigimg{cursor:zoom-in;transition:transform .18s ease}
.bigimg.zoomed{cursor:zoom-out}
.selb{background:transparent;border:1px solid #6d6d77;color:#e8b84a;border-radius:4px;padding:8px 13px;font-weight:700;cursor:pointer;font-size:15px}
.selb.on{background:rgba(232,184,74,.18);border-color:#e8b84a}
.selcount{color:#e8b84a;font-weight:800;font-size:12.5px}
.thumbwrap.sel::after{content:'⭐';position:absolute;top:2px;right:4px;font-size:12px;text-shadow:0 1px 4px rgba(0,0,0,.95);pointer-events:none}
.thumbwrap.sel img{border-color:#e8b84a}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
.chips button{background:#1f1f24;border:1px solid var(--line);color:var(--txt);border-radius:20px;padding:7px 13px;font-size:12.5px;font-weight:600;cursor:pointer}
.chips button:active{background:rgba(227,34,44,.2);border-color:var(--red)}
.gnav{flex-wrap:wrap}
.due{margin:0 0 12px;padding:9px 13px;border-radius:8px;font-size:13px;font-weight:700;background:rgba(232,184,74,.13);border:1px solid rgba(232,184,74,.45);color:#ecc25e}
.due.urgent{background:rgba(227,34,44,.13);border-color:rgba(227,34,44,.5);color:#ff7078}
.wholine{color:var(--dim);font-size:12px;margin:-8px 0 12px}
.wholine b{color:var(--txt)}
.wholine a{color:var(--dim)}
#presov{position:fixed;inset:0;background:#000;z-index:99;display:flex;align-items:center;justify-content:center}
#presov img{max-width:100vw;max-height:100vh;object-fit:contain}
#presov .pclose{position:absolute;top:14px;right:16px;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:18px;border-radius:50%;width:40px;height:40px;cursor:pointer;z-index:2}
#presov .phint{position:absolute;bottom:16px;left:0;right:0;text-align:center;color:rgba(255,255,255,.45);font-size:12px;pointer-events:none}
#presov.paused .phint::after{content:' · paused'}
.cmpwrap{display:flex;gap:2px;background:#000}
.cmpwrap>div{flex:1;position:relative;min-width:0}
.cmpwrap img{width:100%;max-height:70vh;object-fit:contain;display:block;background:#000}
.cmpwrap .vtag{position:absolute;top:8px;left:10px;background:rgba(0,0,0,.7);color:#fff;padding:3px 9px;border-radius:4px;font-size:11px;font-weight:800;letter-spacing:.05em}
.cmpwrap .missing{display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:13px;min-height:200px}
.cmpbtn{background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:4px;padding:8px 14px;font-size:12.5px;font-weight:700;cursor:pointer}
.cmpbtn.on{background:rgba(232,184,74,.16);border-color:#e8b84a;color:#ecc25e}
</style></head><body><div class="wrap">
<h1 id="brand"></h1><div class="sub" id="subline"></div>
<div class="proj" id="proj"></div>
<div class="wholine" id="wholine"></div>
<div id="duebanner"></div>
<div class="vtabs" id="vtabs"><button class="cmpbtn" id="cmpbtn" style="display:none" onclick="cmpToggle()">⇄ Compare</button></div>
<div class="player" id="player"></div>
<div class="thumbs" id="thumbs"></div>
<div class="compose">
  <div class="crow">
    <button class="tchip" id="refbtn" style="display:none" onclick="stampNow()"></button>
    <input class="tin" id="tman" style="display:none">
    <textarea id="ctext" rows="2" placeholder="Your note — what to change, keep, or fix…"></textarea>
    <button class="addbtn" id="micbtn" style="display:none" onclick="dictate()" title="Dictate your note">🎤</button>
    <button class="addbtn" onclick="addCmt()">Add</button>
  </div>
  <div class="chips" id="chips" style="display:none">
    <button onclick="quick('❤ Love it')">❤ Love it</button>
    <button onclick="quick('✨ Brighten')">✨ Brighten</button>
    <button onclick="quick('🎨 Warmer tones')">🎨 Warmer</button>
    <button onclick="quick('🔁 Swap this one')">🔁 Swap</button>
    <button onclick="quick('🗑 Cut this')">🗑 Cut</button>
  </div>
  <div class="hint" id="chint"></div>
</div>
<div class="clist" id="clist"></div>
<div class="actions">
  <button class="ok" onclick="approve()">✓ Approve this version</button>
  <a class="send" id="sendlink" href="#">📧 Send feedback</a>
</div>

<div class="thread" id="thread" style="display:none">
  <h2>💬 Messages</h2>
  <div class="bubs" id="tmsgs"><div class="tempty">Loading…</div></div>
  <div class="trow">
    <textarea id="tmsg" rows="2" placeholder="Message us here — we'll reply right in this page…"></textarea>
    <button class="tsend" onclick="sendMsg()">Send</button>
  </div>
</div>
<div class="dl" id="dlpanel">
  <div class="dlh">✓ Approved — your finals are ready to download</div>
  <div id="dllinks"></div>
</div>
<div id="out"><textarea rows="8" id="blob" readonly></textarea><div class="hint">Copied to clipboard as backup — text it over if email didn't open.</div></div>
<div class="hint" style="margin-top:14px"><a href="#" style="color:var(--dim)" onclick="if(confirm('Clear all your comments and picks on this review?')){localStorage.removeItem(KEY);localStorage.removeItem(SKEY);location.reload();}return false;">✕ Clear my comments</a></div>

<script>
const q = new URLSearchParams(location.search);
const pin = (q.get('t') || 'pin') === 'pin';
const project = q.get('p') || 'Review';
const dname = q.get('d') || '';
const who = q.get('n') || '';
const vertical = q.get('o') === 'v';
const mboth = q.get('m') === 'both';
const gkey = q.get('k') || '';
const email = pin ? 'contenthub@rlppinnacle.ca' : 'hello@reelestatemedia.com';
const endpoint = q.get('e') || '';
const ref = q.get('r') || '';
const versions = (q.get('v') || '').split('|').filter(Boolean).map(decodeURIComponent);
const KEY = 'rem_rev_' + project + '_' + dname;
const SKEY = 'rem_sel_' + project + '_' + dname;
let sels = {};
try{ sels = JSON.parse(localStorage.getItem(SKEY) || '{}'); }catch(e){}
const SEENKEY = 'rem_seen_' + project + '_' + dname;
let seen = {};
try{ seen = JSON.parse(localStorage.getItem(SEENKEY) || '{}'); }catch(e){}
const WHOKEY = 'rem_who_' + project + '_' + dname;
let identity = localStorage.getItem(WHOKEY) || who || 'Reviewer';
let cur = Math.max(0, versions.length - 1), curImg = 0, stamped = null, vid = null, gallery = [];
let cmts = [];
try{ cmts = JSON.parse(localStorage.getItem(KEY) || '[]'); }catch(e){}

document.getElementById('brand').innerHTML = pin ? 'Content <em>Hub</em>' : 'Reel Estate <em>Media</em>';
document.getElementById('subline').textContent = (pin ? 'Royal LePage Pinnacle · ' : '') + 'Client Review';
document.getElementById('proj').textContent = project + (dname ? ' — ' + dname : '') + (who ? ' · for ' + who : '');
document.title = 'Review — ' + project;
function setWhoLine(){
  document.getElementById('wholine').innerHTML = 'Reviewing as <b>' + escT(identity) + '</b> · <a href="#" onclick="changeWho();return false;">change</a>';
}
function changeWho(){
  const v = prompt('Who\u2019s reviewing? (your first name)', identity);
  if(v && v.trim()){ identity = v.trim(); try{ localStorage.setItem(WHOKEY, identity); }catch(e){} setWhoLine(); }
}
setWhoLine();
const due = q.get('due');
if(due){
  const dd = new Date(due + 'T23:59:59');
  if(!isNaN(dd)){
    const days = Math.ceil((dd - new Date()) / 86400000);
    const el = document.createElement('div');
    el.className = 'due' + (days <= 1 ? ' urgent' : '');
    el.textContent = days < 0 ? '⏳ This review is past due — your feedback today keeps the listing on track.'
      : days === 0 ? '⏳ Approve today to stay on schedule.'
      : '⏳ Approve by ' + dd.toLocaleDateString('en-CA', {weekday:'short', month:'short', day:'numeric'}) + ' — ' + days + ' day' + (days !== 1 ? 's' : '') + ' left to keep your listing on track.';
    document.getElementById('duebanner').appendChild(el);
  }
}

function direct(u){
  if(u.includes('www.dropbox.com')) u = u.replace('www.dropbox.com','dl.dropboxusercontent.com').replace(/([?&])dl=0/,'$1raw=1');
  return u;
}
const isImg = u => /\.(jpe?g|png|webp|gif|heic|avif)(\?|#|$)/i.test(u);
function resolve(url){
  const fm = url.match(/\/drive\/(?:u\/\d+\/)?folders\/([^\/?#]+)/);
  if(fm) return {kind:'dfolder', id: fm[1], src:'https://drive.google.com/embeddedfolderview?id=' + fm[1] + '#grid'};
  const dm = url.match(/\/file\/d\/([^\/?#]+)/) || url.match(/[?&]id=([^&#]+)/);
  if(url.includes('drive.google.com') && dm) return {kind:'dfile', id: dm[1], src:'https://drive.google.com/file/d/' + dm[1] + '/preview'};
  const du = direct(url);
  if(isImg(du)) return {kind:'img', src:du};
  if(/\.(mp4|mov|m4v|webm)(\?|#|$)/i.test(du) || du.includes('dl.dropboxusercontent')) return {kind:'video', src:du};
  return {kind:'frame', src:url};
}
function fmt(s){ s = Math.floor(s); return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0'); }
function parseT(t){ const m = (t||'').trim().match(/^(\d+):(\d{1,2})$/); if(m) return +m[1]*60 + +m[2]; return null; }

function listFolder(id){
  return fetch('https://www.googleapis.com/drive/v3/files?q=' + encodeURIComponent("'" + id + "' in parents and (mimeType contains 'image/' or mimeType contains 'video/') and trashed=false") +
    '&key=' + gkey + '&fields=files(id,name,mimeType)&orderBy=name&pageSize=200')
  .then(x => x.json().then(j => { if(!x.ok) throw new Error((j.error && j.error.message) || ('HTTP ' + x.status)); return j; }))
  .then(j => (j.files || []).map(fl => {
    const isVid = (fl.mimeType || '').indexOf('video/') === 0;
    return {
      thumb: 'https://drive.google.com/thumbnail?id=' + fl.id + '&sz=w400',
      big: isVid ? 'https://drive.google.com/file/d/' + fl.id + '/preview'
                 : 'https://drive.google.com/thumbnail?id=' + fl.id + '&sz=w2400',
      name: fl.name.replace(/\.[a-z0-9]+$/i,''), isVid
    };
  }));
}

function renderTabs(){
  const el = document.getElementById('vtabs'); el.innerHTML = '';
  versions.forEach((u,i) => {
    const b = document.createElement('button');
    b.textContent = 'V' + (i+1) + (i === versions.length-1 ? ' · Latest' : '');
    if(i === cur) b.classList.add('on');
    b.onclick = () => { cur = i; curImg = 0; compareMode = false; const cb = document.getElementById('cmpbtn'); if(cb){ cb.classList.remove('on'); cb.textContent = '⇄ Compare'; } renderTabs(); renderMedia(); renderList(); };
    el.appendChild(b);
  });
}

function composer(mode, ph, hint){
  const ch = document.getElementById('chips');
  if(ch) ch.style.display = (mode === 'stamp' || mode === 'both') ? '' : 'none';
  const refbtn = document.getElementById('refbtn');
  const tman = document.getElementById('tman');
  refbtn.style.display = mode === 'stamp' || mode === 'both' ? '' : 'none';
  tman.style.display = mode === 'manual' || mode === 'both' ? '' : 'none';
  if(ph) tman.placeholder = ph;
  document.getElementById('chint').textContent = hint || '';
}

function renderMedia(){
  const p = document.getElementById('player');
  const th = document.getElementById('thumbs');
  p.className = 'player' + (vertical ? ' vertical' : '');
  th.innerHTML = ''; vid = null; gallery = []; stamped = null;
  const entry = versions[cur] || '';
  const parts = entry.split(',').map(s => s.trim()).filter(Boolean);
  if(parts.length > 1) assembleParts(parts);
  else renderSingle(parts[0] || '');
}

function renderSingle(url){
  const p = document.getElementById('player');
  const r = resolve(url);
  if(r.kind === 'video'){
    p.innerHTML = '<video controls playsinline preload="metadata" src="' + r.src.replace(/"/g,'&quot;') + '"></video>';
    vid = p.querySelector('video');
    document.getElementById('refbtn').textContent = '⏱ 0:00';
    composer('stamp', '', 'Pause where you want to comment, tap the red time button, type, Add. Tap any timestamp below to jump there.');
    const upd = () => { if(stamped === null) document.getElementById('refbtn').textContent = '⏱ ' + fmt(vid.currentTime); };
    vid.addEventListener('timeupdate', upd); vid.addEventListener('pause', upd);
  } else if(r.kind === 'img'){
    p.innerHTML = '<img class="bigimg" src="' + r.src.replace(/"/g,'&quot;') + '">';
    composer('none', '', 'Type your note and Add — it attaches to this image.');
  } else if(r.kind === 'dfolder'){
    if(gkey){
      p.innerHTML = '<div style="padding:60px 20px;text-align:center;color:var(--dim)">Loading…</div>';
      listFolder(r.id).then(items => {
        if(items.length === 0) throw new Error('no media found — is the folder shared as “Anyone with the link”?');
        buildGallery(items);
      }).catch(e => folderFallback(r, 'gallery couldn’t load: ' + e.message + '. Checklist: folder shared as “Anyone with link” · Drive API enabled · key website restriction is https://cloudixc.github.io/*'));
    } else folderFallback(r, 'this link has no gallery key. In the app, tap 🎬 Review room again after saving your Drive API key so a fresh link is generated.');
  } else if(r.kind === 'dfile'){
    p.innerHTML = '<iframe src="' + r.src + '" allow="autoplay; fullscreen" allowfullscreen></iframe>';
    composer('manual', '1:24', 'Type the time from the player (like 1:24), your note, then Add. Pause first so the time is easy to read.');
  } else {
    p.innerHTML = '<iframe src="' + r.src.replace(/"/g,'&quot;') + '" allowfullscreen></iframe>';
    composer('manual', 'time / photo ref (optional)', 'Add your notes below — include a time or photo reference so we know where to look.');
  }
}

function assembleParts(parts){
  const p = document.getElementById('player');
  p.innerHTML = '<div style="padding:60px 20px;text-align:center;color:var(--dim)">Loading…</div>';
  (async () => {
    let items = [];
    for(const part of parts){
      const r = resolve(part);
      if(r.kind === 'dfolder'){
        if(!gkey) throw new Error('folder needs the gallery key — regenerate the link from the app after saving your Drive API key');
        items = items.concat(await listFolder(r.id));
      } else if(r.kind === 'dfile'){
        let name = 'Video';

  const kh = e => {

      if(rows.length === 0){ box.innerHTML = '<div class="tempty">No messages yet — say hi, it lands directly with us.</div>'; return; }
      box.innerHTML = rows.map(m => {
        const mine = m.from !== 'jag';
        return '<div class="bub ' + (mine ? 'me' : 'them') + '"><span class="bwho">' +
          (m.from === 'jag' ? 'Reel Estate Media' : escT(m.who || 'You')) + ' · ' + (m.ts || '').slice(5, 16).replace('T', ' ') +
          '</span>' + escT(m.body || '') + '</div>';
      }).join('');
      box.scrollTop = box.scrollHeight;
    }).catch(() => {});
}
function sendMsg(){
  const t = document.getElementById('tmsg');
  const body = t.value.trim();
  if(!body || !endpoint) return;
  t.value = ''; 
  fetch(endpoint, {method:'POST', body: JSON.stringify({kind:'msg', ref, project, dname: (typeof dname !== 'undefined' ? dname : ''), who: identity, from: 'agent', body})})
    .then(() => setTimeout(loadThread, 800));
}
if(endpoint && ref){
  document.getElementById('thread').style.display = 'block';
  loadThread();
  setInterval(loadThread, 60000);
}
