<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reel Estate Media · Production Pipeline</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0c; --panel:#141417; --panel2:#1a1a1e; --ink2:#1f1f24;
    --line:#26262c; --line2:#3b3b44;
    --cream:#f4f1ea; --cream-dim:#a6a49d; --cream-faint:#79787f;
    --amber:#e3222c; --amber-soft:rgba(227,34,44,.16);
    --teal:#4cc38a; --red:#ec5f5a; --blue:#82a8d9; --violet:#a98ede;
    --radius:14px;
    --shadow:0 1px 2px rgba(0,0,0,.5), 0 10px 30px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--cream);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.5;
    background-image:radial-gradient(1100px 520px at 85% -10%, rgba(227,34,44,.09), transparent 60%);}
  h1,h2,h3,.serif{font-family:'Playfair Display',serif}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px;background:#1b1b20;border:1px solid var(--line2);color:var(--cream);
    border-radius:8px;padding:8px 10px;width:100%;outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--amber)}
  ::placeholder{color:var(--cream-faint)}

  .shell{max-width:1240px;margin:0 auto;padding:0 20px 80px}
  header.top{display:flex;align-items:center;justify-content:space-between;padding:26px 0 18px;flex-wrap:wrap;gap:14px}
  .brand h1{font-size:27px;font-weight:700;letter-spacing:.2px}
  .brand h1 em{color:var(--amber);font-style:italic}
  .brand p{color:var(--cream-faint);font-size:12px;letter-spacing:.16em;text-transform:uppercase;margin-top:2px;font-weight:600}

  nav.tabs{display:flex;gap:6px;flex-wrap:wrap}
  nav.tabs button{background:transparent;border:1px solid transparent;color:var(--cream-dim);padding:8px 15px;border-radius:2px;font-size:12.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
  nav.tabs button:hover{color:var(--cream)}
  nav.tabs button.on{background:var(--amber);border-color:var(--amber);color:#fff}

  .grid-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin:8px 0 26px}
  .stat{background:var(--panel2);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px 14px;position:relative;overflow:hidden}
  .stat .n{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;line-height:1.1}
  .stat .l{color:var(--cream-faint);font-size:11.5px;text-transform:uppercase;letter-spacing:.12em;margin-top:4px;font-weight:600}
  .stat.money .n{color:var(--cream)}

  /* ---- ☀️ light mode (auto by clock, manual via the toggle) ---- */
  body.light{--bg:#f6f4ee;--panel:#ffffff;--panel2:#faf8f2;--ink2:#efece2;--line:#e4e0d4;--line2:#c9c4b5;
    --cream:#1b1b20;--cream-dim:#565349;--cream-faint:#8f8b7e;
    --shadow:0 1px 2px rgba(20,20,20,.05), 0 10px 30px rgba(20,20,20,.08);
    background-image:radial-gradient(1100px 520px at 85% -10%, rgba(227,34,44,.05), transparent 60%)}
  body.light input,body.light select,body.light textarea{background:#fff;color:var(--cream);border-color:var(--line2)}
  body.light nav.tabs button:hover{color:var(--cream)}
  #themefab{position:fixed;left:18px;bottom:18px;z-index:900;width:46px;height:46px;border-radius:50%;border:1px solid var(--line2);background:var(--panel);color:var(--cream);font-size:19px;cursor:pointer;box-shadow:var(--shadow);display:grid;place-items:center;transition:transform .15s ease}
  #themefab:hover{transform:scale(1.08)}
  #themefab .auto{position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:800;letter-spacing:.1em;background:var(--amber);color:#fff;border-radius:8px;padding:1px 5px;display:none}
  #themefab.isauto .auto{display:block}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
  .card h3{font-size:20px;font-weight:700;margin-bottom:14px}
  .muted{color:var(--cream-dim)} .faint{color:var(--cream-faint)} .small{font-size:12.5px}
  .amber{color:var(--amber)} .teal{color:var(--teal)}

  .btn{background:var(--amber);color:#fff;border:1px solid var(--amber);border-radius:2px;padding:11px 22px;font-weight:700;
    font-size:12.5px;text-transform:uppercase;letter-spacing:.08em;box-shadow:0 2px 10px rgba(227,34,44,.3)}
  .btn:hover{filter:brightness(1.1)}
  .btn.ghost{background:transparent;color:var(--cream);border:1px solid #6d6d77;box-shadow:none}
  .btn.ghost:hover{border-color:var(--cream);color:#fff}
  .btn.sm{padding:6px 13px;font-size:11px;letter-spacing:.06em}
  .btn.danger{background:transparent;border:1px solid rgba(236,95,90,.4);color:var(--red);box-shadow:none}

  .pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700;letter-spacing:.04em}
  .pill.booked{background:rgba(166,164,157,.14);color:var(--cream-dim)}
  .pill.scheduled{background:rgba(130,168,217,.16);color:#9dbde8}
  .pill.shot{background:rgba(96,199,178,.15);color:#7fd4c1}
  .pill.editing{background:rgba(111,206,158,.15);color:#8bdcb0}
  .pill.client-review{background:rgba(232,184,74,.16);color:#ecc25e}
  .pill.changes{background:rgba(169,142,222,.16);color:var(--violet)}
  .pill.review-2{background:rgba(232,184,74,.16);color:#ecc25e}
  .pill.changes-2{background:rgba(169,142,222,.16);color:var(--violet)}
  .pill.review-3{background:rgba(232,184,74,.16);color:#ecc25e}
  .cal-cell.blockedday{background:repeating-linear-gradient(45deg, transparent, transparent 7px, rgba(227,34,44,.06) 7px, rgba(227,34,44,.06) 14px)}
  .cal-cell.blockedday .cal-d{color:var(--red);opacity:.8}
  .cbs{max-height:52vh;min-height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:12px 2px;margin-top:8px}
  .cb{max-width:82%;padding:9px 12px;border-radius:13px;font-size:14px;white-space:pre-wrap;line-height:1.45}
  .cb.them{align-self:flex-start;background:var(--panel2);border:1px solid var(--line)}
  .cb.me{align-self:flex-end;background:rgba(227,34,44,.14);border:1px solid rgba(227,34,44,.4)}
  .cb.fb{border-color:rgba(232,184,74,.5);background:rgba(232,184,74,.06);max-width:94%;align-self:flex-start}
  .cb .cwho{font-size:10.5px;opacity:.6;font-weight:800;letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:3px}
  .crow2{display:flex;gap:8px;margin-top:6px}
  .pill.delivered{background:rgba(76,195,138,.15);color:var(--teal)}
  .pill.unpaid{background:rgba(236,95,90,.15);color:var(--red)}
  .pill.invoiced{background:rgba(130,168,217,.15);color:var(--blue)}
  .pill.paid{background:rgba(76,195,138,.15);color:var(--teal)}
  .pill.partner{background:var(--amber-soft);color:#ff6b72}
  .pill.internal{background:rgba(169,142,222,.15);color:var(--violet)}
  .pill.direct{background:rgba(76,195,138,.13);color:var(--teal)}

  .progress{height:7px;background:var(--ink2);border-radius:99px;overflow:hidden;border:1px solid var(--line)}
  .progress>div{height:100%;background:linear-gradient(90deg,#a5131b,var(--amber));border-radius:99px;transition:width .4s ease}
  .progress.done>div{background:var(--teal)}

  table{width:100%;border-collapse:collapse}
  th{color:var(--cream-faint);font-size:11.5px;text-transform:uppercase;letter-spacing:.1em;text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);font-weight:700}
  td{padding:10px;border-bottom:1px solid var(--line);vertical-align:middle;font-size:14px}
  tr:last-child td{border-bottom:none}
  tr.click:hover td{background:var(--panel2);cursor:pointer}

  /* Kanban */
  .board{display:flex;gap:11px;overflow-x:auto;align-items:flex-start;padding-bottom:12px;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity}
  .board::-webkit-scrollbar{height:9px}
  .board::-webkit-scrollbar-thumb{background:var(--line2);border-radius:5px}
  .board::-webkit-scrollbar-track{background:var(--ink2);border-radius:5px}
  .col{flex:0 0 236px;background:var(--ink2);border:1px solid var(--line);border-radius:var(--radius);padding:12px;min-height:120px;scroll-snap-align:start}
  .col h4{font-size:11.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--cream-faint);margin-bottom:10px;display:flex;justify-content:space-between;font-family:'DM Sans',sans-serif;font-weight:700}
  .dcard{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin-bottom:9px;box-shadow:0 1px 3px rgba(0,0,0,.4)}
  .dcard .t{font-weight:700;font-size:13.5px;line-height:1.3}
  .dcard .m{color:var(--cream-faint);font-size:11.5px;margin-top:3px}
  .dcard .row{display:flex;justify-content:space-between;align-items:center;margin-top:8px;gap:6px}
  .arrow{background:var(--panel2);border:1px solid var(--line2);color:var(--cream-dim);border-radius:2px;padding:2px 9px;font-size:13px}
  .arrow:hover{color:var(--amber);border-color:var(--amber)}
  .arrow:disabled{opacity:.3;cursor:default}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.66);backdrop-filter:blur(4px);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:50;overflow-y:auto}
  .modal{background:var(--panel);border:1px solid var(--line2);border-radius:16px;padding:26px;width:100%;max-width:640px;box-shadow:0 24px 60px rgba(0,0,0,.6)}
  .modal h2{font-size:24px;margin-bottom:18px;font-weight:700}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
  .frow.one{grid-template-columns:1fr}
  label.f{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--cream-faint);margin-bottom:5px;font-weight:700}
  .lineitem{display:grid;grid-template-columns:1fr 64px 92px 30px;gap:8px;align-items:center;margin-bottom:8px}
  .totalbar{border-top:1px solid var(--line);margin-top:14px;padding-top:12px;font-size:14px}
  .totalbar .row{display:flex;justify-content:space-between;padding:2px 0}
  .totalbar .grand{font-family:'Playfair Display',serif;font-size:21px;color:var(--cream);font-weight:700}
  .modalfoot{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
  .x{background:none;border:none;color:var(--cream-faint);font-size:18px;line-height:1}
  .x:hover{color:var(--red)}

  .orderhead{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap}
  .titleedit{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;border:1px solid transparent;background:transparent;
    padding:2px 8px;margin-left:-8px;border-radius:8px;width:100%;min-height:0;color:var(--cream)}
  .titleedit:hover{border-color:var(--line)}
  .titleedit:focus{border-color:var(--amber);background:var(--panel2)}
  .backlink{background:none;border:none;color:var(--amber);font-size:13.5px;padding:0;margin-bottom:14px;font-weight:600}
  .dl-row{display:grid;grid-template-columns:1.4fr 130px 130px 1.2fr;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid var(--line)}
  .dl-row:last-child{border-bottom:none}
  .brief{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:14px;margin:2px 0 12px}
  .bgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  @media(max-width:760px){.bgrid{grid-template-columns:1fr}}
  /* Calendar */
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cal-w{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--cream-faint);font-weight:700;padding:4px 6px}
  .cal-cell{background:var(--panel);border:1px solid var(--line);border-radius:10px;min-height:96px;padding:6px;box-shadow:var(--shadow)}
  .cal-cell.dim{opacity:.45;background:var(--panel2)}
  .cal-cell.today{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber), var(--shadow)}
  .cal-d{font-size:12px;font-weight:700;color:var(--cream-dim);margin-bottom:4px}
  .cal-cell.today .cal-d{color:var(--amber)}
  .chip{display:block;font-size:10.5px;font-weight:600;border-radius:6px;padding:2px 6px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .chip.shoot{background:rgba(227,34,44,.18);color:#ff7078}
  .chip.due{background:rgba(76,195,138,.15);color:var(--teal)}
  .chip.late{background:rgba(236,95,90,.2);color:var(--red)}
  .flex .chip{display:inline-block;margin-bottom:0}
  @media(max-width:760px){.cal{gap:3px}.cal-cell{min-height:64px;padding:4px}.chip{font-size:9px;padding:1px 4px}}
  .ccards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
  .ccard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
  .crows{margin-top:10px;font-size:13.5px;display:flex;flex-direction:column;gap:5px}
  .crows a{color:var(--cream);text-decoration:none;border-bottom:1px dotted var(--line2)}
  .crows a:hover{color:var(--amber);border-color:var(--amber)}
  .cstats{margin-top:10px;border-top:1px solid var(--line);padding-top:8px}
  .lockwrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);
    background-image:radial-gradient(900px 480px at 70% -10%, rgba(227,34,44,.1), transparent 60%);padding:20px}
  .lockbox{width:100%;max-width:380px;text-align:center;background:var(--panel);border:1px solid var(--line2);border-radius:14px;padding:36px 30px;box-shadow:0 30px 80px rgba(0,0,0,.6)}
  .locksub{color:var(--cream-faint);font-size:11px;letter-spacing:.16em;text-transform:uppercase;margin-top:4px;font-weight:600}
  .shootmode{position:fixed;inset:0;background:var(--bg);z-index:70;overflow-y:auto;padding:18px 16px 60px}
  .sm-inner{max-width:720px;margin:0 auto}
  .sm-clock{font-size:32px;font-weight:700;margin:10px 0 4px}
  .shotrow{display:flex;gap:14px;align-items:center;padding:12px 4px;border-bottom:1px solid var(--line);font-size:16px;cursor:pointer}
  .shotrow input{width:22px;height:22px;min-height:0;flex:0 0 auto;accent-color:var(--amber)}
  .sm-gear{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-top:12px}
  .stars{display:inline-flex;font-size:20px;line-height:1}
  .star{background:none;border:none;color:var(--line2);cursor:pointer;padding:0 1px;font-size:inherit;transition:color .1s}
  .star.on{color:#ef9f27}
  .star:hover{color:#ba7517}
  .star:disabled{cursor:default}
  .mp{display:inline-flex;gap:4px;align-items:center}
  .mp select{width:auto;min-height:0;padding:4px 6px;font-size:13px;border-radius:7px;font-weight:600}
  .mp.compact select{font-size:11.5px;padding:2px 4px}
  .mp .arrow{padding:1px 7px}
  .catgroup{margin-bottom:22px}
  .catgroup h4{font-size:11.5px;text-transform:uppercase;letter-spacing:.14em;color:var(--amber);margin-bottom:8px;font-family:'DM Sans',sans-serif;font-weight:700}
  .empty{color:var(--cream-faint);text-align:center;padding:30px 10px;font-size:14px}
  .empty .btn{margin-top:12px}
  .flex{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .spacer{flex:1}
  .wxstrip{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
  .wxchip{background:var(--ink2);border:1px solid var(--line);border-radius:999px;padding:5px 13px;font-size:12.5px}
  .wxchip.clickable{cursor:pointer}
  .wxgrid{display:flex;flex-direction:column;gap:12px;margin-bottom:14px}
  .wxcard{position:relative;border-radius:16px;overflow:hidden;color:#fff;
    background:linear-gradient(180deg,#5286c7 0%,#7fadde 62%,#9cc2ea 100%);
    box-shadow:0 10px 28px rgba(61,110,170,.28)}
  .wxcard.night{background:linear-gradient(180deg,#1b2a45 0%,#31446b 65%,#3e5480 100%);box-shadow:0 10px 28px rgba(20,32,58,.35)}
  .wxhero{padding:30px 26px 20px;display:flex;justify-content:space-between;align-items:flex-end;gap:14px;min-height:118px}
  .wxloc{font-size:13px;letter-spacing:.2em;text-transform:uppercase;opacity:.92;font-weight:600}
  .wxtemp{font-size:56px;font-weight:300;line-height:1.02;margin-top:2px;font-family:'DM Sans',sans-serif;letter-spacing:-1px}
  .wxcond{font-size:15px;font-weight:500;opacity:.95}
  .wxtravel{font-size:12.5px;margin-top:9px;opacity:.95;font-weight:600}
  .wxtravel a{color:#fff;text-decoration:underline;text-underline-offset:2px}
  .wxsun{font-size:11.5px;opacity:.92;margin-top:6px;font-weight:600}
  .wxsrc{font-size:11px;opacity:.8;margin-top:5px}
  .wxlink{background:none;border:none;color:#fff;text-decoration:underline;text-underline-offset:2px;font-size:11px;padding:0;cursor:pointer}
  .wxshootline{padding:8px 20px;font-size:12.5px;font-weight:600;background:rgba(215,33,42,.22);border-top:1px solid rgba(255,255,255,.14);display:flex;flex-wrap:wrap;gap:6px 18px}
  .wxhours{display:flex;overflow-x:auto;background:rgba(28,56,94,.2);border-top:1px solid rgba(255,255,255,.14);-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .wxhours::-webkit-scrollbar{display:none}
  .wxhr{min-width:60px;flex:0 0 auto;padding:9px 4px 10px;text-align:center;border-left:1px solid rgba(255,255,255,.1);font-size:11px}
  .wxhr:first-child{border-left:none}
  .wxhr.shoot{background:rgba(215,33,42,.34);box-shadow:inset 0 3px 0 rgba(255,255,255,.55)}
  .wxhr .ht{opacity:.85;font-weight:600}
  .wxhr .hicon{font-size:15px;margin:2px 0}
  .wxhr .hv{font-weight:700;font-size:13px}
  .wxhr .hp{opacity:.8;font-size:10px}
  .wxdays{display:grid;grid-template-columns:repeat(5,1fr);background:rgba(28,56,94,.32)}
  .wxcard.night .wxdays{background:rgba(10,18,34,.4)}
  .wxday{padding:14px 6px 15px;text-align:center;border-left:1px solid rgba(255,255,255,.16)}
  .wxday:first-child{border-left:none}
  .wxday .wd{font-size:13.5px;opacity:.9}
  .wxday .wh{font-size:19px;font-weight:700;margin:5px 0 4px}
  .wxday .wp{font-size:12px;opacity:.85}
  @media(max-width:760px){
    .wxtemp{font-size:42px}
    .wxhero{padding:20px 16px 14px;min-height:92px}
    .wxday{padding:10px 3px 11px}
    .wxday .wd{font-size:10.5px}
    .wxday .wh{font-size:15px}
    .wxday .wp{font-size:10px}
  }
  .nextup{background:linear-gradient(135deg,#1c1c22,#232329);color:#fff;border:1px solid var(--line2);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:14px;
    justify-content:space-between;flex-wrap:wrap;margin-bottom:14px;cursor:pointer}
  .nextup:hover{background:#22242a}
  .nextup .l{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--amber);font-weight:700;margin-bottom:2px}
  .nextup strong{font-size:16px}
  .nextup .small{color:#9a9ca3;margin-top:2px}
  .cdclock{font-size:27px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;white-space:nowrap}
  .cdclock em{color:var(--amber);font-style:normal;font-size:16px;margin-right:2px}
  @media(max-width:760px){.cdclock{font-size:21px}.nextup{padding:12px 14px}}
  .card.today{border-left:5px solid var(--amber);box-shadow:0 4px 10px rgba(0,0,0,.4), 0 18px 44px rgba(0,0,0,.5)}
  .card.today > .flex h3, .card.today h3{font-size:23px}
  .card.today .trow{padding:13px 0}
  .trow{padding:10px 0;border-bottom:1px solid var(--line)}
  .trow:last-child{border-bottom:none}
  td,.stat .n,.totalbar,.num{font-variant-numeric:tabular-nums}
  .num{font-weight:600}
  .trow.click{cursor:pointer;border-radius:8px;margin:0 -6px;padding-left:6px;padding-right:26px;position:relative}

/* Media type: photo / video / both. Explicit field wins; otherwise inferred from the service name. */
function inferMedia(txt){
  const t = (txt || '').toLowerCase();
  const v = /reel|video|film|tour|b-roll|drone|cut|walkthrough|recap/.test(t);
  const p = /photo|headshot|staging|sheet|floor plan/.test(t);
  if(v && p) return 'both';
  if(p) return 'photo';
  return 'video';
}
const mediaOf = d => d.mediaType || inferMedia((d.name || '') + ' ' + (d.group || ''));
const MEDIA_LABEL = {photo:'📷 Photo', video:'🎬 Video', both:'📷+🎬 Photo & Video'};
/* Video-type items (video or both) need script/song/orientation and get the 5-business-day window */
const isVideoDl = d => mediaOf(d) !== 'photo';
const getBrief = d => {
  const base = {...DEFAULT_BRIEF};
  if(!isVideoDl(d)) base.script = 'N/A';
  return {...base, ...(d.brief || {})};
};
/* Prep readiness for video deliverables: script settled, song picked, orientation known */
function prepScore(d){
  if(!isVideoDl(d)) return null;
  const b = getBrief(d);
  const checks = [b.script === 'Approved' || b.script === 'N/A', !!b.song, !!b.orientation];
  return {done: checks.filter(Boolean).length, total: 3};
}

const svc = id => CATALOG.find(s => s.id === id);

const LS_KEY = 'rem_pipeline_v1';
/* Client tiers:
   partner  = agent booking via Pinnacle Command Centre → bills REM rate, Pinnacle earns the retail spread
   internal = house work for Pinnacle itself → bills REM rate, NO margin (nobody pays retail)
   direct   = REM's own client → bills retail rate */
const TIER_LABEL = {partner:'Agent · via Pinnacle', internal:'Pinnacle Internal', direct:'Direct · retail', unlimited:'Unlimited Plan · monthly'};
const rateFor = (tier, s) => tier === 'unlimited' ? 0 : tier === 'direct' ? s.retail : s.partner;
/* Each bookable service's Calendly event — powers the hub's deep-linked Book buttons */
const CAL_EVENT_SLUG = {

const seed = {
  clients: [{id:'pinnacle', name:'Pinnacle (Internal)', tier:'internal', company:'Pinnacle', contact:'Command Centre', notes:'House work for the brokerage itself — no margin'}],
  orders: [], deliverables: [], pendingBookings: [], importedIds: [], activity: [], expenses: [], subsHandled: [], blockedDays: [],
  settings: {pinnacleGoal: 1000, emailMap: {}, eventMap: {}, reviewLink: '', briefFormUrl: '', calendlyToken: '', calendlyUser: '', reviewPageUrl: '', driveApiKey: '', inboxUrl: '', inboxToken: ''}
};
function migrate(d){
  if(d && d.clients){
    if(!d.settings) d.settings = {pinnacleGoal:1000};
    if(!d.settings.emailMap) d.settings.emailMap = {};
    if(!d.settings.eventMap) d.settings.eventMap = {};
    if(d.settings.briefFormUrl === 'https://cloudixc.github.io/brief-form.html')
      d.settings.briefFormUrl = 'https://cloudixc.github.io/ReelEstateMedia/brief-form.html';
    if(!d.pendingBookings) d.pendingBookings = [];
    if(!d.importedIds) d.importedIds = [];
    if(!d.activity) d.activity = [];
    if(!d.expenses) d.expenses = [];
    if(!d.subsHandled) d.subsHandled = [];
    if(!d.blockedDays) d.blockedDays = [];
    if(d.deliverables) d.deliverables = d.deliverables.map(x =>
      (x.status === 'Client Review' && !x.reviewDate) ? {...x, reviewDate: today()} : x);
    if(d.deliverables && d.orders){
      const orderDate = {}; d.orders.forEach(o => { orderDate[o.id] = o.date; });
      d.deliverables = d.deliverables.map(x => (x.status === 'Delivered' && !x.deliveredDate)
        ? {...x, deliveredDate: x.shootDate || orderDate[x.orderId] || today()} : x);
    }
    d.clients = d.clients.map(c => {
      const c2 = {...c};
      if(c2.company === undefined) c2.company = (c2.tier === 'partner' || c2.tier === 'internal') ? 'Pinnacle' : '';
      if(c2.id === 'pinnacle' && c2.tier === 'partner'){ c2.tier = 'internal'; if(c2.name === 'Pinnacle') c2.name = 'Pinnacle (Internal)'; }
      return c2;
    });
    return d;
  }
  return null;
}
function load(){ try{
  return migrate(JSON.parse(localStorage.getItem(LS_KEY))) || seed;
} catch(e){ return seed; } }
const isoToDate = iso => { try{ return new Date(iso).toLocaleDateString('en-CA'); } catch(e){ return today(); } };
const isoToNice = iso => { try{ return new Date(iso).toLocaleString('en-CA', {month:'short', day:'numeric', hour:'numeric', minute:'2-digit'}); } catch(e){ return iso; } };

/* Delivery promise: reels/video = 5 business days after shoot (3–5 promised), photos & everything else = 72 hours */
const addDays = (ds, n) => { const d = new Date(ds + 'T12:00:00'); d.setDate(d.getDate() + n); return d.toLocaleDateString('en-CA'); };
const addBusinessDays = (ds, n) => {
  const d = new Date(ds + 'T12:00:00'); let left = n;
  while(left > 0){ d.setDate(d.getDate() + 1); const w = d.getDay(); if(w !== 0 && w !== 6) left--; }
  return d.toLocaleDateString('en-CA');
};
/* Delivery promise: photos due 3 days after shoot, video due 5 days after shoot.
   'Both' deliverables carry TWO deadlines — photos at 3 days, video at 5. */
function dueDatesOf(d){
  if(!d.shootDate) return [];
  const m = mediaOf(d);
  if(m === 'photo') return [{date: addDays(d.shootDate, 3), kind: 'photo'}];
  if(m === 'video') return [{date: addDays(d.shootDate, 5), kind: 'video'}];
  return [{date: addDays(d.shootDate, 3), kind: 'photo'}, {date: addDays(d.shootDate, 5), kind: 'video'}];
}
const dueDateOf = d => { const a = dueDatesOf(d); return a.length ? a[a.length - 1].date : null; };
const promiseMet = d => d.status === 'Delivered' || !!d.reviewDate;
const isOverdue = d => { const due = dueDateOf(d); return due && !promiseMet(d) && due < today(); };
const isoToTime = iso => { try{ const dt = new Date(iso); return String(dt.getHours()).padStart(2,'0') + ':' + String(dt.getMinutes()).padStart(2,'0'); } catch(e){ return ''; } };
const fmtTime = t => { try{ return new Date('2000-01-01T' + t).toLocaleTimeString('en-CA', {hour:'numeric', minute:'2-digit'}); } catch(e){ return t; } };
const timeRange = d => d.shootTime ? fmtTime(d.shootTime) + (d.shootEnd ? ' – ' + fmtTime(d.shootEnd) : '') : '';
/* Live countdown: before the shoot -> time until shoot; after -> time until delivery promise */
function countdownFor(d){
  if(d.status === 'Delivered') return null;
  if(d.reviewDate) return {label: '👀 with client — promise met', tone: 'delivered'};
  const now = new Date();
  if(!d.shootDate) return null;
  const sd = new Date(d.shootDate + 'T' + (d.shootTime || '12:00'));
  if((d.status === 'Booked' || d.status === 'Scheduled') && sd > now){
    const h = Math.round((sd - now) / 3600000);
    return {label: h <= 48 ? `🎬 shoot in ${h}h` : `🎬 shoot in ${Math.round(h/24)}d`, tone: h <= 24 ? 'client-review' : 'scheduled'};
  }
  const due = dueDateOf(d);
  if(!due) return null;
  const dd = new Date(due + 'T17:00');
  const h = Math.round((dd - now) / 3600000);
  if(h < 0) return {label: `⏱ ${Math.max(1, Math.ceil(-h/24))}d late`, tone: 'unpaid'};
  return {label: h <= 48 ? `⏱ ${h}h to deliver` : `⏱ ${Math.round(h/24)}d to deliver`, tone: h <= 24 ? 'client-review' : 'delivered'};
}
const daysSince = ds => Math.max(0, Math.floor((Date.now() - new Date(ds + 'T12:00:00').getTime()) / 86400000));
const copyText = async (t) => {
  try { await navigator.clipboard.writeText(t); }
  catch(e){ const ta = document.createElement('textarea'); ta.value = t; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); }
};
function reviewMsg(d, o, c){
  const first = ((c && c.name) || 'there').split(' ')[0];

}

  const first = ((c && c.name) || 'there').split(' ')[0];
  const b = getBrief(d);
  const bits = [];
  if(b.orientation) bits.push(b.orientation.toLowerCase() + ' format');

  const dl2 = mediaOf(d) === 'both' && (d.linkVideo || '').trim();
  return `Hi ${first} — your ${d.group}${ttl ? ` (\u201C${ttl}\u201D)` : ''}${o && o.project ? ` for ${o.project}` : ''} is ready${dl2 ? `!\n\uD83D\uDCF7 Photos: ${d.link}\n\uD83C\uDFAC Video: ${d.linkVideo}` : (d.link ? ': ' + d.link : '!')}` +
    (bits.length ? `\n(${bits.join(', ')})` : '') +
    `\n\nLet me know if you'd like any tweaks — happy to adjust.\n\n— Reel Estate Media`;
}
function paymentReminderMsg(o, c){
  const first = ((c && c.name) || 'there').split(' ')[0];

}
function nextBirthday(b){
  if(!b) return null;
  const parts = b.split('-').map(Number);
  const m = parts.length === 3 ? parts[1] : parts[0], d = parts.length === 3 ? parts[2] : parts[1];
  if(!m || !d) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  let nb = new Date(now.getFullYear(), m - 1, d);
  if(nb < now) nb = new Date(now.getFullYear() + 1, m - 1, d);
  return {date: nb, days: Math.round((nb - now) / 86400000)};
}
const birthdayMsg = c => `Happy birthday, ${(c.name || '').split(' ')[0]}! \uD83C\uDF89 Hope you have an amazing day — wishing you a fantastic year ahead.\n\n— Reel Estate Media`;

function MonthPicker({value, onChange, compact}){
  const y = +value.slice(0,4), m = +value.slice(5,7);
  const nowY = new Date().getFullYear();
  const years = []; for(let i = nowY + 1; i >= 2024; i--) years.push(i);
  if(!years.includes(y)) years.push(y);
  const set = (yy, mm) => onChange(yy + '-' + String(mm).padStart(2,'0'));
  const shift = n => { const d = new Date(y, m - 1 + n, 1); set(d.getFullYear(), d.getMonth() + 1); };
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return (
    <span className={'mp' + (compact ? ' compact' : '')} onClick={e => e.stopPropagation()}>
      <button className="arrow" onClick={() => shift(-1)} title="Previous month">‹</button>
      <select value={m} onChange={e => set(y, +e.target.value)}>
        {MONTHS.map((mo,i) => <option key={mo} value={i+1}>{mo}</option>)}
      </select>
      <select value={y} onChange={e => set(+e.target.value, m)}>
        {years.sort((a,b) => b - a).map(yy => <option key={yy} value={yy}>{yy}</option>)}
      </select>
      <button className="arrow" onClick={() => shift(1)} title="Next month">›</button>
    </span>);
}

const SHOTS_PHOTO = ['Front exterior wide','Front exterior angle','Entry / foyer','Living room wide','Kitchen wide','Kitchen detail','Dining','Primary bedroom','Primary ensuite','Secondary bedrooms','Main bath','Basement / rec room','Backyard','Street context'];
const SHOTS_WALKTHROUGH = ['Exterior establishing','Entry push-in','Living room sweep','Kitchen feature move','Primary suite','Bath detail','Backyard reveal','Neighbourhood b-roll','Drone orbit (if incl.)'];
const SHOTS_REEL = ['Hook take','Main body takes','Alt angle / b-roll','CTA close','Safety take'];
const SHOTS_EVENT = ['Venue establishing','Speaker / host coverage','Crowd reactions','Key moments','Detail shots','Group photo','Closing shot'];
const SHOTS_HEADSHOT = ['Lighting test','Standard headshot','3/4 crop','Full body','Casual variant'];

function templateFor(d){
  const t = ((d.name || '') + ' ' + (d.group || '')).toLowerCase();
  if(/headshot/.test(t)) return SHOTS_HEADSHOT;

/* Pinnacle margin = retail (what Pinnacle charges the client) − partner (what they pay REM), per item.
   Only counts for partner-tier clients. Falls back to catalog retail if not snapshotted on the item. */
const itemRetail = i => i.retail !== undefined ? i.retail : ((svc(i.serviceId) || {}).retail || 0);
function monthStats(db, ym){
  const tierOf = cid => (db.clients.find(c => c.id === cid) || {}).tier || 'partner';
  const os = db.orders.filter(o => o.date && o.date.slice(0,7) === ym);
  const rev = os.reduce((a,o) => a + orderTotals(o).sub, 0);
  const costs = (db.expenses || []).filter(e => e.date && e.date.slice(0,7) === ym).reduce((a,e) => a + (+e.amount || 0), 0);
  const margin = os.reduce((a,o) => a + orderMargin(o, tierOf(o.clientId)), 0);
  const clients = new Set(os.map(o => o.clientId)).size;
  const services = os.reduce((a,o) => a + o.items.reduce((x,i) => x + (i.qty || 1), 0), 0);
  const delivered = db.deliverables.filter(d => d.deliveredDate && d.deliveredDate.slice(0,7) === ym).length;
  return {orders: os.length, rev, costs, net: rev - costs, margin, clients, services, delivered};
}
function orderMargin(o, tier){
  if(tier !== 'partner') return 0;
  const spread = o.items.reduce((a,i) => a + Math.max(0, itemRetail(i) - i.price) * i.qty, 0);
  return spread * (o.hst ? 1 + HST : 1); // Pinnacle retains the HST on the spread too
}

function inferOrient(txt){
  const t = (txt || '').toLowerCase();
  if(t.includes('vertical')) return 'Vertical';
  if(t.includes('horizontal')) return 'Horizontal';
  if(t.includes('reel') || t.includes('podcast') || t.includes('teleprompter')) return 'Vertical';
  return '';
}
function newBrief(name, group){
  const d = {name, group};
  const b = {...DEFAULT_BRIEF};
  if(!isVideoDl(d)) b.script = 'N/A';
  b.orientation = isVideoDl(d) ? inferOrient(name + ' ' + group) : '';
  return b;
}
function spawnDeliverables(order){
  const out = [];
  order.items.forEach(item => {
    const s = svc(item.serviceId);
    for(let q=0; q<item.qty; q++){
      const qTag = item.qty > 1 ? ` (#${q+1})` : '';
      if(s && s.components){
        s.components.forEach(c => out.push({id:uid(), orderId:order.id, name:`${c}${qTag}`, group:s.name, status:'Booked', shootDate:'', link:'', notes:'', mediaType: inferMedia(c + ' ' + s.name), brief:newBrief(c, s.name)}));
      } else if(s && s.credits > 1){
        for(let i=1; i<=s.credits; i++) out.push({id:uid(), orderId:order.id, name:`${s.unit} ${i} of ${s.credits}${qTag}`, group:s.name, status:'Booked', shootDate:'', link:'', notes:'', mediaType: inferMedia(s.unit + ' ' + s.name), brief:newBrief(s.unit, s.name)});
      } else {
        out.push({id:uid(), orderId:order.id, name:`${s ? s.unit : item.name}${qTag}`, group:s ? s.name : item.name, status:'Booked', shootDate:'', link:'', notes:'', mediaType: inferMedia((s ? s.unit : item.name) + ' ' + (s ? s.name : item.name)), brief:newBrief(s ? s.unit : item.name, s ? s.name : item.name)});
      }
    }
  });
  return out;
}

function orderTotals(o){
  const sub = o.items.reduce((a,i) => a + i.price * i.qty, 0);
  const tax = o.hst ? sub * HST : 0;
  return {sub, tax, total: sub + tax};
}

const LOCK_KEY = 'rem_lock_v1';
async function hashText(t){
  try {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode('rem\u00B7' + t));
    return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('');
  } catch(e){
    let h = 5381; const s = 'rem\u00B7' + t;
    for(let i = 0; i < s.length; i++) h = ((h << 5) + h + s.charCodeAt(i)) >>> 0;
    return 'djb2:' + h.toString(16);
  }
}

            <button className="btn ghost sm" onClick={load}>⟳ Refresh list</button>
          </div>
          <label className="f" style={{marginTop:16}}>Restore points</label>
          {items === null ? <p className="small faint">Loading…</p> :
           items.length === 0 ? <p className="small faint">No cloud backups yet — tap "Back up now" for your first.</p> :
           items.map(it => (
            <div key={it.id + it.ts} className="flex" style={{gap:8, padding:'7px 0', borderBottom:'1px solid var(--line)'}}>
              <span className="small" style={{flex:1}}>{fmtTs(it.ts)}
                <span className="faint"> · {(it.meta && it.meta.c) || 0} clients · {(it.meta && it.meta.o) || 0} orders · {Math.round(((it.meta && it.meta.b) || 0) / 1024)} KB</span></span>
              <button className="btn ghost sm" disabled={busy} onClick={async () => {
                if(!confirm('Replace everything in this Command Centre with the backup from ' + fmtTs(it.ts) + '?\n\nA fresh backup of the current state is taken first, so you can always come back.')) return;
                setBusy(true); setErr('');
                try{
                  await doBackup(true);   // safety net: snapshot current state before replacing it
                  const j = await fetch(db.settings.inboxUrl + '?token=' + encodeURIComponent(db.settings.inboxToken) + '&ccrestore=' + encodeURIComponent(it.id)).then(r => r.json());
                  if(!j.ok || !j.data) throw new Error(j.error || 'restore failed');
                  adoptRemote({data: JSON.parse(j.data), updated_at: it.ts});
                  onClose();
                }catch(e){ setErr(String(e.message || e)); }
                setBusy(false);
              }}>⬇ Restore</button>
            </div>))}
          {err && <p className="small" style={{color:'var(--red)', marginTop:10}}>{err}</p>}
        </>}
      </div>
    </div>);
}

const APP_VERSION = 'v2026.07.10.1';
const LOCK_HASH = '3d0fbc04f8f9a435aeed3161cb0da5c451bd2e3e6dced84318595db174d82ab2';
function LockScreen({onUnlock}){
  const [cur, setCur] = useState('');
  const [err, setErr] = useState('');
  const submit = async () => {
    setErr('');
    if(await hashText(cur) === LOCK_HASH){ sessionStorage.setItem('rem_unlocked', '1'); onUnlock(); }
    else { setErr('Wrong passcode.'); setCur(''); }
  };
  return (
  <div className="lockwrap">
    <div className="lockbox">
      <h1 className="serif" style={{fontSize:30}}>Reel Estate <em style={{color:'var(--amber)', fontStyle:'italic'}}>Media</em></h1>
      <div className="locksub">Production Pipeline · Pinnacle Command Centre</div>
      <input autoFocus type="password" inputMode="numeric" placeholder="Passcode" value={cur}
        onChange={e => setCur(e.target.value)} onKeyDown={e => { if(e.key === 'Enter') submit(); }} style={{marginTop:18}}/>
      {err && <div className="small" style={{color:'var(--red)', marginTop:8, fontWeight:700}}>{err}</div>}
      <button className="btn" style={{width:'100%', marginTop:16}} onClick={submit}>Unlock</button>
      <div className="small faint" style={{marginTop:16, lineHeight:1.5}}>Team passcode — the same one works on every device.</div>

}

/* ---------------- App ---------------- */
function App(){
  const [locked, setLocked] = useState(() => sessionStorage.getItem('rem_unlocked') !== '1');
  const [db, setDb] = useState(load);
  const [view, setView] = useState('dashboard');
  const [openOrder, setOpenOrder] = useState(null);
  const [showNewOrder, setShowNewOrder] = useState(false);
  const [showNewClient, setShowNewClient] = useState(false);

  const orderDeliverables = oid => db.deliverables.filter(d => d.orderId === oid);
  const orderProgress = oid => {
    const ds = orderDeliverables(oid);
    const done = ds.filter(d => d.status === 'Delivered').length;
    return {done, total: ds.length, pct: ds.length ? Math.round(done/ds.length*100) : 0};
  };

  const [, setTick] = useState(0);
  useEffect(() => { const t = setInterval(() => setTick(x => x + 1), 60000); return () => clearInterval(t); }, []);
  const toastTimer = React.useRef(null);
  const [toast, setToast] = useState(null);
  const showToast = (text, actions = []) => {
    setToast({text, actions});
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 7000);
  };
  window.showToast = showToast;   // reachable from standalone components (brief editor script sync)
  const logActivity = (text) => setDb(p => ({...p, activity: [{t: Date.now(), text}, ...(p.activity || [])].slice(0, 1000)}));

  const addOrder = (order) => {
    const ds = spawnDeliverables(order);
    setDb(p => ({...p, orders:[order, ...p.orders], deliverables:[...p.deliverables, ...ds]}));
    setShowNewOrder(false); setOpenOrder(order.id); setView('orders');
    logActivity(`Booked: ${order.project || 'new order'} · ${ds.length} deliverable${ds.length !== 1 ? 's' : ''}`);
  };
  const addClient = (c) => { setDb(p => ({...p, clients:[...p.clients, c]})); setShowNewClient(false); logActivity(`Added client: ${c.name}`); };
  const splitDeliverable = (id) => {
    const d = db.deliverables.find(x => x.id === id);
    if(!d || mediaOf(d) !== 'both') return;
    const b = getBrief(d);
    const mk = (kind, suffix) => ({...d, id: uid(), mediaType: kind, name: d.name + ' — ' + suffix,
      brief: b.topic ? {...b, topic: b.topic + ' — ' + suffix} : {...b}, deliveredDate: d.deliveredDate || ''});
    const photo = mk('photo', 'Photos');
    const video = mk('video', 'Video');
    const origIdx = db.deliverables.findIndex(x => x.id === id);
    setDb(p => {
      const i = p.deliverables.findIndex(x => x.id === id);
      if(i === -1) return p;
      const arr = [...p.deliverables];
      arr.splice(i, 1, photo, video);
      return {...p, deliverables: arr};
    });
    logActivity(`⑂ Split ${dlTitle(d)} into Photos + Video`);
    showToast('Split into Photos + Video — each now has its own status & clock', [{label: 'Undo',
      fn: () => setDb(p => { const arr = p.deliverables.filter(x => x.id !== photo.id && x.id !== video.id); arr.splice(Math.min(origIdx, arr.length), 0, d); return {...p, deliverables: arr}; })}]);
  };

  const deleteClient = (id) => {
    const c = db.clients.find(x => x.id === id); if(!c) return;
    const os = db.orders.filter(o => o.clientId === id);
    const msg = os.length
      ? `Delete ${c.name}? Their ${os.length} order${os.length !== 1 ? 's' : ''} will stay but show no client until reassigned. This can be undone from the toast.`
      : `Delete ${c.name}?`;
    if(!confirm(msg)) return;
    setDb(p => ({...p, clients: p.clients.filter(x => x.id !== id)}));
    setEditingClient(null);
    logActivity(`Deleted client: ${c.name}`);
    showToast(`Deleted ${c.name}`, [{label: 'Undo', fn: () => setDb(p => ({...p, clients: [c, ...p.clients]}))}]);
  };

  const [staleVersion, setStaleVersion] = useState(false);
  const [cloud, setCloud] = useState(() => ({status: 'idle', last: bakMeta().t ? fmtClock(bakMeta().t) : null}));
  const [showCloud, setShowCloud] = useState(false);
  const cloudSkip = React.useRef(false);
  const bakBusy = React.useRef(false);
  // ⛅ full snapshot → private JSON in your Drive (kind:'file' priv) + a tiny
  // token-gated pointer row (kind:'ccbak') so the restore list can find it.
  const doBackup = async (manual) => {
    const inboxUrl = db.settings.inboxUrl, inboxToken = db.settings.inboxToken;
    if(!inboxUrl || !inboxToken || bakBusy.current) return false;
    const json = JSON.stringify(db);
    let h = 5381;
    for(let i = 0; i < json.length; i++) h = ((h << 5) + h + json.charCodeAt(i)) >>> 0;
    if(!manual && bakMeta().h === h) return false;   // nothing new since last backup
    bakBusy.current = true;
    setCloud(c => ({...c, status: 'saving'}));
    try{
      const stamp = new Date().toISOString();
      const b64 = btoa(unescape(encodeURIComponent(json)));
      const j = await fetch(inboxUrl, {method:'POST', body: JSON.stringify({kind:'file', priv: 1,
        name: 'REM Command Centre backup ' + stamp.slice(0, 16).replace('T', ' ') + '.json',
        mime: 'application/json', data: b64})}).then(r => r.json());
      if(!j.ok || !j.id) throw new Error('upload failed');
      const ok2 = await fetch(inboxUrl, {method:'POST', body: JSON.stringify({kind:'ccbak', token: inboxToken,
        ref: j.id, project: '', dname: '', who: 'cc',
        body: JSON.stringify({b: json.length, c: db.clients.length, o: db.orders.length, d: db.deliverables.length})})}).then(r => r.json());
      if(!ok2.ok) throw new Error('pointer failed');
      try{ localStorage.setItem('rem_ccbak_v1', JSON.stringify({h, t: stamp})); }catch(e){}
      setCloud({status: 'idle', last: fmtClock(stamp)});
      bakBusy.current = false;
      return true;
    }catch(e){
      setCloud(c => ({...c, status: 'err'}));
      bakBusy.current = false;
      return false;
    }
  };
  const adoptRemote = (row) => {
    const md = migrate(row.data);
    if(!md){ alert('Cloud copy looks empty or invalid — keeping this device\u2019s data.'); return; }
    cloudSkip.current = true;
    setDb(md);
    setCloud({status:'idle', last: fmtClock(row.updated_at)});
    showToast('⬇ Loaded cloud copy');
  };
  // auto-backup: ~90s after the last change settles (hash-guarded, so quiet
  // periods and no-op reloads never re-upload)
  useEffect(() => {
    if(!db.settings.inboxUrl || !db.settings.inboxToken) return;
    const t = setTimeout(() => { doBackup(false); }, window.__BAK_MS || 90000);
    return () => clearTimeout(t);
  }, [db]);
  useEffect(() => {
    const check = () => fetch(location.pathname || 'index.html', {cache: 'no-store'})
      .then(r => r.text()).then(t => {
        const m = t.match(/APP_VERSION = '([^']+)'/);
        if(m && m[1] !== APP_VERSION) setStaleVersion(true);
      }).catch(() => {});
    const t0 = setTimeout(check, 5000);
    const t = setInterval(check, 30 * 60 * 1000);
    return () => { clearTimeout(t0); clearInterval(t); };
  }, []);
  // 🔁 Unlimited plans: keep every month invoiced, from the plan's start month
  // through today, and on the 1st going forward. Missing months backfill
  // automatically; unpaid auto-invoices from before the start month clean up.
  useEffect(() => {
    const cur = today().slice(0, 7);
    const nextMo = m => { const y = +m.slice(0, 4), mm = +m.slice(5, 7); return mm === 12 ? (y + 1) + '-01' : y + '-' + String(mm + 1).padStart(2, '0'); };
    const moLabel = m => new Date(m + '-15T12:00:00').toLocaleDateString('en-CA', {month: 'long', year: 'numeric'});
    const add = [], drop = [], addDl = [], hubIds = [];
    db.clients.forEach(c => {
      if(c.tier !== 'unlimited') return;
      const amt = +(c.retainer !== undefined ? c.retainer : 1750);
      if(!(amt > 0)) return;
      const start = /^\d{4}-\d{2}$/.test(String(c.retainerStart || '')) ? String(c.retainerStart) : cur;
      db.orders.forEach(o => { if(o.retainer && o.clientId === c.id && String(o.rmonth) < start && o.payment !== 'paid') drop.push(o.id); });
      for(let mo = start; mo <= cur; mo = nextMo(mo)){
        if(db.orders.some(o => o.retainer && o.clientId === c.id && String(o.rmonth) === mo)) continue;
        add.push({ id: uid(), clientId: c.id, project: 'Unlimited Plan — ' + moLabel(mo),
          date: mo + '-01', payment: 'unpaid', hst: true, retainer: true, rmonth: mo,
          items: [{ name: 'Unlimited Content Plan (monthly)', price: amt, qty: 1 }] });
      }
      if(add.filter(o => o.clientId === c.id && o.retainer).length)
        logActivity(`🔁 Retainer invoices for ${c.name}: ${add.filter(o => o.clientId === c.id && o.retainer).length} month(s) at ${money(amt)} + HST`);
      // 📦 monthly content package: their standing order auto-raises once
      // per month (this month only — content isn't backfilled), items at $0.
      const plan = Array.isArray(c.plan) ? c.plan.filter(x => x && x.serviceId && (+x.qty || 0) > 0) : [];
      if(plan.length && start <= cur &&
         !db.orders.some(o => o.planAuto && o.clientId === c.id && String(o.rmonth) === cur)){
        const po = { id: uid(), clientId: c.id, project: 'Monthly Content — ' + moLabel(cur),
          date: cur + '-01', payment: 'paid', hst: true, planAuto: true, rmonth: cur,
          items: plan.map(x => { const sv = svc(x.serviceId);
            return {serviceId: x.serviceId, name: sv ? sv.name : 'Service', qty: +x.qty || 1, price: 0, ...(sv && sv.retail ? {retail: sv.retail} : {})}; }) };
        add.push(po); addDl.push(...spawnDeliverables(po)); hubIds.push(c.id);
        logActivity(`📦 ${c.name}: ${moLabel(cur)} content package created — ${po.items.reduce((a, i) => a + i.qty, 0)} item(s), covered by the retainer`);
      }
    });
    if(!add.length && !drop.length) return;
    const dropSet = new Set(drop);
    setDb(p => ({...p, orders: [...add, ...p.orders.filter(o => !dropSet.has(o.id))],
      deliverables: addDl.length ? [...addDl, ...p.deliverables] : p.deliverables}));
    if(hubIds.length) setTimeout(() => hubIds.forEach(id => pushHub(id)), 1500);
    if(drop.length) logActivity(`Cleaned up ${drop.length} unpaid retainer invoice${drop.length === 1 ? '' : 's'} from before the plan start`);
  }, [db.clients, db.orders]);
  const markSubHandled = (id) => setDb(p => ({...p, subsHandled: [...(p.subsHandled || []), id]}));
  const dbRef = React.useRef(db); dbRef.current = db;
  const pushHub = (clientId) => {
    try {
      const db = dbRef.current;
      const c = db.clients.find(x => x.id === clientId);
      if(!c || !db.settings.inboxUrl) return null;
      let hk = c.hubKey || c.hubId;
      if(!hk){ hk = Math.random().toString(36).slice(2, 10); }
      if(c.hubKey !== hk) setDb(p => ({...p, clients: p.clients.map(x => x.id === clientId ? {...x, hubKey: hk} : x)}));
      // 💳 who sees a balance? Direct clients: yes. Pinnacle agents (partner/
      // internal): only if you flip "Show balance on their hub" on the client.
      const pinTier = c.tier === 'partner' || c.tier === 'internal';
      const showBal = c.showBalance !== undefined ? !!c.showBalance : !pinTier;
      const projects = db.deliverables
        .filter(d => (db.orders.find(o => o.id === d.orderId) || {}).clientId === clientId)
        .map(d => { const o = db.orders.find(x => x.id === d.orderId) || {};
          const owing = showBal && d.status === 'Delivered' && o.payment && o.payment !== 'paid';
          return {t: dlTitle(d), p: o.project || d.group, st: STATUS_LABEL(d.status),
            si: STATUSES.indexOf(d.status), sn: STATUSES.length,
            rs: isReviewStage(d.status), dv: d.status === 'Delivered',
            du: owing ? 1 : 0, amt: owing ? Math.round(orderTotals(o).total * 100) / 100 : 0,
            url: (d.reviewUrl || ''), dt: (d.deliveredDate || d.reviewDate || d.shootDate || ''),
            ...(d.status === 'Delivered' ? (() => { const bb = getBrief(d); return {
              ...(bb.caption ? {cp: bb.caption} : {}),
              ...(bb.caption2 ? {cp2: bb.caption2} : {}),
              ...(bb.lang2 ? {lg: bb.lang2} : {})}; })() : {})}; })
        .sort((a, b) => String(b.dt).localeCompare(String(a.dt)));
      const pin = c.tier === 'partner' || c.tier === 'internal' ||
        (c.tier === 'unlimited' && /pinnacle/i.test(companyOf(c)));
      const co = companyOf(c);
      // 🛍 agent-facing services menu (retail prices) + 💳 pay link ride in the manifest
      const svcMenu = CATALOG.filter(s => s.retail).map(s => ({c: s.cat, n: s.name, p: s.retail,
        ...(CAL_EVENT_SLUG[s.id] ? {u: 'https://calendly.com/hello-reelestatemedia/' + CAL_EVENT_SLUG[s.id]} : {})}));
      const manifest = JSON.stringify({agent: (c.name || '').split(' ')[0], brokerage: co === 'Independent / Direct' ? '' : co, t: pin ? 'pin' : 'rem', email: c.email || c.contact || '', projects,
        pay: db.settings.payUrl || '', svc: svcMenu});
      fetch(db.settings.inboxUrl, {method:'POST', body: JSON.stringify({kind:'hub', ref: hk, project: c.name, who: 'app', body: manifest})}).catch(() => {});
      const base = (db.settings.reviewPageUrl || '').replace('review.html', 'hub.html');
      return base ? base + '?a=' + hk + '&t=' + (pin ? 'pin' : 'rem') : null;
    } catch(e){ return null; }
  };
  const toggleBlockedDay = (ds) => setDb(p => ({...p, blockedDays: (p.blockedDays || []).includes(ds)
    ? (p.blockedDays || []).filter(x => x !== ds) : [...(p.blockedDays || []), ds]}));

  const addExpense = (exp) => { setDb(p => ({...p, expenses: [{...exp, id: uid()}, ...(p.expenses || [])]})); logActivity(`Expense: ${exp.desc} ${money(+exp.amount || 0)}`); };
  const deleteExpense = (id) => setDb(p => ({...p, expenses: (p.expenses || []).filter(e => e.id !== id)}));

  const addOrderItem = (orderId, serviceId) => {
    const o = db.orders.find(x => x.id === orderId); const s = svc(serviceId);
    if(!o || !s) return;
    const tier = clientTier(o.clientId);
    const item = {serviceId: s.id, name: s.name, qty: 1, price: rateFor(tier, s), retail: s.retail};
    const ds = spawnDeliverables({id: orderId, items: [item]});
    setDb(p => ({...p,
      orders: p.orders.map(x => x.id === orderId ? {...x, items: [...x.items, item]} : x),
      deliverables: [...p.deliverables, ...ds]}));
    logActivity(`Added ${s.name} to ${o.project || 'order'}`);
    showToast(`+ ${s.name} — ${ds.length} deliverable${ds.length !== 1 ? 's' : ''} added`);
  };
  const removeOrderItem = (orderId, ix) => {
    const o = db.orders.find(x => x.id === orderId); if(!o) return;
    const item = o.items[ix]; if(!item) return;
    const s = svc(item.serviceId);
    const groupName = s ? s.name : item.name;
    const ds = db.deliverables.filter(d => d.orderId === orderId && d.group === groupName);
    const deliveredN = ds.filter(d => d.status === 'Delivered').length;
    if(!confirm(`Remove "${item.name}" from this order?\nThis also removes its ${ds.length} deliverable${ds.length !== 1 ? 's' : ''}${deliveredN ? ` (${deliveredN} already delivered)` : ''}.`)) return;
    const dsIds = new Set(ds.map(d => d.id));
    setDb(p => ({...p,
      orders: p.orders.map(x => x.id === orderId ? {...x, items: x.items.filter((_,j) => j !== ix)} : x),
      deliverables: p.deliverables.filter(d => !dsIds.has(d.id))}));
    logActivity(`Removed ${item.name} from ${o.project || 'order'}`);
    showToast('Service removed', [{label: 'Undo', fn: () => setDb(p => ({...p,
      orders: p.orders.map(x => x.id === orderId ? {...x, items: [...x.items.slice(0,ix), item, ...x.items.slice(ix)]} : x),
      deliverables: [...p.deliverables, ...ds]}))}]);
  };
  const updateOrderItem = (orderId, ix, patch) => setDb(p => ({...p,
    orders: p.orders.map(x => x.id === orderId ? {...x, items: x.items.map((it,j) => j === ix ? {...it, ...patch} : it)} : x)}));

  const rebookOrder = (id) => {
    const o = db.orders.find(x => x.id === id); if(!o) return;
    const project = prompt('Project / property for the new booking:', o.project || '');
    if(project === null) return;
    const order = {...o, id: uid(), project, date: today(), payment: 'unpaid'};
    const ds = spawnDeliverables(order);
    setDb(p => ({...p, orders: [order, ...p.orders], deliverables: [...p.deliverables, ...ds]}));
    logActivity(`Rebooked: ${project || 'order'}`);
    setOpenOrder(order.id);
    showToast('⟳ Rebooked — fresh deliverables created');
  };
  const deleteDeliverable = (id) => {
    const cur = db.deliverables.find(x => x.id === id);
    if(!cur) return;
    const o = db.orders.find(x => x.id === cur.orderId);
    if(!confirm(`Remove "${dlTitle(cur)}"${cur.status === 'Delivered' ? ' (already delivered)' : ''}?\nIt disappears from the pipeline and from the agent's hub.`)) return;
    setDb(p => ({...p, deliverables: p.deliverables.filter(d => d.id !== id)}));
    logActivity(`Removed deliverable: ${dlTitle(cur)}${o && o.project ? ' · ' + o.project : ''}`);
    showToast('Deliverable removed', [{label: 'Undo', fn: () => {
      setDb(p => ({...p, deliverables: [...p.deliverables, cur]}));
      const c2 = o && db.clients.find(x => x.id === o.clientId);
      if(c2 && (c2.hubKey || c2.hubId) && db.settings.inboxUrl) setTimeout(() => pushHub(c2.id), 900);
    }}]);
    // keep the agent's hub in sync so the card disappears there too
    const c = o && db.clients.find(x => x.id === o.clientId);
    if(c && (c.hubKey || c.hubId) && db.settings.inboxUrl) setTimeout(() => pushHub(c.id), 900);

  const updateDeliverable = (id, patch) => {
