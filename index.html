    if(patch.shootDate && (db.blockedDays || []).includes(patch.shootDate) &&
       !confirm('🚫 ' + patch.shootDate + ' is a blocked day. Schedule anyway?')) return;
    if(cur && patch.status === 'Delivered' && cur.status !== 'Delivered'){
      const isB = mediaOf(cur) === 'both';
      const l = prompt(isB ? '📷 Photos link? OK to save — blank to skip.' : '📦 Delivery link (Drive / Frame.io)? OK to save — leave blank to skip.', cur.link || '');
      if(l !== null && l.trim()) patch = {...patch, link: l.trim()};
      if(isB){ const lv = prompt('🎬 Video link? OK to save — blank to skip.', cur.linkVideo || '');
        if(lv !== null && lv.trim()) patch = {...patch, linkVideo: lv.trim()}; }
    }
    if(cur && isReviewStage(patch.status) && !isReviewStage(cur.status)){
      if(!cur.reviewDate) patch = {...patch, reviewDate: today()};
      // auto-refresh the review room link so the copied message always points at the room
      try {
        const nl = (patch.link !== undefined ? patch.link : cur.link) || '';
        const nlv = (patch.linkVideo !== undefined ? patch.linkVideo : cur.linkVideo) || '';
        const srcs2 = [nl.trim(), mediaOf(cur) === 'both' ? nlv.trim() : ''].filter(Boolean);
        const base2 = db.settings.reviewPageUrl;
        if(srcs2.length && base2 && db.settings.inboxUrl){
          const entry2 = srcs2.join(',');
          if(!(cur.reviewUrl && cur.reviewUrl.indexOf('?x=') > -1 && cur.reviewSig === entry2)){
            const o2 = db.orders.find(x => x.id === cur.orderId) || {};
            const c2 = db.clients.find(x => x.id === o2.clientId) || {};
            const vers2 = [...(cur.reviewVersions || [])];
            if(!vers2.includes(entry2)) vers2.push(entry2);
            const pin2 = c2.tier === 'partner' || c2.tier === 'internal';
            const full2 = base2 + '?p=' + encodeURIComponent(o2.project || cur.group) +
              '&d=' + encodeURIComponent(dlTitle(cur)) +
              '&n=' + encodeURIComponent((c2.name || '').split(' ')[0]) +
              '&t=' + (pin2 ? 'pin' : 'rem') +
              ((getBrief(cur).orientation === 'Vertical') ? '&o=v' : '') +
              (mediaOf(cur) === 'both' ? '&m=both' : '') +
              (dueDateOf(cur) ? '&due=' + dueDateOf(cur) : '') +
              '&r=' + encodeURIComponent(cur.id) +
              '&e=' + encodeURIComponent(db.settings.inboxUrl) +
              '&v=' + vers2.map(encodeURIComponent).join('|') +
              (db.settings.driveApiKey ? '&k=' + encodeURIComponent(db.settings.driveApiKey) : '');
            const code2 = Math.random().toString(36).slice(2, 9);
            patch = {...patch, reviewVersions: vers2, reviewUrl: base2 + '?x=' + code2, reviewSig: entry2};
            fetch(db.settings.inboxUrl, {method:'POST', body: JSON.stringify({kind:'link', ref: code2, project: o2.project || cur.group, who: 'app', body: full2.split('?').slice(1).join('?')})}).catch(() => {});
            if(c2 && c2.id) setTimeout(() => pushHub(c2.id), 1500);
          }
        }
      } catch(e){}
      const isB = mediaOf(cur) === 'both';
      const l = prompt(isB ? '📷 Photos review link? OK to save — blank to skip.' : '👀 Review link (Frame.io / Drive draft)? OK to save — leave blank to skip.', cur.link || '');
      if(l !== null && l.trim()) patch = {...patch, link: l.trim()};
      if(isB){ const lv = prompt('🎬 Video review link? OK to save — blank to skip.', cur.linkVideo || '');
        if(lv !== null && lv.trim()) patch = {...patch, linkVideo: lv.trim()}; }
    }
    setDb(p => ({...p, deliverables: p.deliverables.map(d => {
      if(d.id !== id) return d;
      const next = {...d, ...patch};
      if(patch.status === 'Delivered' && !next.deliveredDate) next.deliveredDate = today();
      if(patch.status && patch.status !== 'Delivered') next.deliveredDate = '';
      if(patch.shootDate && d.status === 'Booked' && !patch.status) next.status = 'Scheduled';
      return next;
    })}));
    if(cur && patch.shootDate && cur.status === 'Booked' && !patch.status)
      logActivity(`${dlTitle(cur)} scheduled for ${fmtDate(patch.shootDate)}`);
    // scheduling / moving a shoot: sync the hub AND ping the agent (the msg fires a push server-side)
    if(cur && patch.shootDate && patch.shootDate !== (cur.shootDate || '')){
      const oS = db.orders.find(x => x.id === cur.orderId) || {};
      const cS = db.clients.find(x => x.id === oS.clientId) || {};
      const hkS = cS.hubKey || cS.hubId;
      if(cS && cS.id && hkS && db.settings.inboxUrl){
        setTimeout(() => pushHub(cS.id), 900);
        const tS = (patch.shootTime !== undefined ? patch.shootTime : cur.shootTime) || '';
        const whenS = fmtDate(patch.shootDate) + (tS ? ' at ' + tS : '');
        fetch(db.settings.inboxUrl, {method:'POST', body: JSON.stringify({kind:'msg', ref: hkS,
          project: (cS.name || 'Agent') + ' — ' + dlTitle(cur), dname: '', who: 'Jag', from: 'jag',
          body: '📅 Your shoot for “' + dlTitle(cur) + '” is booked for ' + whenS + '. Tap “Shoot brief” on your hub to tell us about it!'})}).catch(() => {});
      }
    }
    if(cur && patch.status && patch.status !== cur.status){
      const prevStatus = cur.status, prevDD = cur.deliveredDate || '';
      const o = db.orders.find(x => x.id === cur.orderId) || {};
      const c = db.clients.find(x => x.id === o.clientId) || {};
      logActivity(`${dlTitle(cur)} → ${patch.status}${o.project ? ' · ' + o.project : ''}`);
      const actions = [{label: 'Undo', fn: () => setDb(p => ({...p, deliverables: p.deliverables.map(d => d.id === id ? {...d, status: prevStatus, deliveredDate: prevDD} : d)}))}];
      if(patch.status === 'Delivered'){
        copyText(deliveryMsg({...cur, ...patch}, o, c));
        actions.push({label: '✉ Copy again', fn: () => copyText(deliveryMsg({...cur, ...patch}, o, c))});
        showToast(`✓ ${dlTitle(cur)} delivered · ✉ client message copied`, actions);
      } else if(isReviewStage(patch.status)){
        copyText(reviewMsg({...cur, ...patch}, o, c));
        actions.push({label: '✉ Copy again', fn: () => copyText(reviewMsg({...cur, ...patch}, o, c))});
        showToast(`👀 ${dlTitle(cur)} → ${patch.status} · ✉ review message copied`, actions);
      } else {
        showToast(`${dlTitle(cur)} → ${STATUS_LABEL(patch.status)}`, actions);
      }
      // keep the agent's hub in sync so they can watch their project move through the pipeline
      if(c && c.id && (c.hubKey || c.hubId) && db.settings.inboxUrl) setTimeout(() => pushHub(c.id), 900);
    }
    // renamed → log it + refresh the agent's hub so the card matches
    if(cur && patch.name !== undefined && patch.name !== cur.name){
      const o2 = db.orders.find(x => x.id === cur.orderId) || {};
      const c2 = db.clients.find(x => x.id === o2.clientId) || {};
      logActivity(`Renamed "${cur.name}" → "${patch.name}"${o2.project ? ' · ' + o2.project : ''}`);
      if(c2 && c2.id && (c2.hubKey || c2.hubId) && db.settings.inboxUrl) setTimeout(() => pushHub(c2.id), 900);
    }
  };
  const updateOrder = (id, patch) => {
    const cur = db.orders.find(o => o.id === id);
    setDb(p => ({...p, orders: p.orders.map(o => o.id === id ? {...o, ...patch} : o)}));
    if(cur && patch.payment && patch.payment !== cur.payment) logActivity(`${cur.project || 'Order'} marked ${patch.payment}`);
    // 🧾 marked paid → drop a receipt in the agent's chat + refresh their hub (clears the 💳 pill)
    if(cur && patch.payment === 'paid' && cur.payment !== 'paid'){
      const c = db.clients.find(x => x.id === cur.clientId);
      const hk = c && (c.hubKey || c.hubId);
      const balOn = c && (c.showBalance !== undefined ? !!c.showBalance : (c.tier === 'direct' || c.tier === 'unlimited'));
      if(hk && db.settings.inboxUrl && balOn){
        const tot = orderTotals(cur).total;
        const when = new Date().toLocaleDateString('en-CA', {month:'long', day:'numeric', year:'numeric'});
        fetch(db.settings.inboxUrl, {method:'POST', body: JSON.stringify({
          kind:'msg', ref: hk, project: (c.name || 'Agent') + ' — Content Hub', dname:'',
          who: 'Reel Estate Media', from: 'jag',
          body: '🧾 Payment received — ' + money(tot) + ' for “' + (cur.project || 'your order') + '”, ' + when + '. Keep this message as your receipt (HST included where applicable). Thank you! 🙏'
        })}).catch(() => {});
      }
      if(hk && db.settings.inboxUrl) setTimeout(() => pushHub(c.id), 900);
    }
    if(cur && patch.rating && patch.rating !== cur.rating){
      const c = db.clients.find(x => x.id === cur.clientId) || {};
      logActivity(`⭐ ${patch.rating}/5 from ${c.name || 'client'}${cur.project ? ' · ' + cur.project : ''}`);
      if(patch.rating >= 5) showToast(`⭐ 5 stars from ${c.name || 'client'}! Strike while it's hot —`,
        [{label: '✉ Copy Google review request', fn: () => copyText(reviewRequestMsg(c, db.settings.reviewLink))}]);
    }
  };
  const updateSettings = (patch) => setDb(p => ({...p, settings: {...p.settings, ...patch}}));
  const [editingClient, setEditingClient] = useState(null);
  const [focusDl, setFocusDl] = useState(null);
  const [printDoc, setPrintDoc] = useState(null);
  const [shootModeId, setShootModeId] = useState(null);
  const backupDue = !db.settings.lastBackup || db.settings.lastBackup < addDays(today(), -14);
  const exportData = () => {
    const now = new Date();
    const pad = n => String(n).padStart(2,'0');
    const stamp = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}_${pad(now.getHours())}-${pad(now.getMinutes())}`;
    const data = {...db, settings: {...db.settings, lastBackup: stamp}};
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `reel-pipeline-backup-${stamp}.json`;
    a.click(); URL.revokeObjectURL(a.href);
    updateSettings({lastBackup: stamp});
  };
  const importDataFile = (e) => {
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = () => { try {
        const d = JSON.parse(r.result);
        if(!d.clients || !d.orders) throw new Error('bad');
        if(confirm('Replace ALL current data with this backup? This cannot be undone.'))
          setDb({...seed, ...d, settings: {...seed.settings, ...(d.settings || {})}});
      } catch(err){ alert("That file doesn't look like a pipeline backup."); } };
    r.readAsText(f); e.target.value = '';
  };
  const updateClient = (id, patch) => { setDb(p => ({...p, clients: p.clients.map(c => c.id === id ? {...c, ...patch} : c)})); setEditingClient(null); };
  const [syncing, setSyncing] = useState(false);
  const [syncMsg, setSyncMsg] = useState('');

  const syncCalendly = async () => {
    const tok = db.settings.calendlyToken;
    if(!tok){ setSyncMsg('Connect Calendly first — paste your token below.'); return; }
    if(syncing) return;
    setSyncing(true); setSyncMsg('');
    try {
      const H = {Authorization: 'Bearer ' + tok};
      const jf = async (url) => {
        const r = await fetch(url, {headers: H});
        if(r.status === 401) throw new Error('AUTH');
        if(r.status === 403){
          let detail = '';
          try { const j = await r.json(); detail = j.message || j.title || ''; } catch(e){}
          const which = url.includes('/users/me') ? 'users:read' : 'scheduled_events:read';
          throw new Error('SCOPE:' + which + (detail ? ' — Calendly says: "' + detail + '"' : ''));
        }
        if(!r.ok) throw new Error('Calendly returned ' + r.status);
        return r.json();
      };
      let user = db.settings.calendlyUser;
      if(!user){
        const me = await jf('https://api.calendly.com/users/me');
        user = me.resource.uri;
        setDb(p => ({...p, settings: {...p.settings, calendlyUser: user}}));
      }
      const minStart = new Date(Date.now() - 90*24*3600*1000).toISOString();
      const ev = await jf('https://api.calendly.com/scheduled_events?user=' + encodeURIComponent(user) +
        '&min_start_time=' + encodeURIComponent(minStart) + '&count=100&sort=start_time:asc');
      const fresh = (ev.collection || []).filter(e => e.status === 'active').map(e => ({
        uri: e.uri, id: e.uri.split('/').pop(), title: e.name || 'Booking',
        start: e.start_time, end: e.end_time,
        location: (e.location && (e.location.location || e.location.join_url)) || ''
      })).filter(b => b.id && !db.importedIds.includes(b.id) && !db.pendingBookings.some(p => p.id === b.id))
        .slice(0, 25);
      for(const b of fresh){
        try {
          const inv = await jf(b.uri + '/invitees?count=1');
          const first = (inv.collection || [])[0] || {};
          b.invitee_name = first.name || '';
          b.invitee_email = first.email || '';
        } catch(e){ b.invitee_name = ''; b.invitee_email = ''; }
        delete b.uri;
      }
      const r = routeIncoming(fresh);
      setSyncMsg(fresh.length === 0 ? '✓ Up to date — no new bookings.'
        : `${r.auto ? '⚡ Auto-booked ' + r.auto + '. ' : ''}${r.manual ? r.manual + ' waiting for review below.' : ''}`.trim());
    } catch(err){
      console.error('Calendly sync error:', err);
      setSyncMsg(err.message === 'AUTH'
        ? '⚠ Calendly rejected the token — it may be expired. Tap ⚙ to paste a fresh one.'
        : (err.message || '').startsWith('SCOPE:')
        ? '⚠ Token is missing the ' + err.message.slice(6).split(' ')[0] + ' scope. Scopes are locked in at creation — generate a NEW token in Calendly with BOTH scheduled_events:read and users:read ticked before hitting Create, then tap ⚙ here and paste it.' + (err.message.includes('—') ? ' (' + err.message.slice(err.message.indexOf('—') + 2) + ')' : '')
        : '⚠ Sync failed: ' + (err.message || 'network error') + ' — will retry automatically.');
    }
    setSyncing(false);
  };
  const syncRef = React.useRef(syncCalendly);
  syncRef.current = syncCalendly;
  useEffect(() => {
    if(!db.settings.calendlyToken) return;
    const t0 = setTimeout(() => syncRef.current(), 1200);
    const t = setInterval(() => syncRef.current(), 20 * 60 * 1000);
    return () => { clearTimeout(t0); clearInterval(t); };
  }, [!!db.settings.calendlyToken]);

  const importBookings = (jsonText) => {
    try {
      const clean = jsonText.replace(/```json|```/g, '').trim();
      let parsed = JSON.parse(clean);
      if(!Array.isArray(parsed)) parsed = parsed.bookings || [];
      const incoming = parsed.filter(b => b && b.id &&
        !db.importedIds.includes(b.id) && !db.pendingBookings.some(p => p.id === b.id));
      const r = routeIncoming(incoming);
      setSyncMsg(incoming.length === 0 ? 'Nothing new in that paste — all bookings already imported.'
        : `${r.auto ? '⚡ Auto-booked ' + r.auto + '. ' : ''}${r.manual ? r.manual + ' waiting for review below.' : ''}`.trim());
      return true;
    } catch(e){ setSyncMsg('Couldn\u2019t read that paste — it should be the JSON block exactly as Claude gave it.'); return false; }
  };

  const finishBooking = (bk, clientId) => setDb(p => ({...p,
    pendingBookings: p.pendingBookings.filter(x => x.id !== bk.id),
    importedIds: [...p.importedIds, bk.id],
    settings: clientId && bk.invitee_email ? {...p.settings, emailMap: {...p.settings.emailMap, [bk.invitee_email.toLowerCase()]: clientId}} : p.settings
  }));

  const applyBookingNew = (bk, clientId, serviceId) => {
    const s = svc(serviceId);
    const tier = clientTier(clientId);
    const order = {id: uid(), clientId, project: `${bk.invitee_name} — ${bk.title}`, date: isoToDate(bk.start),
      hst: true, notes: `Booked via Calendly · ${bk.invitee_email}`, payment: 'unpaid',
      items: [{serviceId: s.id, name: s.name, qty: 1, price: rateFor(tier, s), retail: s.retail}]};
    const ds = spawnDeliverables(order);
    if(ds[0]){ ds[0].shootDate = isoToDate(bk.start); ds[0].shootTime = isoToTime(bk.start); ds[0].shootEnd = bk.end ? isoToTime(bk.end) : ''; ds[0].status = 'Scheduled';
      ds[0].brief = {...(ds[0].brief || DEFAULT_BRIEF), location: bk.location || ''}; }
    setDb(p => ({...p, orders: [order, ...p.orders], deliverables: [...p.deliverables, ...ds]}));
    finishBooking(bk, clientId);
    if(bk.title) setDb(p => ({...p, settings: {...p.settings, eventMap: {...(p.settings.eventMap || {}), [bk.title.trim()]: s.id}}}));
  };

  /* Autopilot: known email + known event type + no unscheduled backlog for that client -> auto-create the order */
  const routeIncoming = (incoming) => {
    const auto = [], manual = [];
    incoming.forEach(b => {
      const cid = db.settings.emailMap[(b.invitee_email || '').toLowerCase()];
      const sid = (db.settings.eventMap || {})[(b.title || '').trim()];
      const hasBacklog = cid && db.deliverables.some(d => d.status === 'Booked' &&
        (db.orders.find(o => o.id === d.orderId) || {}).clientId === cid);
      const onBlocked = (db.blockedDays || []).includes(isoToDate(b.start));
      if(cid && sid && svc(sid) && db.clients.some(c => c.id === cid) && !hasBacklog && !onBlocked) auto.push({b, cid, sid});
      else manual.push(b);
    });
    auto.forEach(({b, cid, sid}) => { applyBookingNew(b, cid, sid); logActivity(`⚡ Auto-booked: ${b.invitee_name} — ${b.title}`); });
    setDb(p => ({...p, pendingBookings: [...p.pendingBookings, ...manual], settings: {...p.settings, lastCalendlyCheck: today()}}));
    if(auto.length) showToast(`⚡ Auto-booked ${auto.length} from known client${auto.length !== 1 ? 's' : ''}`);
    return {auto: auto.length, manual: manual.length};
  };

  const applyBookingAttach = (bk, deliverableId) => {
    setDb(p => ({...p, deliverables: p.deliverables.map(d => d.id === deliverableId
      ? {...d, shootDate: isoToDate(bk.start), shootTime: isoToTime(bk.start), shootEnd: bk.end ? isoToTime(bk.end) : '', status: d.status === 'Booked' ? 'Scheduled' : d.status,
         brief: {...getBrief(d), location: bk.location || getBrief(d).location}}
      : d)}));
    finishBooking(bk, null);
  };
  const deleteOrder = (id) => {
    if(!confirm('Delete this order and all its deliverables?')) return;
    const order = db.orders.find(o => o.id === id);
    const ds = db.deliverables.filter(d => d.orderId === id);
    setDb(p => ({...p, orders: p.orders.filter(o => o.id !== id), deliverables: p.deliverables.filter(d => d.orderId !== id)}));
    setOpenOrder(null);
    logActivity(`Deleted order: ${(order && order.project) || 'untitled'}`);
    showToast('Order deleted', [{label: 'Undo', fn: () => setDb(p => ({...p, orders: [order, ...p.orders], deliverables: [...p.deliverables, ...ds]}))}]);
  };
  const moveStatus = (d, dir) => {
    const i = STATUSES.indexOf(d.status) + dir;
    if(i >= 0 && i < STATUSES.length) updateDeliverable(d.id, {status: STATUSES[i]});
  };

  /* ---- stats ---- */
  const stats = useMemo(() => {
    const active = db.orders.filter(o => orderProgress(o.id).done < orderProgress(o.id).total || orderProgress(o.id).total === 0);
    const remaining = db.deliverables.filter(d => d.status !== 'Delivered').length;
    const mo = today().slice(0,7);
    const deliveredThisMo = db.deliverables.filter(d => d.status === 'Delivered').length;
    const revThisMo = db.orders.filter(o => o.date && o.date.slice(0,7) === mo).reduce((a,o) => a + orderTotals(o).sub, 0);
    const owed = db.orders.filter(o => o.payment !== 'paid').reduce((a,o) => a + orderTotals(o).total, 0);
    const tierOf = cid => (db.clients.find(c => c.id === cid) || {}).tier || 'partner';
    const marginThisMo = db.orders.filter(o => o.date && o.date.slice(0,7) === mo)
      .reduce((a,o) => a + orderMargin(o, tierOf(o.clientId)), 0);
    return {active: active.length, remaining, deliveredThisMo, revThisMo, owed, marginThisMo};
  }, [db]);

  if(locked) return <LockScreen onUnlock={() => setLocked(false)}/>;

  return (
  <div className="shell">
    <header className="top">
      <div className="brand">
        <h1>Reel Estate <em>Media</em></h1>
        <p>Production Pipeline · Pinnacle Command Centre</p>
      </div>
      <nav className="tabs">
        {[['dashboard','Home'],['calendar','Calendar'],['pipeline','Pipeline'],['review','Review'],['orders','Orders'],['clients','Clients'],['money','Money']].map(([k,l]) =>
          <button key={k} className={view === k ? 'on' : ''} onClick={() => {setView(k); setOpenOrder(null);}}>
            {l}{k === 'calendar' && db.pendingBookings.length > 0 ? ` · ${db.pendingBookings.length}` : ''}
          </button>)}
      </nav>
      <div className="flex" style={{gap:8}}>
        <button className="btn ghost sm" title="Chat with your agents — opens in a new tab, already unlocked"
          style={{borderColor:'var(--amber)', color:'var(--amber)'}}
          onClick={() => {
            // Hand the chat page your inbox token so it opens straight into the conversations.
            try{ if(db.settings.inboxToken) localStorage.setItem('rem_admin_token_v1', db.settings.inboxToken); }catch(e){}
            window.open('studio-chat.html', '_blank');
          }}>💬 Chat</button>
        <button className="btn ghost sm" title="Your public testimonial wall — what visitors see" onClick={() => window.open('wall.html', '_blank')}>⭐ Wall</button>
        <button className="btn ghost sm" title="Cloud backups — auto-saved to your own Google Drive" onClick={() => setShowCloud(true)}
          style={cloud.status === 'err' ? {borderColor:'var(--red)', color:'var(--red)'} : {}}>
          {(db.settings.inboxUrl && db.settings.inboxToken) ? (cloud.status === 'saving' ? '⛅ …' : cloud.status === 'err' ? '⛅ ⚠' : cloud.last ? '⛅ ✓' : '⛅ ·') : '⛅'}</button>
        <button className="btn ghost sm" title="Lock the app" onClick={() => { sessionStorage.removeItem('rem_unlocked'); setLocked(true); }}>🔒</button>
        <button className="btn ghost sm" title="Download a backup of all data" onClick={exportData}>⬇ Backup{backupDue ? ' ●' : ''}</button>
        <label className="btn ghost sm" style={{cursor:'pointer'}} title="Restore from a backup file">⬆ Restore<input type="file" accept=".json" style={{display:'none'}} onChange={importDataFile}/></label>
        <button className="btn" onClick={() => setShowNewOrder(true)}>+ New Booking</button>
      </div>
    </header>

    {showCloud && <CloudModal db={db} onClose={() => setShowCloud(false)} cloud={cloud} adoptRemote={adoptRemote} doBackup={doBackup}/>}
    {staleVersion &&
    <div className="card" style={{border:'1px solid var(--amber)', padding:'11px 16px', marginBottom:12}}>
      <div className="flex">
        <span className="small" style={{fontWeight:700, color:'var(--amber)'}}>⬆ A newer version of the app is live — you're running stale code.</span>
        <span className="spacer"></span>
        <button className="btn sm" onClick={() => location.reload(true)}>Refresh now</button>
      </div>
    </div>}
    {view === 'dashboard' && <Dashboard db={db} stats={stats} clientName={clientName} orderProgress={orderProgress}
        openOrderDetail={(id, dlId)=>{setOpenOrder(id); setFocusDl(dlId || null); setView('orders');}} updateDeliverable={updateDeliverable} setPrintDoc={setPrintDoc} openNewBooking={() => setShowNewOrder(true)} updateSettings={updateSettings} updateOrder={updateOrder} openShootMode={setShootModeId} markSubHandled={markSubHandled} goCalendar={() => {setView('calendar'); setOpenOrder(null);}} />}
    {view === 'pipeline' && <Pipeline db={db} clientName={clientName} moveStatus={moveStatus} pipeClient={pipeClient} setPipeClient={setPipeClient} updateDeliverable={updateDeliverable} splitDeliverable={splitDeliverable} openOrderDetail={(id, dlId)=>{setOpenOrder(id); setFocusDl(dlId || null); setView('orders');}} />}
    {view === 'orders' && !openOrder && <Orders db={db} clientName={clientName} orderProgress={orderProgress} setOpenOrder={setOpenOrder} openNewBooking={() => setShowNewOrder(true)} />}
    {view === 'clients' && <ClientsPage db={db} setShowNewClient={setShowNewClient} orderProgress={orderProgress} setEditingClient={setEditingClient} pushHub={pushHub} showToast={showToast} />}
    {view === 'orders' && openOrder && <OrderDetail db={db} id={openOrder} clientName={clientName} clientTier={clientTier}
        orderDeliverables={orderDeliverables} orderProgress={orderProgress} updateDeliverable={updateDeliverable} deleteDeliverable={deleteDeliverable}
        updateOrder={updateOrder} deleteOrder={deleteOrder} back={() => {setOpenOrder(null); setFocusDl(null);}} moveStatus={moveStatus} focusDl={focusDl} setPrintDoc={setPrintDoc} rebookOrder={rebookOrder} addOrderItem={addOrderItem} removeOrderItem={removeOrderItem} updateOrderItem={updateOrderItem} updateSettings={updateSettings} splitDeliverable={splitDeliverable} />}
    {view === 'review' && <ReviewTab db={db} clientName={clientName} pushHub={pushHub}
        openOrderDetail={(id, dlId)=>{setOpenOrder(id); setFocusDl(dlId || null); setView('orders');}} showToast={showToast} />}
    {view === 'calendar' && <>
      <CalendarView db={db} clientName={clientName} setPrintDoc={setPrintDoc} updateDeliverable={updateDeliverable} toggleBlocked={toggleBlockedDay} openNewBooking={() => setShowNewOrder(true)} showToast={showToast} />
      <div style={{marginTop:16}}>
        <InboxSection db={db} updateSettings={updateSettings} syncing={syncing} syncMsg={syncMsg} syncCalendly={syncCalendly} importBookings={importBookings}
          clientTier={clientTier} applyBookingNew={applyBookingNew} applyBookingAttach={applyBookingAttach}
          dismissBooking={bk => finishBooking(bk, null)} orderProgress={orderProgress} addClient={addClient} />
      </div>
    </>}
    {view === 'money' && <Money db={db} clientName={clientName} updateOrder={updateOrder} updateSettings={updateSettings} stats={stats} setPrintDoc={setPrintDoc} addExpense={addExpense} deleteExpense={deleteExpense} />}

    {showNewOrder && <NewOrderModal db={db} onClose={() => setShowNewOrder(false)} onSave={addOrder} addClient={addClient} />}
    {showNewClient && <NewClientModal onClose={() => setShowNewClient(false)} onSave={addClient} />}
    {editingClient && <EditClientModal client={editingClient} onClose={() => setEditingClient(null)} onSave={patch => updateClient(editingClient.id, patch)} onDelete={deleteClient} />}
    {printDoc && <DocModal doc={printDoc} db={db} onClose={() => setPrintDoc(null)} updateSettings={updateSettings} />}
    {shootModeId && (() => {
      const d = db.deliverables.find(x => x.id === shootModeId);
      if(!d) return null;
      const o = db.orders.find(x => x.id === d.orderId) || {};
      const c = db.clients.find(x => x.id === o.clientId) || {};
      return <ShootMode d={d} order={o} client={c} updateDeliverable={updateDeliverable} onClose={() => setShootModeId(null)}/>;
    })()}
    {toast &&
      <div className="toast">
        <span className="small" style={{fontWeight:600}}>{toast.text}</span>
        {toast.actions.map((a,i) => <button key={i} className="btn sm" onClick={() => { a.fn(); setToast(null); }}>{a.label}</button>)}
        <button title="Close" className="x" onClick={() => setToast(null)}>✕</button>
      </div>}
  </div>);
}

function AdvanceBtn({d, updateDeliverable}){
  const i = STATUSES.indexOf(d.status);
  if(i >= STATUSES.length - 1) return <span className="pill delivered">✓ Delivered</span>;
  const next = STATUSES[i+1];
  return <button className="btn sm" onClick={e => { e.stopPropagation(); updateDeliverable(d.id, {status: next}); }}>→ {STATUS_LABEL(next)}</button>;
}

function Collapse({title, count, defaultOpen, children}){
  const [open, setOpen] = useState(!!defaultOpen);
  return (
  <div className="card">
    <div className="flex" style={{cursor:'pointer'}} onClick={() => setOpen(!open)}>

      {count !== undefined && count > 0 && <span className="pill booked">{count}</span>}

function InboxSection(props){
  const [open, setOpen] = useState(false);

  const staleDays = last ? daysSince(last) : null;
  if(props.db.pendingBookings.length > 0) return <Inbox {...props}/>;
  return (<>
    <div className="card">
      <div className="flex">
        <strong>Calendly</strong>
        <span className="small faint">No bookings waiting.{last ? ` Last checked ${staleDays === 0 ? 'today' : staleDays + 'd ago'}.` : ''}</span>
        {staleDays !== null && staleDays > 3 && <span className="pill editing">time to check</span>}
        <span className="spacer"></span>
        <button className="btn ghost sm" onClick={() => setOpen(!open)}>{open ? 'Hide' : 'Check / Import'}</button>
      </div>
    </div>

const WMO = code => {
  if(code === 0) return '☀️';
  if(code <= 2) return '🌤️';
  if(code === 3) return '☁️';
  if(code === 45 || code === 48) return '🌫️';
  if(code >= 51 && code <= 67) return '🌧️';
  if(code >= 71 && code <= 77) return '❄️';
  if(code >= 80 && code <= 82) return '🌧️';
  if(code >= 95) return '⛈️';
  return '🌡️';
};

class WxBoundary extends React.Component {
  constructor(p){ super(p); this.state = {err: null}; }
  static getDerivedStateFromError(e){ return {err: e}; }
  render(){
    if(this.state.err) return <div className="wxstrip"><span className="wxchip">⚠ Weather widget error: {String(this.state.err.message || this.state.err)}</span></div>;
    return this.props.children;
  }
}

function ShootMode({d, order, client, updateDeliverable, onClose}){
  const [, setT] = useState(0);
  useEffect(() => { const i = setInterval(() => setT(x => x + 1), 1000); return () => clearInterval(i); }, []);
  const [newShot, setNewShot] = useState('');
  const b = getBrief(d);
  const shots = shotsFor(d);
  const gear = gearFor(d);
  const doneN = shots.filter(s => s.done).length;
  const toggleShot = i => updateDeliverable(d.id, {shots: shots.map((s,j) => j === i ? {...s, done: !s.done} : s)});
  const toggleGear = i => updateDeliverable(d.id, {gear: gear.map((s,j) => j === i ? {...s, done: !s.done} : s)});
  const addShot = () => { if(!newShot.trim()) return; updateDeliverable(d.id, {shots: [...shots, {t: newShot.trim(), done: false}]}); setNewShot(''); };
  let clock = '', clockTone = '';
  if(d.shootDate && d.shootTime){
    const start = new Date(d.shootDate + 'T' + d.shootTime);
    const end = d.shootEnd ? new Date(d.shootDate + 'T' + d.shootEnd) : null;
    const now = new Date();
    const mm = ms => { const m = Math.max(0, Math.round(Math.abs(ms) / 60000)); return m >= 60 ? Math.floor(m/60) + 'h ' + (m % 60) + 'm' : m + 'm'; };
    if(now < start){ clock = 'starts in ' + mm(start - now); clockTone = 'var(--cream-dim)'; }
    else if(end && now < end){ clock = mm(end - now) + ' left'; clockTone = (end - now) < 20*60000 ? 'var(--red)' : 'var(--teal)'; }
    else if(end){ clock = 'over by ' + mm(now - end); clockTone = 'var(--red)'; }
    else { clock = mm(now - start) + ' in'; clockTone = 'var(--cream-dim)'; }
  }
  return (
  <div className="shootmode">
    <div className="sm-inner">
      <div className="flex">
        <div>
          <div className="small faint" style={{textTransform:'uppercase', letterSpacing:'.14em', fontWeight:700}}>Shoot Mode</div>
          <h2 className="serif" style={{fontSize:24, fontWeight:700}}>{dlTitle(d)}</h2>
          <div className="small muted">{order.project} · {client.name}{client.phone ? <> · <a href={'tel:' + client.phone.replace(/[^+0-9]/g,'')}>📱 {client.phone}</a></> : ''}</div>
        </div>
        <span className="spacer"></span>
        <button className="btn ghost" onClick={onClose}>✕ Exit</button>
      </div>

      {clock && <div className="sm-clock serif" style={{color: clockTone}}>⏱ {clock}
        {d.shootTime && <span className="small muted" style={{fontFamily:'DM Sans', marginLeft:12}}>{timeRange(d)}</span>}</div>}

      <div className="flex" style={{gap:6, flexWrap:'wrap', margin:'10px 0 4px'}}>
        <span className="pill booked">{MEDIA_LABEL[mediaOf(d)]}</span>
        {b.orientation && <span className="pill scheduled">{b.orientation === 'Vertical' ? '9:16' : b.orientation === 'Horizontal' ? '16:9' : '9:16 + 16:9'}</span>}
        {b.style && <span className="pill shot">{b.style}</span>}
        {b.script !== 'N/A' && <span className={'pill ' + (b.script === 'Approved' ? 'delivered' : 'unpaid')}>Script {b.script}</span>}
        {b.song && <span className="pill editing">🎵 {b.song}</span>}
      </div>
      {b.scriptLink && <div className="small" style={{marginBottom:4}}>📜 <a href={b.scriptLink} target="_blank" rel="noreferrer">{b.scriptLink}</a></div>}
      {b.location && <div className="small" style={{marginBottom:4}}>📍 {b.location} · <a target="_blank" rel="noreferrer"
        href={'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(b.location)}>Navigate ↗</a></div>}
      {b.post && <div className="small muted" style={{marginBottom:4}}>Post: {b.post}</div>}

      <details className="sm-gear">
        <summary className="small" style={{fontWeight:700, cursor:'pointer'}}>🎒 Gear check ({gear.filter(g => g.done).length}/{gear.length})</summary>
        {gear.map((g, i) => (
          <label key={i} className="shotrow" style={{fontSize:14, padding:'8px 4px'}}>
            <input type="checkbox" checked={!!g.done} onChange={() => toggleGear(i)}/>
            <span style={g.done ? {opacity:.45, textDecoration:'line-through'} : null}>{g.t}</span>
          </label>))}
      </details>

      <div className="flex" style={{marginTop:16, marginBottom:4}}>
        <h3 style={{marginBottom:0, fontSize:17}}>Shot list</h3>
        <span className="pill client-review">{doneN}/{shots.length}</span>
        <span className="spacer"></span>
      </div>
      <div className="progress" style={{marginBottom:8}}><div style={{width: (shots.length ? doneN / shots.length * 100 : 0) + '%'}}></div></div>
      {shots.map((s, i) => (
        <label key={i} className="shotrow">
          <input type="checkbox" checked={!!s.done} onChange={() => toggleShot(i)}/>
          <span style={s.done ? {opacity:.4, textDecoration:'line-through'} : null}>{s.t}</span>
        </label>))}
      <div className="flex" style={{marginTop:8}}>
        <input placeholder="+ add a shot…" value={newShot} onChange={e => setNewShot(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && addShot()}/>
        <button className="btn ghost sm" onClick={addShot}>Add</button>
      </div>

      <div style={{marginTop:16}}>
        <label className="f">Field notes</label>
        <textarea rows="2" placeholder="Re-shoot kitchen at twilight, agent wants pool featured…"
          value={d.notes || ''} onChange={e => updateDeliverable(d.id, {notes: e.target.value})}/>
      </div>

      <div className="flex" style={{marginTop:18}}>
        <span className="small faint">{doneN === shots.length && shots.length > 0 ? 'Everything captured 🎬' : (shots.length - doneN) + ' shots to go'}</span>
        <span className="spacer"></span>
        {d.status !== 'Shot' && d.status !== 'Editing' && d.status !== 'Client Review' && d.status !== 'Delivered' &&
          <button className="btn" style={{fontSize:16, padding:'12px 26px'}}
            onClick={() => { updateDeliverable(d.id, {status: 'Shot'}); onClose(); }}>✓ Wrap — Mark Shot</button>}
      </div>
    </div>
  </div>);
}

const WMO_TEXT = code => {
  if(code === 0) return 'Sunny';
  if(code <= 2) return 'Partly Cloudy';
  if(code === 3) return 'Cloudy';
  if(code === 45 || code === 48) return 'Foggy';
  if(code >= 51 && code <= 67) return 'Rain';
  if(code >= 71 && code <= 77) return 'Snow';
  if(code >= 80 && code <= 82) return 'Showers';
  if(code >= 95) return 'Thunderstorms';
  return '';
};

function WeatherBoard({db, updateSettings}){
  const [wx, setWx] = useState({loading: true});
  const geoCache = React.useRef({});
  const homeBase = db.settings.homeBase || 'Oakville';
  const td = today();
  const shootLocs = [...new Set(db.deliverables
    .filter(d => d.shootDate === td && d.status !== 'Delivered')
    .map(d => (getBrief(d).location || '').trim()).filter(Boolean))].slice(0, 2);

  const geocode = async (q) => {
    if(geoCache.current[q] !== undefined) return geoCache.current[q];
    const parts = q.split(',').map(s => s.trim()).filter(Boolean);
    const tries = [...new Set([q, ...parts, ...parts.map(t => t.replace(/^[0-9][0-9\s-]*/, '').trim())])].filter(Boolean);
    for(const t of tries){
      try {
        const r = await fetch('https://geocoding-api.open-meteo.com/v1/search?count=1&language=en&name=' + encodeURIComponent(t));
        const j = await r.json();
        const g = j.results && j.results[0];
        if(g){ const v = {lat: g.latitude, lon: g.longitude, label: g.name}; geoCache.current[q] = v; return v; }
      } catch(e){}
    }
    geoCache.current[q] = null;
    return null;
  };
  const forecast = async (lat, lon) => {
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon +
      '&current=temperature_2m,weather_code,is_day&hourly=temperature_2m,precipitation_probability,weather_code' +
      '&daily=temperature_2m_max,precipitation_probability_max,weather_code,sunrise,sunset&forecast_days=2&timezone=auto');
    const r2 = await fetch('https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon +
      '&daily=temperature_2m_max,precipitation_probability_max,weather_code&forecast_days=5&timezone=auto');
    const j = await r.json(); const j2 = await r2.json();
    return {
      temp: Math.round(j.current.temperature_2m), code: j.current.weather_code, isDay: j.current.is_day,
      sun: {rise: j.daily.sunrise[0], set: j.daily.sunset[0]},
      hourly: j.hourly.time.map((t, i) => ({t,
        temp: Math.round(j.hourly.temperature_2m[i]),
        precip: j.hourly.precipitation_probability[i],
        code: j.hourly.weather_code[i]})),
      days: j2.daily.time.map((t, i) => ({
        day: i === 0 ? 'Today' : new Date(t + 'T12:00:00').toLocaleDateString('en-CA', {weekday:'long'}),
        high: Math.round(j2.daily.temperature_2m_max[i]),
        precip: j2.daily.precipitation_probability_max[i],
        code: j2.daily.weather_code[i]
      }))
    };
  };
  const load = async () => {
    setWx({loading: true});
    try {
      const cards = [];
      const locToLabel = {};
      let origin = null, gpsFailed = false;
      if(db.settings.useGeo && navigator.geolocation){
        try {
          const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, {timeout: 8000, maximumAge: 600000}));
          const glat = pos.coords.latitude, glon = pos.coords.longitude;
          let label = 'My location';
          try {
            const rr = await fetch('https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=' + glat + '&longitude=' + glon + '&localityLanguage=en');
            const jj = await rr.json();
            label = jj.city || jj.locality || jj.principalSubdivision || label;
          } catch(e){}
          origin = {lat: glat, lon: glon, label, gps: true};
        } catch(e){ gpsFailed = true; }
      }
      if(!origin){ const hg = await geocode(homeBase); if(hg) origin = {lat: hg.lat, lon: hg.lon, label: hg.label, gps: false}; }
      const hg = origin;
      if(origin) cards.push({kind: origin.gps ? '📡' : '🏠', label: origin.label, home: true, lat: origin.lat, lon: origin.lon, shoots: [], ...(await forecast(origin.lat, origin.lon))});
      for(const loc of shootLocs){
        const g = await geocode(loc);
        if(!g) continue;
        locToLabel[loc] = g.label;
        if(cards.some(c => c.label === g.label)) continue;
        cards.push({kind: '📍', label: g.label, lat: g.lat, lon: g.lon, rawLoc: loc, shoots: [], ...(await forecast(g.lat, g.lon))});
      }
      // driving time + distance from home base to each shoot location (OSRM, city-level)
      if(hg){
        for(const c of cards){
          if(c.home) continue;
          try {
            const rt = await fetch('https://router.project-osrm.org/route/v1/driving/' +
              hg.lon + ',' + hg.lat + ';' + c.lon + ',' + c.lat + '?overview=false');
            const rj = await rt.json();
            const route = rj.routes && rj.routes[0];
            if(route) c.travel = {min: Math.round(route.duration / 60), km: Math.round(route.distance / 100) / 10};
          } catch(e){}
        }
      }
      // attach today's shoots to the card of their location, else to home
      db.deliverables.filter(d => d.shootDate === td && d.status !== 'Delivered').forEach(d => {
        const loc = (getBrief(d).location || '').trim();
        const label = loc && locToLabel[loc];
        const card = cards.find(c => c.label === label) || cards.find(c => c.home) || cards[0];
        if(card) card.shoots.push({title: dlTitle(d), start: d.shootTime || '', end: d.shootEnd || '', loc});
      });
      setWx(cards.length ? {cards, origin, gpsFailed} : {error: 'Couldn\u2019t reach the weather service ("' + (window.location.protocol === 'file:' ? 'Safari blocks web requests from local files — host the app or use Chrome' : 'no match for ' + homeBase) + '"). Tap to change city.'});
    } catch(e){ setWx({error: 'Weather failed: ' + (e.message || e) + (window.location.protocol === 'file:' ? ' — likely Safari blocking local-file requests.' : '')}); }
  };
  useEffect(() => { load(); const t = setInterval(load, 30 * 60 * 1000); return () => clearInterval(t); }, [homeBase, shootLocs.join('|')]);

  const editHome = () => { const v = prompt('Home base city for weather:', homeBase); if(v && v.trim()) updateSettings({homeBase: v.trim()}); };

  if(wx.loading) return <div className="wxstrip"><span className="wxchip faint">Fetching weather…</span></div>;
  if(wx.error) return <div className="wxstrip"><span className="wxchip clickable" onClick={editHome}>⚠ {wx.error}</span><button className="btn ghost sm" onClick={load}>Retry</button></div>;
  return (
    <div className="wxgrid">
      {wx.cards.map((c, i) => (
        <div key={i} className={'wxcard' + (c.isDay ? '' : ' night')} onClick={c.home ? editHome : undefined}
          style={c.home ? {cursor:'pointer'} : null} title={c.home ? 'Tap to change home base city' : ''}>
          <div className="wxhero">
            <div>
              <div className="wxloc">{c.home ? '' : '📍 '}{c.label}</div>
              <div className="wxtemp">{c.temp}°</div>
              {!c.home &&
                <div className="wxtravel">🚗 {c.travel ? `~${c.travel.min} min · ${c.travel.km} km from ${wx.origin ? wx.origin.label : homeBase.split(',')[0]} · ` : ''}<a
                  href={'https://www.google.com/maps/dir/?api=1&origin=' + encodeURIComponent(wx.origin ? wx.origin.lat + ',' + wx.origin.lon : homeBase) + '&destination=' + encodeURIComponent(c.rawLoc || c.label)}
                  target="_blank" rel="noreferrer" onClick={e => e.stopPropagation()}>Navigate ↗</a></div>}
            </div>
            <div style={{textAlign:'right'}}>
              <div className="wxcond">{WMO(c.code)} {WMO_TEXT(c.code)}</div>
              {c.sun && (() => {
                const ft = iso => new Date(iso).toLocaleTimeString('en-CA', {hour:'numeric', minute:'2-digit'});
                const golden = new Date(new Date(c.sun.set).getTime() - 45 * 60000);
                return <div className="wxsun">☀ {ft(c.sun.rise)} · 🌇 {ft(c.sun.set)} · golden {ft(golden.toISOString())}–{ft(c.sun.set)}</div>;
              })()}
              <div className="wxsrc">
                {c.home ? <>
                  {wx.gpsFailed && <span>📡 GPS blocked — using fixed city · </span>}
                  <button className="wxlink" onClick={e => { e.stopPropagation(); editHome(); }}>✎ set city</button>
                  <span> · </span>
                  <button className="wxlink" onClick={e => { e.stopPropagation(); updateSettings({useGeo: !db.settings.useGeo}); }}>
                    {db.settings.useGeo ? '🏠 use fixed city' : '📡 use my location'}
                  </button>
                </> : 'Weather from Open-Meteo'}
              </div>
            </div>
          </div>
          {c.shoots && c.shoots.length > 0 &&
            <div className="wxshootline">
              {c.shoots.map((s, si) => (
                <span key={si} className="wxshoot">🎥 {s.title}{s.start ? ' · ' + fmtTime(s.start) + (s.end ? ' – ' + fmtTime(s.end) : '') : ''}
                  {s.loc && <> · <a className="wxlink" onClick={e => e.stopPropagation()} target="_blank" rel="noreferrer"
                    href={'https://www.google.com/maps/dir/?api=1&origin=' + encodeURIComponent(wx.origin ? wx.origin.lat + ',' + wx.origin.lon : homeBase) + '&destination=' + encodeURIComponent(s.loc)}>Navigate ↗</a></>}
                </span>))}
            </div>}
          {(() => {
            if(!c.hourly) return null;
            const now = new Date(); now.setMinutes(0,0,0);
            let winStart = new Date(now);
            let winEnd = new Date(now.getTime() + 14 * 3600000);
            const spans = (c.shoots || []).filter(s => s.start).map(s => {
              const a = new Date(td + 'T' + s.start);
              const b = s.end ? new Date(td + 'T' + s.end) : new Date(a.getTime() + 3600000);
              return {a, b};
            });
            spans.forEach(sp => { if(sp.a < winStart) winStart = new Date(sp.a); if(sp.b > winEnd) winEnd = new Date(sp.b); });
            const cells = c.hourly.filter(h => { const ht = new Date(h.t); return ht >= winStart && ht <= winEnd; }).slice(0, 20);
            const inShoot = ht => spans.some(sp => ht < sp.b && new Date(ht.getTime() + 3600000) > sp.a);
            if(cells.length === 0) return null;
            return (
            <div className="wxhours">
              {cells.map((h, j) => { const ht = new Date(h.t); const hit = inShoot(ht); return (
                <div key={j} className={'wxhr' + (hit ? ' shoot' : '')}>
                  <div className="ht">{ht.toLocaleTimeString('en-CA', {hour:'numeric'})}</div>
                  <div className="hicon">{hit ? '🎥' : WMO(h.code)}</div>
                  <div className="hv">{h.temp}°</div>
                  <div className="hp">💧{h.precip}%</div>
                </div>);})}
            </div>);
          })()}
          <div className="wxdays">
            {c.days.map((d, j) => (
              <div key={j} className="wxday">
                <div className="wd">{d.day}</div>
                <div className="wh">{d.high}°</div>
                <div className="wp">💧 {d.precip}%</div>
              </div>))}
          </div>
        </div>))}
    </div>);
}

function NextShootCountdown({db, openOrderDetail}){
  const [, setT] = useState(0);
  useEffect(() => { const i = setInterval(() => setT(x => x + 1), 1000); return () => clearInterval(i); }, []);
  const now = new Date();
  const next = db.deliverables
    .filter(d => d.status !== 'Delivered' && d.shootDate)
    .map(d => ({d, at: new Date(d.shootDate + 'T' + (d.shootTime || '12:00'))}))
    .filter(x => x.at > now)
    .sort((a,b) => a.at - b.at)[0];
  if(!next) return null;
  const o = db.orders.find(x => x.id === next.d.orderId) || {};
  const ms = next.at - now;
  const days = Math.floor(ms / 86400000);
  const hrs = Math.floor(ms % 86400000 / 3600000);
  const min = Math.floor(ms % 3600000 / 60000);
  const sec = Math.floor(ms % 60000 / 1000);
  return (
  <div className="nextup" onClick={() => openOrderDetail(next.d.orderId, next.d.id)}>
    <div>
      <div className="l">Next Shoot</div>
      <strong>{dlTitle(next.d)}</strong>
      <div className="small">{o.project}{next.d.shootDate ? ' · ' + fmtDate(next.d.shootDate) : ''}{timeRange(next.d) ? ' · ' + timeRange(next.d) : ''}</div>
    </div>
    <div className="cdclock serif">
      {days > 0 && <span>{days}<em>d</em> </span>}{hrs}<em>h</em> {String(min).padStart(2,'0')}<em>m</em> {String(sec).padStart(2,'0')}<em>s</em>
    </div>
  </div>);
}

function ReviewTab({db, clientName, pushHub, openOrderDetail, showToast}){
  const [rows, setRows] = useState(null);
  const [err, setErr] = useState('');
  const [co, setCo] = useState(null);
  const [cid, setCid] = useState(null);
  const [dlId, setDlId] = useState(null);
  const [msg, setMsg] = useState('');
  const cfg = db.settings.inboxUrl && db.settings.inboxToken;
  const load = async () => {
    if(!cfg) return;
    try {
      const r = await fetch(db.settings.inboxUrl + '?token=' + encodeURIComponent(db.settings.inboxToken));
      const j = await r.json();
      if(!j.ok) throw new Error(j.error || 'fetch failed');
      setRows(j.rows || []); setErr('');
    } catch(e){ setErr(String(e.message || e)); if(rows === null) setRows([]); }
  };
  useEffect(() => { load(); }, []);
  useEffect(() => {
    if(!dlId) return;
    const t = setInterval(load, 45000);
    return () => clearInterval(t);
  }, [dlId]);
  useEffect(() => {
    const box = document.getElementById('cbscroll');
    if(box) box.scrollTop = box.scrollHeight;
  }, [rows, dlId]);

  const reviews = db.deliverables.filter(d => d.reviewUrl || (d.reviewVersions || []).length > 0 || isReviewStage(d.status));
  const ordOf = d => db.orders.find(o => o.id === d.orderId) || {};
  const clOf = d => db.clients.find(c => c.id === ordOf(d).clientId);
  const coOf = c => ((c && c.company) || '').trim() || 'Independent';
  const convFor = d => (rows || []).filter(r => r.ref === d.id && (r.kind === 'msg' || r.kind === 'feedback'));
  const lastOf = d => { const rr = convFor(d); return rr.length ? rr[rr.length - 1] : null; };
  const approvedOf = d => (rows || []).some(r => r.kind === 'feedback' && r.ref === d.id && String(r.body).indexOf('\u2713 APPROVED') > -1);

  const header = (title, back) => (
    <div className="flex" style={{marginBottom:14}}>
      {back && <button className="btn ghost sm" onClick={back}>‹ Back</button>}
      <h2 className="serif" style={{fontSize:22, marginBottom:0}}>{title}</h2>
      <span className="spacer"></span>
      <button className="btn ghost sm" title="Check for new items now" onClick={load}>⟳</button>
    </div>);

  if(!cfg) return (<>
    {header('Review Rooms')}
    <div className="card"><p className="small muted">Connect the Client Submissions inbox on Home first — conversations and feedback flow through it.</p></div>
  </>);

  // ---------- L4: conversation ----------
  if(dlId){
    const d = db.deliverables.find(x => x.id === dlId);
    if(!d){ setDlId(null); return null; }
    const o = ordOf(d), c = clOf(d);
    const conv = convFor(d);
    const send = async () => {
      const body = msg.trim();
      if(!body) return;
      setMsg('');
      setRows(r => [...(r || []), {id: 'tmp' + Date.now(), ts: new Date().toISOString(), kind: 'msg', ref: d.id, who: 'Jag', from: 'jag', body}]);
      try {
        await fetch(db.settings.inboxUrl, {method:'POST', body: JSON.stringify({kind:'msg', ref: d.id, project: o.project || d.group, dname: dlTitle(d), who: 'Jag', from: 'jag', body})});
        setTimeout(load, 900);
      } catch(e){ alert('Send failed — check connection.'); }
    };
    return (<>
      {header(dlTitle(d), () => setDlId(null))}
      <div className="card">
        <div className="flex" style={{flexWrap:'wrap'}}>
          <span className="small faint">{o.project || d.group} · {(c && c.name) || ''}</span>
          <span className={'pill ' + stClass(d.status)}>{STATUS_LABEL(d.status)}</span>
          {approvedOf(d) && <span className="pill delivered">✓ Approved</span>}
          <span className="spacer"></span>
          {d.reviewUrl && <CopyBtn text={reviewShareText(d, o, d.reviewUrl)} label="📋 Share link"/>}
          {d.reviewUrl && <button className="btn ghost sm" onClick={() => window.open(d.reviewUrl, '_blank')}>Room ↗</button>}
          <button className="btn ghost sm" onClick={() => openOrderDetail(d.orderId, d.id)}>Order →</button>
        </div>
        <div className="cbs" id="cbscroll">
          {conv.length === 0 && <p className="small faint" style={{textAlign:'center', padding:20}}>No conversation yet — say hi below, it appears right inside their review page.</p>}
          {conv.map(r => {
            const mine = r.from === 'jag';
            const isFb = r.kind === 'feedback';
            return (
            <div key={r.id} className={'cb' + (mine ? ' me' : ' them') + (isFb ? ' fb' : '')}>
              <span className="cwho">{isFb ? '💬 Feedback · ' : ''}{mine ? 'You' : (r.who || 'Agent')} · {String(r.ts).slice(5, 16).replace('T', ' ')}</span>
              {r.body}
            </div>);
          })}
        </div>
        <div className="crow2">
          <input placeholder={'Message ' + (((c && c.name) || 'them').split(' ')[0]) + '…'} value={msg}
            onChange={e => setMsg(e.target.value)}
            onKeyDown={e => { if(e.key === 'Enter') send(); }} style={{flex:1}}/>
          <button className="btn sm" disabled={!msg.trim()} onClick={send}>Send</button>
        </div>
      </div>
    </>);
  }

  // ---------- L3: agent's content ----------
  if(cid){
    const c = db.clients.find(x => x.id === cid);
    const mine = reviews.filter(d => (clOf(d) || {}).id === cid)
      .sort((a, b) => String(lastOf(b) ? lastOf(b).ts : '').localeCompare(String(lastOf(a) ? lastOf(a).ts : '')));
    return (<>
      {header((c ? c.name : 'Agent'), () => setCid(null))}
      <div className="flex" style={{marginBottom:10}}>
        <button className="btn ghost sm" title="Copy this agent's permanent portal link — all their projects, one URL, no login"
          onClick={() => { const u = pushHub(cid); if(u){ copyText(u); showToast('🔗 Agent hub link copied — ' + u); } else alert('Set the review page URL + inbox first (tap 🎬 on any deliverable once).'); }}>
          🏠 Copy agent hub link</button>
      </div>
      <div className="card">
        {mine.length === 0 && <p className="small faint" style={{padding:12, textAlign:'center'}}>No review rooms with this agent yet.</p>}
        {mine.map((d, i) => {
          const o = ordOf(d), last = lastOf(d);
          return (
          <div key={d.id} className="flex" style={{padding:'12px 0', borderTop: i ? '1px solid var(--line)' : 'none', cursor:'pointer', flexWrap:'wrap'}}
            onClick={() => setDlId(d.id)}>
            <div style={{flex:1, minWidth:200}}>
              <div className="flex"><strong>{dlTitle(d)}</strong>
                <span className={'pill ' + stClass(d.status)}>{STATUS_LABEL(d.status)}</span>
                {approvedOf(d) && <span className="pill delivered">✓</span>}</div>
              <div className="small faint" style={{marginTop:3, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', maxWidth:'60vw'}}>
                {last ? ((last.from === 'jag' ? 'You: ' : '') + String(last.body).split('\n')[0]) : (o.project || d.group)}</div>
            </div>
            <span className="small faint">{last ? String(last.ts).slice(5, 10) : ''}</span>
            <span className="faint">›</span>
          </div>);})}
      </div>
    </>);
  }

  // ---------- L2: agents in brokerage ----------
  if(co){
    const agents = {};
    reviews.forEach(d => { const c = clOf(d); if(c && coOf(c) === co) agents[c.id] = c; });
    const list = Object.values(agents).sort((a, b) => (a.name || '').localeCompare(b.name || ''));
    return (<>
      {header(co, () => setCo(null))}
      <div className="card">
        {list.map((c, i) => {
          const n = reviews.filter(d => (clOf(d) || {}).id === c.id).length;
          return (
          <div key={c.id} className="flex" style={{padding:'12px 0', borderTop: i ? '1px solid var(--line)' : 'none', cursor:'pointer'}}
            onClick={() => setCid(c.id)}>
            <strong>{c.name}</strong>
            <span className="small faint">{n} project{n !== 1 ? 's' : ''}</span>
            <span className="spacer"></span><span className="faint">›</span>
          </div>);})}
      </div>
    </>);
  }

  // ---------- L1: brokerages ----------
  const bset = {};
  reviews.forEach(d => { const c = clOf(d); const k = coOf(c); bset[k] = bset[k] || {agents: new Set(), n: 0}; if(c) bset[k].agents.add(c.id); bset[k].n++; });
  const bros = Object.keys(bset).sort();
  return (<>
    {header('Review Rooms')}
    {err && <p className="small" style={{color:'var(--red)'}}>Feedback couldn\u2019t load: {err}</p>}
    {bros.length === 0 && <div className="card"><p className="small faint" style={{textAlign:'center', padding:16}}>No review rooms yet — tap 🎬 Review room on any deliverable and it appears here, filed under its brokerage and agent.</p></div>}
    <div className="card">
      {bros.map((k, i) => (
        <div key={k} className="flex" style={{padding:'13px 0', borderTop: i ? '1px solid var(--line)' : 'none', cursor:'pointer'}}
          onClick={() => setCo(k)}>
          <strong style={{fontSize:15.5}}>{k}</strong>
          <span className="small faint">{bset[k].agents.size} agent{bset[k].agents.size !== 1 ? 's' : ''} · {bset[k].n} project{bset[k].n !== 1 ? 's' : ''}</span>
          <span className="spacer"></span><span className="faint">›</span>
        </div>))}
    </div>
  </>);
}

const dayDiff = (a, b) => Math.round((new Date(b + 'T12:00') - new Date(a + 'T12:00')) / 864e5);
const shortDate = ds => new Date(ds + 'T12:00').toLocaleDateString('en-CA', {month:'short', day:'numeric'});

function DigestStrip({db}){
  const td = today();
  const shoots = db.deliverables.filter(d => d.shootDate === td && d.status !== 'Delivered');
  const first = shoots.map(d => d.shootTime).filter(Boolean).sort()[0];
  const dueToday = db.deliverables.filter(d => !promiseMet(d) && dueDatesOf(d).some(x => x.date === td));
  const waiting = db.deliverables.filter(d => d.status === 'Booked').length;
  const pend = db.pendingBookings.length;
  const parts = [];
  if(shoots.length) parts.push(`${shoots.length} shoot${shoots.length > 1 ? 's' : ''}${first ? ' (first ' + fmtTime(first) + ')' : ''}`);
  if(dueToday.length) parts.push(`${dueToday.length} deliver${dueToday.length > 1 ? 'ies' : 'y'} due`);
  if(pend) parts.push(`${pend} booking${pend > 1 ? 's' : ''} to review`);
  if(waiting) parts.push(`${waiting} credit${waiting > 1 ? 's' : ''} waiting`);
  const dow = new Date().toLocaleDateString('en-CA', {weekday:'short'});
  const line = parts.length ? `${dow}: ` + parts.join(' · ') : `${dow}: clear runway — no shoots or deadlines today.`;
  return (
      <div className="flex">
        <span style={{fontWeight:700, fontSize:14.5}}>{line}</span>
        <span className="spacer"></span>
        <CopyBtn text={line} label="📋"/>
      </div>);
}

const WX_GLYPH = c => c === null || c === undefined ? '' : c <= 1 ? '☀️' : c <= 3 ? '⛅' : c <= 48 ? '🌫' : c <= 67 ? '🌧' : c <= 77 ? '🌨' : c <= 82 ? '🌧' : c <= 86 ? '🌨' : '⛈';
function WeekStrip({db, goCalendar}){
  const td = today();
  const [wx, setWx] = useState(null);
  useEffect(() => {
    if(!db.settings.useGeo || !navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(pos => {
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&daily=weathercode&forecast_days=7&timezone=auto`)
        .then(r => r.json()).then(j => { if(j.daily) setWx(j.daily); }).catch(() => {});
    }, () => {}, {maximumAge: 600000, timeout: 8000});
  }, []);
  const days = Array.from({length: 7}, (_, i) => addDays(td, i));
  return (
    <div style={{marginTop:11}}>
      <div style={{display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:6}}>
        {days.map((ds, i) => {
          const shoots = db.deliverables.filter(d => d.shootDate === ds && d.status !== 'Delivered').length;
          const dues = db.deliverables.filter(d => !promiseMet(d) && dueDatesOf(d).some(x => x.date === ds)).length;
          const wcode = wx && wx.time ? wx.weathercode[wx.time.indexOf(ds)] : null;
          return (
            <button key={ds} title="Open the calendar" onClick={goCalendar} style={{background: i === 0 ? 'var(--panel2)' : 'transparent',
              border: '1px solid ' + (i === 0 ? 'var(--red)' : 'var(--line)'), borderRadius:8, padding:'7px 2px 6px',
              color:'var(--txt)', cursor:'pointer', textAlign:'center'}}>
              <div className="small faint" style={{fontSize:10, textTransform:'uppercase', letterSpacing:'.06em'}}>{new Date(ds + 'T12:00').toLocaleDateString('en-CA', {weekday:'narrow'})}</div>
              <div style={{fontWeight:800, fontSize:14}}>{+ds.slice(8)}</div>
              <div style={{fontSize:11, minHeight:15}}>{WX_GLYPH(wcode)}</div>
              <div style={{fontSize:9, minHeight:12, letterSpacing:1}}>
                {shoots > 0 && <span style={{color:'var(--red)'}}>{'●'.repeat(Math.min(shoots, 3))}</span>}
                {dues > 0 && <span style={{color:'#e8b84a'}}>{'●'.repeat(Math.min(dues, 3))}</span>}
              </div>
            </button>);
        })}
      </div>
    </div>);
}

function ActionQueue({db, openOrderDetail, goCalendar}){
  const [showAll, setShowAll] = useState(false);
  const td = today();
  const ordOf = d => db.orders.find(o => o.id === d.orderId) || {};
  const clOf = d => db.clients.find(c => c.id === ordOf(d).clientId) || {};
  const items = [];
  db.deliverables.filter(isOverdue).forEach(d => {
    const late = dayDiff(dueDateOf(d), td);
    items.push({pri: 0, icon: '🔴', txt: `${dlTitle(d)} is ${late}d late`, btn: 'Open →', act: () => openOrderDetail(d.orderId, d.id)});
  });
  db.deliverables.filter(d => d.shootDate && d.shootDate >= td && d.shootDate <= addDays(td, 1) &&
    ['Booked','Scheduled'].includes(d.status) && !(getBrief(d).topic || '').trim()).forEach(d => {
    const c = clOf(d), o = ordOf(d);
    items.push({pri: 1, icon: '📝', txt: `${dlTitle(d)} shoots ${d.shootDate === td ? 'today' : 'tomorrow'} — no brief yet`,
      btn: db.settings.briefFormUrl ? '📋 Form link' : 'Open →',
      act: () => {
        if(!db.settings.briefFormUrl){ openOrderDetail(d.orderId, d.id); return; }
        const pin = c.tier === 'partner' || c.tier === 'internal';
        const u = db.settings.briefFormUrl + '?p=' + encodeURIComponent(o.project || d.group) +
          '&n=' + encodeURIComponent((c.name || '').split(' ')[0]) + '&t=' + (pin ? 'pin' : 'rem') +
          '&r=' + encodeURIComponent(d.id) +
          (db.settings.inboxUrl ? '&e=' + encodeURIComponent(db.settings.inboxUrl) : '');
        copyText(u); showToast('📋 Brief form link copied — text it over');
      }});
  });
  db.deliverables.filter(d => isReviewStage(d.status) && d.reviewDate && dayDiff(d.reviewDate, td) >= 4).forEach(d => {
    const c = clOf(d), n = dayDiff(d.reviewDate, td), first = (c.name || 'them').split(' ')[0];
    items.push({pri: 2, icon: '👀', txt: `${dlTitle(d)} with ${first} for ${n}d`, btn: '📋 Nudge',
      act: () => { copyText(`Hi ${first} — just checking in on ${dlTitle(d)}. Any notes, or good to finalize? ${d.reviewUrl || d.link || ''}`.trim());
        showToast('📋 Nudge copied — send it over'); }});
  });
  if(db.pendingBookings.length)
    items.push({pri: 3, icon: '⚡', txt: `${db.pendingBookings.length} Calendly booking${db.pendingBookings.length > 1 ? 's' : ''} waiting review`, btn: 'Review →', act: goCalendar});
  db.orders.forEach(o => {
    const waiting = db.deliverables.filter(d => d.orderId === o.id && d.status === 'Booked');
    const hasUpcoming = db.deliverables.some(d => d.orderId === o.id && d.shootDate && d.shootDate >= td);
    if(waiting.length >= 1 && !hasUpcoming){
      const c = db.clients.find(x => x.id === o.clientId) || {};
      items.push({pri: 4, icon: '💳', txt: `${(c.name || 'Client').split(' ')[0]}: ${waiting.length} credit${waiting.length > 1 ? 's' : ''} unscheduled`, btn: 'Open →', act: () => openOrderDetail(o.id, waiting[0].id)});
    }
  });
  const ranked = items.sort((a, b) => a.pri - b.pri);
  if(ranked.length === 0) return null;
  const top = showAll ? ranked.slice(0, 14) : ranked.slice(0, 5);
  return (
    <div className="card">
      <h3 style={{fontSize:17, marginBottom:6}}>⚡ Action Queue</h3>
      {top.map((it, i) => (
        <div key={i} className="flex" style={{padding:'8px 0', borderTop: i ? '1px solid var(--line)' : 'none'}}>
          <span>{it.icon}</span>
          <span className="small" style={{fontWeight:600}}>{it.txt}</span>
          <span className="spacer"></span>
          <button className="btn ghost sm" onClick={it.act}>{it.btn}</button>
        </div>))}
      {ranked.length > 5 &&
        <button className="btn ghost sm" style={{marginTop:8}} onClick={() => setShowAll(s => !s)}>
          {showAll ? '− Show less' : '+ ' + (ranked.length - 5) + ' more'}</button>}
    </div>);
}

function WinBack({db}){
  const [open, setOpen] = useState(false);
  const td = today();
  const rows = db.clients.filter(c => c.tier !== 'internal').map(c => {
    const dls = db.deliverables.filter(d => (db.orders.find(o => o.id === d.orderId) || {}).clientId === c.id);
    if(dls.length === 0) return null;
    if(dls.some(d => d.status !== 'Delivered')) return null;
    const last = dls.map(d => d.deliveredDate || d.reviewDate || d.shootDate || '').filter(Boolean).sort().pop();
    if(!last || dayDiff(last, td) < 45) return null;
    return {c, last, days: dayDiff(last, td)};
  }).filter(Boolean).sort((a, b) => b.days - a.days).slice(0, 3);
  if(rows.length === 0) return null;
  if(!open) return (
    <div className="card" style={{padding:'10px 16px'}}>
      <div className="flex">
        <span className="small" style={{fontWeight:700}}>🔄 {rows.length} client{rows.length > 1 ? 's' : ''} gone quiet 45+ days</span>
        <span className="spacer"></span>
        <button className="btn ghost sm" onClick={() => setOpen(true)}>View</button>
      </div>
    </div>);
  return (
    <div className="card">
      <div className="flex"><h3 style={{fontSize:17, marginBottom:6}}>🔄 Win-back</h3><span className="spacer"></span><button className="btn ghost sm" onClick={() => setOpen(false)}>− Collapse</button></div>
      {rows.map(({c, last, days}, i) => (
        <div key={c.id} className="flex" style={{padding:'8px 0', borderTop: i ? '1px solid var(--line)' : 'none'}}>
          <span className="small" style={{fontWeight:600}}>{c.name}</span>
          <span className="small faint">last {shortDate(last)} · {days}d ago</span>
          <span className="spacer"></span>
          <CopyBtn label="📋 Check-in" text={`Hey ${(c.name || '').split(' ')[0]}! It's been a minute — any listings or content coming up? Happy to grab you a spot this week. 🎥`}/>
        </div>))}
    </div>);
}

function Dashboard({db, stats, clientName, orderProgress, openOrderDetail, updateDeliverable, setPrintDoc, openNewBooking, updateSettings, updateOrder, openShootMode, markSubHandled, goCalendar}){
  const [showArchive, setShowArchive] = useState(false);
  const orderOf = d => db.orders.find(o => o.id === d.orderId) || {};
  const td = today();
  const in48 = addDays(td, 2);
  const todaysShoots = db.deliverables.filter(d => d.shootDate === td && d.status !== 'Delivered');
  const dueSoon = db.deliverables
    .flatMap(d => promiseMet(d) ? [] : dueDatesOf(d).map(x => ({d, date: x.date, kind: x.kind})))
    .filter(x => x.date <= in48)
    .sort((a,b) => a.date.localeCompare(b.date));
  const activeOrders = db.orders.filter(o => { const p = orderProgress(o.id); return p.done < p.total || p.total === 0; });
  const upcoming = db.deliverables.filter(d => d.shootDate && d.status !== 'Delivered' && d.shootDate > td)
    .sort((a,b) => a.shootDate.localeCompare(b.shootDate)).slice(0,6);
  const dueLater = db.deliverables
    .filter(d => { const due = dueDateOf(d); return due && d.status !== 'Delivered' && due > in48; })
    .map(d => ({d, due: dueDateOf(d)}))
    .sort((a,b) => a.due.localeCompare(b.due)).slice(0,8);

  const agedUnpaid = db.orders
    .filter(o => o.payment !== 'paid' && o.date && daysSince(o.date) >= 14)
    .sort((a,b) => a.date.localeCompare(b.date));
  const feedbackDue = db.orders.map(o => {
    const ods = db.deliverables.filter(d => d.orderId === o.id);
    if(ods.length === 0 || ods.some(d => d.status !== 'Delivered') || o.rating) return null;
    const last = ods.reduce((a,d) => (d.deliveredDate || '') > a ? d.deliveredDate : a, '');
    if(!last || last > addDays(td, -1)) return null;
    return {o, last};
  }).filter(Boolean).slice(0, 5);
  const bdaySoon = db.clients.map(c => ({c, nb: nextBirthday(c.birthday)}))
    .filter(x => x.nb && x.nb.days <= 3).sort((a,b) => a.nb.days - b.nb.days);
  const needList = db.deliverables.filter(d => d.status !== 'Delivered').map(d => {
    const prep = prepScore(d); if(!prep || prep.done === prep.total) return null;
    const b = getBrief(d);
    const missing = [];
    if(b.script !== 'Approved' && b.script !== 'N/A') missing.push('script ' + b.script.toLowerCase());
    if(!b.song) missing.push('song');
    if(!b.orientation) missing.push('orientation');
    return {d, missing};

function downloadBriefForm(d, o, c){
  const html = buildBriefForm(d, o, c);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([html], {type: 'text/html'}));
  a.download = 'brief-' + (dlTitle(d) || 'shoot').toLowerCase().replace(/[^a-z0-9]+/g, '-').slice(0, 40) + '.html';
  document.body.appendChild(a); a.click(); a.remove();
}
function parseBriefBlob(txt){
  const map = {'topic':'topic', 'script':'script', 'script link':'scriptLink', 'scriptlink':'scriptLink',
    'song':'song', 'music':'song', 'orientation':'orientation', 'format':'orientation',
    'style':'style', 'editing style':'style', 'location':'location', 'access':'location',
    'post':'post', 'post-production':'post', 'delivery':'delivery', 'platform':'delivery'};
  const out = {};
  (txt || '').split(/\r?\n/).forEach(line => {
    const m = line.match(/^\s*([A-Za-z /-]+?)\s*:\s*(.*)$/);
    if(!m) return;
    const k = map[m[1].trim().toLowerCase()];
    const val = m[2].trim();
    if(!k || !val) return;
    if(k === 'script'){ out.script = /draft/i.test(val) ? 'Drafted' : (/n\/?a|no script|none/i.test(val) ? 'N/A' : /approved/i.test(val) ? 'Approved' : 'Needed'); }
    else if(k === 'orientation'){ out.orientation = /both/i.test(val) ? 'Both' : /horiz|16/i.test(val) ? 'Horizontal' : 'Vertical'; }
    else if(k === 'location'){ out.location = val.replace(/\s*\|\s*/g, ', '); }
    else out[k] = val;
  });
  return out;
}

/* ---------------- Activity Archive ---------------- */
function ActivityArchive({activity, onClose}){
  const [q, setQ] = useState('');
  const list = activity.filter(a => !q.trim() || a.text.toLowerCase().includes(q.toLowerCase()));
  const byDay = {};
  list.forEach(a => {
    const day = new Date(a.t).toLocaleDateString('en-CA', {weekday:'long', month:'long', day:'numeric', year:'numeric'});
    (byDay[day] = byDay[day] || []).push(a);
  });
  return (
  <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
    <div className="modal" style={{maxWidth:680}}>
      <div className="flex" style={{justifyContent:'space-between'}}>
        <h2 style={{marginBottom:0}}>Activity Archive</h2>
        <button title="Close" className="x" onClick={onClose}>✕</button>
      </div>
      <p className="small muted" style={{margin:'6px 0 12px'}}>Every logged action — bookings, status moves, deliveries, payments, ratings, edits. {activity.length} entries kept.</p>
      <input placeholder="🔎 Search — client name, project, 'delivered', 'paid'…" value={q} onChange={e => setQ(e.target.value)} style={{marginBottom:14}}/>
      <div style={{maxHeight:'60vh', overflowY:'auto', paddingRight:6}}>
        {Object.entries(byDay).map(([day, items]) => (
          <div key={day} style={{marginBottom:14}}>
            <div className="small" style={{fontWeight:700, textTransform:'uppercase', letterSpacing:'.1em', color:'var(--cream-faint)', padding:'4px 0', borderBottom:'1px solid var(--line)', position:'sticky', top:0, background:'var(--panel)'}}>{day}</div>
            {items.map((a, i) => (
              <div key={i} className="flex trow" style={{padding:'8px 0'}}>
                <span className="faint small num" style={{minWidth:74}}>{new Date(a.t).toLocaleTimeString('en-CA', {hour:'numeric', minute:'2-digit'})}</span>
                <span className="small">{a.text}</span>
              </div>))}
          </div>))}
        {list.length === 0 && <div className="empty">{q ? 'Nothing matches that search.' : 'No activity yet.'}</div>}
      </div>
    </div>
  </div>);
}
