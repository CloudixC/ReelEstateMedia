/* ---------------- Invoice / Statement printing ---------------- */
function DocModal({doc, db, onClose, updateSettings}){
  const clientOf = cid => db.clients.find(c => c.id === cid) || {};

  if(doc.kind === 'runsheet'){
    const shoots = db.deliverables.filter(d => d.shootDate === doc.date).sort((a,b) => (a.shootTime || '99:99').localeCompare(b.shootTime || '99:99'));
    return (
    <div className="overlay printwrap" onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{width:'100%', maxWidth:800}}>
        <div className="flex noprint" style={{marginBottom:12, justifyContent:'flex-end'}}>
          <button className="btn" onClick={() => window.print()}>🖨 Print / Save PDF</button>
          <button className="btn ghost" onClick={onClose}>Close</button>
        </div>
        <div className="printdoc">
          <div className="flex" style={{alignItems:'flex-start'}}>
            <div>
              <h1 style={{fontSize:28, fontWeight:700}}>Reel Estate <em style={{color:'var(--amber)', fontStyle:'italic'}}>Media</em></h1>
              <div className="small" style={{color:'#5a5c63'}}>Shoot Day Run Sheet</div>
            </div>
            <span className="spacer"></span>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:13, letterSpacing:'.18em', fontWeight:700, color:'var(--amber)'}}>RUN SHEET</div>
              <div className="small" style={{color:'#5a5c63'}}>{fmtDate(doc.date)}</div>
              <div className="small" style={{color:'#5a5c63'}}>{shoots.length} shoot{shoots.length !== 1 ? 's' : ''}</div>
            </div>
          </div>
          <div style={{height:3, background:'var(--amber)', margin:'16px 0 20px'}}></div>
          {shoots.length === 0 && <div className="empty">No shoots scheduled for {fmtDate(doc.date)}.</div>}
          {shoots.map((d, i) => {
            const o = db.orders.find(x => x.id === d.orderId) || {};
            const c = clientOf(o.clientId);
            const b = getBrief(d);
            return (
            <div key={d.id} style={{border:'1px solid #e6e2db', borderRadius:10, padding:'14px 16px', marginBottom:12, pageBreakInside:'avoid'}}>
              <div className="flex">
                <strong style={{fontSize:16}}>{i+1}. {timeRange(d) ? timeRange(d) + ' — ' : ''}{dlTitle(d)}</strong>
                <span className="small" style={{color:'#5a5c63'}}>{b.topic ? d.name + ' · ' : ''}{d.group}</span>
                <span className="spacer"></span>
                <span className={'pill ' + stClass(d.status)}>{STATUS_LABEL(d.status)}</span>
              </div>
              <div className="small" style={{marginTop:6, color:'#17181c'}}>
                <strong>{o.project || 'Untitled project'}</strong> · {c.name || '—'}{c.contact ? ' · ' + c.contact : ''}
              </div>
              {b.location && <div className="small" style={{marginTop:3}}>📍 {b.location}</div>}
              <div className="small" style={{marginTop:6, color:'#5a5c63'}}>
                {[MEDIA_LABEL[mediaOf(d)],
                  b.orientation && ('Format: ' + b.orientation),
                  b.style && ('Style: ' + b.style),
                  ('Script: ' + b.script),
                  b.song && ('🎵 ' + b.song)].filter(Boolean).join('   ·   ')}
              </div>
              {b.scriptLink && <div className="small" style={{marginTop:3, color:'#5a5c63'}}>Script: {b.scriptLink}</div>}
              {b.post && <div className="small" style={{marginTop:3, color:'#5a5c63'}}>Post: {b.post}</div>}
              {b.delivery && <div className="small" style={{marginTop:3, color:'#5a5c63'}}>Deliver as: {b.delivery}</div>}
            </div>);})}
          <div className="small" style={{color:'#8f9198', marginTop:20, borderTop:'1px solid #e6e2db', paddingTop:10}}>
            Delivery promise: photos within 3 days of the shoot · video within 5 days.
          </div>
        </div>
      </div>
    </div>);
  }

  let heading, number, docDate, billTo, subtitle, lines, sub, tax, total, isPaid;

  if(doc.kind === 'order'){
    const o = db.orders.find(x => x.id === doc.orderId);
    if(!o) return null;
    const c = clientOf(o.clientId);
    heading = 'INVOICE';
    number = 'REM-' + o.id.slice(0,6).toUpperCase();
    docDate = fmtDate(o.date);
    billTo = [c.name, companyOf(c) !== 'Independent / Direct' && companyOf(c) !== c.name ? companyOf(c) : '', c.contact].filter(Boolean);
    subtitle = o.project ? 'Re: ' + o.project : '';
    lines = o.items.map(i => ({l: i.name, q: i.qty, r: money(i.price * i.qty)}));
    const t = orderTotals(o); sub = t.sub; tax = t.tax; total = t.total;
    isPaid = o.payment === 'paid';
  } else {
    const moOrders = db.orders.filter(o => o.date && o.date.slice(0,7) === doc.month && companyOf(clientOf(o.clientId)) === doc.company);
    heading = 'MONTHLY STATEMENT';
    number = 'STMT-' + doc.month.replace('-','');
    docDate = new Date(+doc.month.slice(0,4), +doc.month.slice(5,7) - 1, 15).toLocaleDateString('en-CA', {month:'long', year:'numeric'});
    billTo = [doc.company];
    subtitle = moOrders.length + ' order' + (moOrders.length !== 1 ? 's' : '') + ' · ' + docDate;
    lines = moOrders.map(o => ({l: (o.project || 'Untitled') + ' — ' + (clientOf(o.clientId).name || ''), q: fmtDate(o.date), r: money(orderTotals(o).sub)}));
    sub = moOrders.reduce((a,o) => a + orderTotals(o).sub, 0);
    tax = moOrders.reduce((a,o) => a + orderTotals(o).tax, 0);
    total = sub + tax;
    isPaid = moOrders.length > 0 && moOrders.every(o => o.payment === 'paid');
  }

  return (
  <div className="overlay printwrap" onClick={e => e.target === e.currentTarget && onClose()}>
    <div style={{width:'100%', maxWidth:800}}>
      <div className="flex noprint" style={{marginBottom:12, justifyContent:'flex-end'}}>
        <input style={{width:220}} placeholder="HST # (shows on document)" value={db.settings.hstNumber || ''}
          onChange={e => updateSettings({hstNumber: e.target.value})}/>
        <button className="btn" onClick={() => window.print()}>🖨 Print / Save PDF</button>
        <button className="btn ghost" onClick={onClose}>Close</button>
      </div>
      <div className="printdoc">
        {isPaid && <div className="paidstamp">PAID</div>}
        <div className="flex" style={{alignItems:'flex-start'}}>
          <div>
            <h1 style={{fontSize:30, fontWeight:700}}>Reel Estate <em style={{color:'var(--amber)', fontStyle:'italic'}}>Media</em></h1>
            <div className="small" style={{color:'#5a5c63'}}>hello@reelestatemedia.com · calendly.com/hello-reelestatemedia</div>
            {db.settings.hstNumber && <div className="small" style={{color:'#5a5c63'}}>HST # {db.settings.hstNumber}</div>}
          </div>
          <span className="spacer"></span>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:13, letterSpacing:'.18em', fontWeight:700, color:'var(--amber)'}}>{heading}</div>
            <div className="small" style={{color:'#5a5c63'}}>{number}</div>
            <div className="small" style={{color:'#5a5c63'}}>{docDate}</div>
          </div>
        </div>
        <div style={{height:3, background:'var(--amber)', margin:'18px 0 22px'}}></div>

        <div className="small" style={{letterSpacing:'.14em', fontWeight:700, color:'#8f9198', textTransform:'uppercase'}}>Bill To</div>
        {billTo.map((b,i) => <div key={i} style={{fontWeight: i === 0 ? 700 : 400, fontSize: i === 0 ? 16 : 14}}>{b}</div>)}
        {subtitle && <div className="small" style={{color:'#5a5c63', marginTop:4}}>{subtitle}</div>}

        <table style={{marginTop:22}}>
          <thead><tr><th>{doc.kind === 'order' ? 'Service' : 'Order'}</th><th style={{width:100}}>{doc.kind === 'order' ? 'Qty' : 'Date'}</th><th style={{width:120, textAlign:'right'}}>Amount</th></tr></thead>
          <tbody>
            {lines.map((ln,i) => <tr key={i}><td>{ln.l}</td><td className="muted">{ln.q}</td><td style={{textAlign:'right'}}>{ln.r}</td></tr>)}
          </tbody>
        </table>

        <div style={{display:'flex', justifyContent:'flex-end', marginTop:16}}>
          <div style={{minWidth:260}}>
            <div className="flex" style={{justifyContent:'space-between', padding:'3px 0'}}><span className="muted">Subtotal</span><span>{money(sub)}</span></div>
            <div className="flex" style={{justifyContent:'space-between', padding:'3px 0'}}><span className="muted">HST 13%</span><span>{money(tax)}</span></div>
            <div className="flex" style={{justifyContent:'space-between', padding:'8px 0', borderTop:'2px solid #17181c', marginTop:6}}>
              <strong className="serif" style={{fontSize:18}}>{isPaid ? 'Total (Paid)' : 'Amount Due'}</strong>
              <strong className="serif" style={{fontSize:18, color:'var(--amber)'}}>{money(total)}</strong>
            </div>
          </div>
        </div>

        <div className="small" style={{color:'#8f9198', marginTop:34, borderTop:'1px solid #e6e2db', paddingTop:12}}>
          Thank you for your business. Please remit payment to hello@reelestatemedia.com · All prices subject to 13% HST as shown.
        </div>
      </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
/* ---- theme: light by day (7am-7pm), dark by night, or your pick ---- */
(function(){
  var KEY = 'rem_theme_v1';
  var fab = document.createElement('button');
  fab.id = 'themefab';
  fab.innerHTML = '<span id="themeic"></span><span class="auto">AUTO</span>';
  document.body.appendChild(fab);
  function pref(){ try{ return localStorage.getItem(KEY) || 'auto'; }catch(e){ return 'auto'; } }
  function isDay(){ var h = new Date().getHours(); return h >= 7 && h < 19; }
  function apply(){
    var m = pref();
    var light = m === 'light' || (m === 'auto' && isDay());
    document.body.classList.toggle('light', light);
    fab.classList.toggle('isauto', m === 'auto');
    document.getElementById('themeic').textContent = light ? '\uD83C\uDF19' : '\u2600\uFE0F';
    fab.title = m === 'auto' ? 'Theme: Auto (light by day, dark by night) — tap to pick' : (light ? 'Theme: Light — tap for dark' : 'Theme: Dark — tap for auto');
  }
  fab.addEventListener('click', function(){
    var m = pref();
    var next;
    if(m === 'auto') next = isDay() ? 'dark' : 'light';
    else if(m === 'light') next = 'dark';
    else next = 'auto';
    try{ localStorage.setItem(KEY, next); }catch(e){}
    apply();
  });
  apply();
  setInterval(apply, 10 * 60 * 1000);
})();
</script>
