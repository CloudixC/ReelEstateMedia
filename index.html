            <input type="time" value={gt} onChange={e => setGt(e.target.value)} style={{fontSize:12, padding:'5px 6px', minHeight:0, width:88}}/>
          </div>
          <div className="row" style={{marginTop:7}}>
            <button className="arrow" onClick={() => setOpen(false)}>✕</button>
            <button className="btn sm" onClick={() => { updateDeliverable(d0.id, {shootDate: gd, shootTime: gt, status: 'Scheduled'}); setOpen(false); }}>✓ Schedule {d0.name}</button>
          </div>
        </div>}
  </div>);
}

/* ---------------- Pipeline (Kanban) ---------------- */
function Pipeline({db, clientName, moveStatus, pipeClient, setPipeClient, openOrderDetail, updateDeliverable, splitDeliverable}){
  const orderOf = d => db.orders.find(o => o.id === d.orderId) || {};
  const list = db.deliverables.filter(d => pipeClient === 'all' || orderOf(d).clientId === pipeClient);
  const [delMo, setDelMo] = useState(today().slice(0,7));
  const shiftDelMo = n => setDelMo(k => {
    const dt = new Date(+k.slice(0,4), +k.slice(5,7) - 1 + n, 1);
    return dt.getFullYear() + '-' + String(dt.getMonth() + 1).padStart(2,'0');
  });
  const delLabel = new Date(+delMo.slice(0,4), +delMo.slice(5,7) - 1, 15)
    .toLocaleDateString('en-CA', delMo.slice(0,4) === today().slice(0,4) ? {month:'short'} : {month:'short', year:'2-digit'});

  const Card = ({d}) => {
    const o = orderOf(d); const i = STATUSES.indexOf(d.status); const b = getBrief(d); const prep = prepScore(d); const cd = countdownFor(d);
    return (
      <div className="dcard click" onClick={() => openOrderDetail(d.orderId, d.id)}>
        <div className="t">{dlTitle(d)}</div>
        <div className="m">{b.topic ? d.name + ' · ' : ''}{d.group}</div>
        <div className="m">{o.project} · {clientName(o.clientId)}</div>
        {d.shootDate && <div className="m amber">📅 {fmtDate(d.shootDate)}{timeRange(d) ? ' · ' + timeRange(d) : ''}</div>}
        {cd && <div className="m" style={{marginTop:4}}><span className={'pill ' + cd.tone}>{cd.label}</span></div>}
        {d.status !== 'Delivered' &&
          <div className="m" style={{marginTop:5, display:'flex', gap:5, flexWrap:'wrap'}}>
            <span className="pill booked">{MEDIA_LABEL[mediaOf(d)]}</span>
            {prep && <span className={'pill ' + (prep.done === prep.total ? 'delivered' : 'booked')}>{prep.done === prep.total ? '✓ Ready' : 'Prep ' + prep.done + '/' + prep.total}</span>}
            {b.orientation && <span className="pill scheduled">{b.orientation === 'Vertical' ? '9:16' : b.orientation === 'Horizontal' ? '16:9' : '9:16 + 16:9'}</span>}
            {b.song && <span className="pill editing">🎵</span>}
            {b.script !== 'N/A' && <span className={'pill ' + (b.script === 'Approved' ? 'delivered' : b.script === 'Drafted' ? 'editing' : 'unpaid')}>{b.script}</span>}
          </div>}
        <div className="row">
          <button className="arrow" disabled={i === 0} onClick={e => { e.stopPropagation(); moveStatus(d,-1); }} title="Move back a stage">←</button>
          {mediaOf(d) === 'both' && d.status !== 'Delivered' &&
            <button className="arrow" style={{fontSize:12}} title="Split into separate Photos + Video deliverables"
              onClick={e => { e.stopPropagation(); splitDeliverable(d.id); }} title="Split into separate Photos + Video deliverables">⑂</button>}
          {i < STATUSES.length - 1
            ? <button className="btn sm" onClick={e => { e.stopPropagation(); moveStatus(d,1); }}>→ {STATUS_LABEL(STATUSES[i+1])}</button>
            : <span className="pill delivered">✓ Done</span>}
        </div>
      </div>);
  };

  return (<>
    <div className="flex" style={{marginBottom:16}}>
      <h3 className="serif" style={{fontSize:21}}>Deliverable Pipeline</h3>
      <span className="spacer"></span>
      <select style={{width:'auto'}} value={pipeClient} onChange={e => setPipeClient(e.target.value)}>
        <option value="all">All clients</option>
        {sortClients(db.clients).map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
      </select>
    </div>
    <div className="board">
      {STATUSES.map(st => {
        const cards = st === 'Delivered'
          ? list.filter(d => d.status === 'Delivered' && ((d.deliveredDate || d.shootDate || '').slice(0,7) === delMo))
          : list.filter(d => d.status === st);
        let content;
        if(st === 'Booked'){
          const groups = {};
          cards.forEach(d => { const k = d.orderId + '|' + d.group; (groups[k] = groups[k] || []).push(d); });
          content = Object.entries(groups).map(([k, g]) => {
            g.sort((a,b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
            if(g.length === 1) return <Card d={g[0]} key={g[0].id}/>;
            return <PackCard key={'grp' + k} g={g} order={orderOf(g[0])} clientName={clientName}
              openOrderDetail={openOrderDetail} updateDeliverable={updateDeliverable}/>;
          });
        } else {
          content = cards.map(d => <Card d={d} key={d.id}/>);
        }
        return (
        <div className="col" key={st}>
          <h4>
            {st === 'Delivered'
              ? <span style={{display:'flex', alignItems:'center', gap:6}}>
                  Delivered <MonthPicker value={delMo} onChange={setDelMo} compact/>
                </span>
              : <span>{STATUS_LABEL(st)}</span>}
            <span>{cards.length}</span>
          </h4>
          {content}
          {cards.length === 0 && <div className="faint small" style={{textAlign:'center', padding:'14px 0'}}>—</div>}
        </div>);
      })}
    </div>
  </>);
}

/* ---------------- Orders list ---------------- */
function Orders({db, clientName, orderProgress, setOpenOrder, openNewBooking}){
  const clientOf = id => db.clients.find(c => c.id === id);
  const [q, setQ] = useState('');
  const match = o => {
    if(!q.trim()) return true;
    const c = clientOf(o.clientId) || {};
    const hay = ((o.project || '') + ' ' + (c.name || '') + ' ' + companyOf(c) + ' ' + (c.contact || '')).toLowerCase();
    return q.toLowerCase().split(/\s+/).every(w => hay.includes(w));
  };
  const filtered = db.orders.filter(match);
  const companies = [...new Set(filtered.map(o => companyOf(clientOf(o.clientId))))]
    .sort((a,b) => a === 'Pinnacle' ? -1 : b === 'Pinnacle' ? 1 : a.localeCompare(b));
  if(db.orders.length === 0) return (
    <div className="card"><h3>All Orders</h3>
      <div className="empty">No orders yet — they'll appear here grouped by brokerage.
        <div><button className="btn sm" onClick={openNewBooking}>+ Create your first booking</button></div>
      </div>
    </div>);
  return (<>
    <div className="card" style={{padding:'12px 16px'}}>
      <input placeholder="🔍 Search orders — project, address, agent, brokerage…" value={q} onChange={e => setQ(e.target.value)}/>
      {q.trim() && <div className="small faint" style={{marginTop:6}}>{filtered.length} match{filtered.length !== 1 ? 'es' : ''}</div>}
    </div>
    {companies.map(co => {
      const os = filtered.filter(o => companyOf(clientOf(o.clientId)) === co);
      const totVal = os.reduce((a,o) => a + orderTotals(o).total, 0);
      const marg = os.reduce((a,o) => { const c = clientOf(o.clientId) || {}; return a + orderMargin(o, c.tier); }, 0);
      const openDl = os.reduce((a,o) => { const p = orderProgress(o.id); return a + (p.total - p.done); }, 0);
      return (
      <div className="card" key={co}>
        <div className="flex" style={{marginBottom:12}}>
          <h3 style={{marginBottom:0}}>{co}</h3>
          <span className="small muted">{os.length} order{os.length !== 1 ? 's' : ''} · {openDl} deliverable{openDl !== 1 ? 's' : ''} open</span>
          <span className="spacer"></span>
          <span className="small">Total <strong className="num">{money(totVal)}</strong>{marg > 0 && <span className="teal"> · Pinnacle margin {money(marg)}</span>}</span>
        </div>
        <table><thead><tr><th>Project</th><th>Agent</th><th>Booked</th><th>Progress</th><th>Total</th><th>Payment</th></tr></thead>
        <tbody>
          {os.map(o => { const p = orderProgress(o.id); const t = orderTotals(o); return (
            <tr key={o.id} className="click" onClick={() => setOpenOrder(o.id)}>
              <td><strong>{o.project || 'Untitled'}</strong></td>
              <td>{clientName(o.clientId)}</td>
              <td className="muted">{fmtDate(o.date)}</td>
              <td style={{minWidth:150}}>
                <div className="small muted" style={{marginBottom:4}}>{p.done}/{p.total} · {p.total - p.done} left</div>
                <div className={'progress' + (p.pct === 100 ? ' done' : '')}><div style={{width:p.pct + '%'}}></div></div>
              </td>
              <td className="num">{money(t.total)}</td>
              <td><span className={'pill ' + o.payment}>{o.payment}</span></td>
            </tr>);})}
        </tbody></table>
      </div>);})}
  </>);
}

  const groups = [...new Set(ds.map(d => d.group))];
  const changeClient = (newId) => {

            <span className={'pill ' + clientTier(o.clientId)}>{TIER_LABEL[clientTier(o.clientId)] || clientTier(o.clientId)}</span>

            <label className="f">Payment</label>
            <select style={{width:'auto'}} value={o.payment} onChange={e => updateOrder(id, {payment: e.target.value})}>

            </select>
          </div>
          <div style={{alignSelf:'flex-end'}}><CopyBtn text={intakeMsg(o, db.clients.find(c => c.id === o.clientId) || {})} label="✉ Intake"/></div>
          <button className="btn ghost sm" style={{alignSelf:'flex-end'}} onClick={() => rebookOrder(id)}>⟳ Rebook</button>

      <div style={{margin:'16px 0 6px'}} className="flex">

        <span className="muted small">delivered · <span className="amber">{p.total - p.done} remaining</span></span>
      </div>
      <div className={'progress' + (p.pct === 100 ? ' done' : '')}><div style={{width:p.pct + '%'}}></div></div>

      <div style={{marginTop:16}}>
        <label className="f">Services on this order</label>
        {o.items.map((i,ix) => (
          <div className="lineitem" key={ix}>
            <span className="small">{i.name}</span>
            <input type="number" min="1" value={i.qty} onChange={e => updateOrderItem(id, ix, {qty: Math.max(1, +e.target.value || 1)})}/>
            <input type="number" min="0" step="5" value={i.price} onChange={e => updateOrderItem(id, ix, {price: +e.target.value || 0})}/>
            <button title="Close" className="x" onClick={() => removeOrderItem(id, ix)}>✕</button>
          </div>))}
        <select value={picker} onChange={e => { if(e.target.value){ addOrderItem(id, e.target.value); setPicker(''); } }} style={{marginTop:4}}>
          <option value="">＋ Add a service…</option>
          {CATS.map(cat => (
            <optgroup key={cat} label={cat}>
              {CATALOG.filter(s => s.cat === cat).map(s =>
                <option key={s.id} value={s.id}>{s.name} — {s.tbd ? 'TBD' : money(rateFor(clientTier(o.clientId), s))}</option>)}
            </optgroup>))}
        </select>
        <p className="small faint" style={{marginTop:6}}>Adding a service spawns its deliverables · removing one deletes them (with Undo) · qty and price changes affect billing only.</p>
      </div>

      <div className="totalbar">
        <div className="row" style={{paddingBottom:6}}>
          <label className="small muted" style={{display:'flex', alignItems:'center', gap:7, cursor:'pointer'}}>
            <input type="checkbox" style={{width:'auto', minHeight:0}} checked={o.hst} onChange={e => updateOrder(id, {hst: e.target.checked})}/> Apply 13% HST

        <div className="row"><span>Subtotal</span><span>{money(t.sub)}</span></div>

        <div className="row"><span className="grand">Total</span><span className="grand">{money(t.total)}</span></div>
        {clientTier(o.clientId) === 'partner' &&

            <span className="teal small">{money(orderMargin(o, 'partner'))}</span></div>}

        <span className="spacer"></span>
        <button className="btn ghost sm" onClick={() => { copyText(feedbackMsg(o, c)); updateOrder(id, {feedbackAsked: today()}); }}>{o.feedbackAsked ? '✉ Re-ask (copies msg)' : '✉ Ask for feedback'}</button>
        {(o.rating || 0) >= 4 && <CopyBtn text={reviewRequestMsg(c, db.settings.reviewLink)} label="⭐ Request Google review"/>}
      </div>

      <textarea rows="2" placeholder='"The reel got 3 showings booked in a week" — save the good ones, they sell for you'

    {groups.map(g => (

  </>);
}

/* ---------------- Deliverable row + production brief ---------------- */
function DeliverableRow({d, updateDeliverable, deleteDeliverable, defaultOpen, order, client, siblings, splitDeliverable, db, updateSettings}){
  const [showImport, setShowImport] = useState(false);
  const [importTxt, setImportTxt] = useState('');
  const [open, setOpen] = useState(!!defaultOpen);
  const rowRef = React.useRef(null);
  useEffect(() => { if(defaultOpen && rowRef.current) setTimeout(() => rowRef.current.scrollIntoView({behavior:'smooth', block:'center'}), 60); }, []);
  // 🔄 script auto-sync: opening the brief pulls the agent's latest hub script.
  // Fills the text only when yours is blank (never clobbers local edits);
  // otherwise flips the state and tells you a newer version is waiting.
  useEffect(() => {
    if(!open) return;
    const hk = client && (client.hubKey || client.hubId);
    if(!hk || !db.settings.inboxUrl || mediaOf(d) === 'photo') return;
    fetch(db.settings.inboxUrl + '?scripts=' + encodeURIComponent(hk)).then(r => r.json()).then(j => {
      const items = j.items || [];
      const hit = items.find(x => x.p === (order ? order.project : '') && x.d === dlTitle(d)) || items.find(x => x.d === dlTitle(d));
      if(!hit || hit.by !== 'agent' || !hit.t) return;
      const b2 = getBrief(d);
      if(b2.script === 'N/A') return;
      const stNew = hit.st === 'Approved' ? 'Approved' : 'Drafted';
      if(!(b2.scriptText || '').trim()){
        updateDeliverable(d.id, {brief: {...b2, scriptText: hit.t, script: stNew}});
        (window.showToast || (() => {}))('🔄 Script synced from their hub — ' + stNew.toLowerCase() + ' by the agent');
      } else if(hit.t !== b2.scriptText){
        if(stNew === 'Approved' && b2.script !== 'Approved')
          updateDeliverable(d.id, {brief: {...b2, script: 'Approved'}});
        (window.showToast || (() => {}))('🔄 Their hub has a newer script version — tap ⟳ Pull to load it');
      } else if(b2.script !== stNew){
        updateDeliverable(d.id, {brief: {...b2, script: stNew}});
      }
    }).catch(() => {});
  }, [open]);
  const b = getBrief(d);
  const prep = prepScore(d);
  const setBrief = patch => updateDeliverable(d.id, {brief: {...b, ...patch}});
  return (<>
    <div className="dl-row" ref={rowRef}>
      <span style={{fontWeight:600, fontSize:14}}>{b.topic ? b.topic : d.name}{b.topic && <span className="faint small"> · {d.name}</span>}
        <span className="faint small"> · {MEDIA_LABEL[mediaOf(d)]}</span>{b.orientation && <span className="faint small"> · {b.orientation === 'Vertical' ? '9:16 Vertical' : b.orientation === 'Horizontal' ? '16:9 Horizontal' : '9:16 + 16:9'}</span>}
        <button className="btn ghost sm" title="Rename this deliverable" style={{padding:'0 7px', marginLeft:6, fontSize:12}}
          onClick={() => { const n = prompt('Rename this deliverable', d.name); if(n !== null && n.trim() && n.trim() !== d.name) updateDeliverable(d.id, {name: n.trim()}); }}>✎</button>
      </span>
      <select value={d.status} onChange={e => updateDeliverable(d.id, {status: e.target.value})}>
        {STATUSES.map(s => <option key={s} value={s}>{STATUS_LABEL(s)}</option>)}
      </select>
      <input type="date" value={d.shootDate} onChange={e => updateDeliverable(d.id, {shootDate: e.target.value})}/>
      <span className="flex" style={{gap:8}}>
        {(() => { const cd = countdownFor(d); return cd && <span className={'pill ' + cd.tone}>{cd.label}</span>; })()}
        {prep && <span className={'pill ' + (prep.done === prep.total ? 'delivered' : prep.done > 0 ? 'editing' : 'booked')}>
          {prep.done === prep.total ? '✓ Ready' : `Prep ${prep.done}/${prep.total}`}</span>}
        {d.status === 'Delivered' && <CopyBtn text={deliveryMsg(d, order, client)} label="✉ Msg"/>}
        <button className="btn ghost sm" onClick={() => setOpen(!open)}>{open ? 'Close' : 'Brief'}</button>
        {deleteDeliverable && <button className="btn ghost sm" title="Remove this deliverable" style={{color:'var(--cream-faint)'}} onClick={() => deleteDeliverable(d.id)}>✕</button>}
      </span>
    </div>
    {open &&
    <div className="brief">
      <div className="bgrid">
        <div>
          <label className="f">Media Type</label>
          <select value={mediaOf(d)} onChange={e => updateDeliverable(d.id, {mediaType: e.target.value})}>
            <option value="photo">📷 Photo — due 3 days after shoot, no script needed</option>
            <option value="video">🎬 Video — due 5 days after shoot, full prep</option>
            <option value="both">📷+🎬 Photo & Video — photos due +3d, video +5d</option>
          </select>
          {mediaOf(d) === 'both' && d.status !== 'Delivered' &&
            <button className="btn ghost sm" style={{marginTop:6}} onClick={() => splitDeliverable(d.id)} title="Split into separate Photos + Video deliverables">⑂ Split into Photos + Video (separate status & clocks)</button>}
        </div>
        <div>
          <label className="f">Topic / Title</label>
          <input placeholder='e.g. "3 staging mistakes" — names this reel everywhere' value={b.topic} onChange={e => setBrief({topic: e.target.value})}/>
        </div>
        <div>
          <label className="f">Shoot Start</label>
          <input type="time" value={d.shootTime || ''} onChange={e => updateDeliverable(d.id, {shootTime: e.target.value})}/>
        </div>
        <div>
          <label className="f">Shoot End</label>
          <input type="time" value={d.shootEnd || ''} onChange={e => updateDeliverable(d.id, {shootEnd: e.target.value})}/>
        </div>
        <div>
          <label className="f">Script</label>
          <select value={b.script} onChange={e => setBrief({script: e.target.value})}>
            {SCRIPT_STATES.map(s => <option key={s}>{s}</option>)}
          </select>
        </div>
        <div>
          <label className="f">Script Link / Doc</label>
          <input placeholder="Google Doc, teleprompter link…" value={b.scriptLink} onChange={e => setBrief({scriptLink: e.target.value})}/>
        </div>
        <div style={{gridColumn:'1 / -1'}}>
          <label className="f">📝 Script text — syncs with the Script Studio on their hub</label>
          <textarea rows="4" placeholder="Write or paste the script. Send it to their hub and they can read, tweak, approve — and shoot it off the built-in teleprompter. Their edits email you instantly." value={b.scriptText || ''} onChange={e => setBrief({scriptText: e.target.value})}/>
          <div className="flex" style={{gap:8, marginTop:6, flexWrap:'wrap'}}>
            <button className="btn ghost sm" onClick={async () => {
              const hk = client && (client.hubKey || client.hubId);
              if(!db.settings.inboxUrl || !hk){ alert('This client has no hub yet — tap 🏠 Hub on their client card first.'); return; }
              try{
                const j = await fetch(db.settings.inboxUrl + '?scripts=' + encodeURIComponent(hk)).then(r => r.json());
                const items = j.items || [];
                const hit = items.find(x => x.p === (order ? order.project : '') && x.d === dlTitle(d)) || items.find(x => x.d === dlTitle(d));
                if(hit && hit.t){ setBrief({scriptText: hit.t, script: hit.st === 'Approved' ? 'Approved' : 'Drafted'}); (window.showToast || alert)('⟳ Pulled their latest — ' + hit.st.toLowerCase() + (hit.by === 'studio' ? ' (your own version)' : ' by the agent')); }
                else (window.showToast || alert)('No script on their hub yet for this deliverable.');
              }catch(e){ alert("Couldn't reach the inbox — check the connection."); }
            }}>⟳ Pull latest from their hub</button>
            <button className="btn ghost sm" onClick={() => {
              const txt = (b.scriptText || '').trim();
              const hk = client && (client.hubKey || client.hubId);
              if(!txt){ alert('Write the script first.'); return; }
              if(!db.settings.inboxUrl || !hk){ alert('This client has no hub yet — tap 🏠 Hub on their client card first.'); return; }
              fetch(db.settings.inboxUrl, {method:'POST', body: JSON.stringify({kind:'script', ref: hk, project: order ? order.project : (d.group || ''), dname: dlTitle(d), who: 'Reel Estate Media', from: 'jag', body: JSON.stringify({t: txt, st: b.script === 'Approved' ? 'Approved' : 'Drafted', by: 'studio'})})}).catch(() => {});
              (window.showToast || alert)('📤 Script sent to their hub — they can read, tweak or approve it there.');
            }}>📤 Send to their hub</button>
          </div>
        </div>
        <div style={{gridColumn:'1 / -1'}}>
          <label className="f">📣 Ready-to-post caption — rides to their hub on delivery</label>
          <textarea rows="3" placeholder="Write the caption you'd want them to post with this piece — hook, a line of value, hashtags. Appears on their hub with a one-tap 'Post to Instagram'. Leave blank and they get smart templates instead." value={b.caption || ''} onChange={e => setBrief({caption: e.target.value})}/>
          <div className="frow" style={{marginTop:6}}>
            <div>
              <label className="f">🌐 Second-language caption (optional)</label>
              <textarea rows="2" placeholder="Same caption in Punjabi / Urdu / Hindi — offered alongside the English one on their hub." value={b.caption2 || ''} onChange={e => setBrief({caption2: e.target.value})}/>
            </div>
            <div>
              <label className="f">Language</label>
              <select value={b.lang2 || ''} onChange={e => setBrief({lang2: e.target.value})}>
                <option value="">— none —</option>
                <option value="Punjabi">Punjabi</option>
                <option value="Urdu">Urdu</option>
                <option value="Hindi">Hindi</option>
                <option value="French">French</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>
        </div>
        <div>
          <label className="f">Song / Track</label>
          <input placeholder="Artist – Title, or licensing link" value={b.song} onChange={e => setBrief({song: e.target.value})}/>
        </div>
        <div>
          <label className="f">Orientation</label>
          <select value={b.orientation} onChange={e => setBrief({orientation: e.target.value})}>
            <option value="">— pick —</option>
            {ORIENTATIONS.map(o => <option key={o}>{o}</option>)}
          </select>
        </div>
        <div>
          <label className="f">Editing Style</label>
          <select value={EDIT_STYLES.includes(b.style) ? b.style : (b.style ? 'Custom' : '')}
            onChange={e => setBrief({style: e.target.value === 'Custom' ? (EDIT_STYLES.includes(b.style) ? '' : b.style) : e.target.value})}>
            <option value="">— pick —</option>
            {EDIT_STYLES.map(s => <option key={s}>{s}</option>)}
          </select>
        </div>
        <div>
          <label className="f">Style Notes / Custom</label>
          <input placeholder="e.g. warm grade, punchy cuts, captions on" value={EDIT_STYLES.includes(b.style) ? '' : b.style}
            onChange={e => setBrief({style: e.target.value})}/>
        </div>
        <div>
          <label className="f">Location / Shoot Notes</label>
          <input placeholder="Address, access, lockbox, agent on site…" value={b.location} onChange={e => setBrief({location: e.target.value})}/>
        </div>
        <div>
          <label className="f">Post-Production Notes</label>
          <input placeholder="Logo sting, captions, CTA end card…" value={b.post} onChange={e => setBrief({post: e.target.value})}/>
        </div>
        <div>
          <label className="f">Delivery (platform / specs)</label>
          <input placeholder="IG Reel 9:16, MLS, YouTube 4K…" value={b.delivery} onChange={e => setBrief({delivery: e.target.value})}/>
        </div>
        <div>
          {mediaOf(d) === 'both' ? <>
            <label className="f">📷 Photos Link</label>
            <input placeholder="Drive folder / image links" value={d.link} onChange={e => updateDeliverable(d.id, {link: e.target.value})}/>
            <label className="f" style={{marginTop:10, display:'block'}}>🎬 Video Link</label>
            <input placeholder="Drive file / Dropbox / MP4" value={d.linkVideo || ''} onChange={e => updateDeliverable(d.id, {linkVideo: e.target.value})}/>
          </> : <>
            <label className="f">Delivery Link</label>
            <input placeholder="Final file / Drive / Frame.io link" value={d.link} onChange={e => updateDeliverable(d.id, {link: e.target.value})}/>
          </>}
          <div className="flex" style={{gap:6, marginTop:6, flexWrap:'wrap'}}>
            <CopyBtn text={reviewMsg(d, order, client)} label="✉ Review message"/>
            <CopyBtn text={deliveryMsg(d, order, client)} label="✉ Delivery message"/>
            <button className="btn ghost sm" onClick={() => {
              let base = db.settings.briefFormUrl;
              if(!base){
                base = prompt('One-time setup — where is brief-form.html hosted?\n(e.g. https://cloudixc.github.io/brief-form.html — I gave you this file to upload.)', 'https://');
                if(!base || base === 'https://') return;
                updateSettings({briefFormUrl: base.trim()});
              }
              const pin = client && (client.tier === 'partner' || client.tier === 'internal');
              const u = base + '?p=' + encodeURIComponent(order.project || d.group) +
                '&n=' + encodeURIComponent(((client && client.name) || '').split(' ')[0]) +
                '&t=' + (pin ? 'pin' : 'rem') +
                '&r=' + encodeURIComponent(d.id) +
                (db.settings.inboxUrl ? '&e=' + encodeURIComponent(db.settings.inboxUrl) : '') +
                (getBrief(d).topic ? '&tp=' + encodeURIComponent(getBrief(d).topic) : '');
              const fqs = u.split('?').slice(1).join('?');
              if(db.settings.inboxUrl){
                if(d.formUrl && d.formSig === fqs){ copyText(d.formUrl); window.open(d.formUrl, '_blank'); showToast('🔗 Existing short form link copied'); return; }
                const fcode = Math.random().toString(36).slice(2, 9);
                const fshort = base + '?x=' + fcode;
                updateDeliverable(d.id, {formUrl: fshort, formSig: fqs});
                copyText(fshort);
                const fw = window.open('', '_blank');
                if(fw){ try{ fw.document.write('<body style="background:#0a0a0c;color:#a6a49d;font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:92vh">Creating short link…</body>'); }catch(e){} }
                fetch(db.settings.inboxUrl, {method:'POST', body: JSON.stringify({kind:'link', ref: fcode, project: order.project || d.group, who: 'app', body: fqs})})
                  .then(r => r.json()).then(j => { if(!j.ok) throw 0; if(fw) fw.location = fshort; showToast('✅ Short form link copied: ' + fshort); })
                  .catch(() => { if(fw) fw.location = u; updateDeliverable(d.id, {formUrl: '', formSig: ''}); copyText(u); });
                return;
              }
              copyText(u);
              window.open(u, '_blank');
            }}>🔗 Copy + open form link</button>
            {db.settings.briefFormUrl &&
              <button className="btn ghost sm" title="Change hosted form URL" onClick={() => {
                const v = prompt('Hosted form URL:', db.settings.briefFormUrl);
                if(v && v.trim()) updateSettings({briefFormUrl: v.trim()});
              }}>⚙</button>}
            <button className="btn ghost sm" onClick={() => downloadBriefForm(d, order, client)}>📝 Form file</button>
            <button className="btn ghost sm" onClick={() => {
              const srcs = [(d.link || '').trim(), mediaOf(d) === 'both' ? (d.linkVideo || '').trim() : ''].filter(Boolean);
              if(srcs.length === 0){ alert('Put the content link(s) in first — Drive folder / file, Dropbox, MP4, or comma-separated image links. They become the latest version.'); return; }
              let base = db.settings.reviewPageUrl;
              if(!base){
                base = prompt('One-time setup — where is review.html hosted?', 'https://cloudixc.github.io/ReelEstateMedia/review.html');
                if(!base) return;
                updateSettings({reviewPageUrl: base.trim()});
              }
              const entry = srcs.join(',');
              if(d.reviewUrl && d.reviewUrl.indexOf('?x=') > -1 && d.reviewSig === entry){
                copyText(reviewShareText(d, order, d.reviewUrl));
                window.open(d.reviewUrl, '_blank');
                showToast('🔗 Same versions — link copied with the project name, ready to paste');
                return;
              }
              const vers = [...(d.reviewVersions || [])];
              if(!vers.includes(entry)) vers.push(entry);
              if(/\/drive\/(?:u\/\d+\/)?folders\//.test(d.link) && !db.settings.driveApiKey){
                const k = prompt('Optional, one-time: a Google Drive API key lets the review room show folder photos in a branded gallery with per-photo comments. Paste it here, or Cancel to use the plain folder view.\n\n(console.cloud.google.com → enable Drive API → Credentials → API key)');
                if(k && k.trim()) updateSettings({driveApiKey: k.trim()});
              }
              updateDeliverable(d.id, {reviewVersions: vers});
              const pinC = client && (client.tier === 'partner' || client.tier === 'internal');
              const u = base + '?p=' + encodeURIComponent(order.project || d.group) +
                '&d=' + encodeURIComponent(dlTitle(d)) +
                '&n=' + encodeURIComponent(((client && client.name) || '').split(' ')[0]) +
                '&t=' + (pinC ? 'pin' : 'rem') +
                (b.orientation === 'Vertical' ? '&o=v' : '') +
                (mediaOf(d) === 'both' ? '&m=both' : '') +
                (dueDateOf(d) ? '&due=' + dueDateOf(d) : '') +
                '&r=' + encodeURIComponent(d.id) +
                (db.settings.inboxUrl ? '&e=' + encodeURIComponent(db.settings.inboxUrl) : '') +
                '&v=' + vers.map(encodeURIComponent).join('|') +
                (db.settings.driveApiKey ? '&k=' + encodeURIComponent(db.settings.driveApiKey) : '');
              const qs = u.split('?').slice(1).join('?');
              if(db.settings.inboxUrl){
                const code = Math.random().toString(36).slice(2, 9);
                const shortU = base + '?x=' + code;
                updateDeliverable(d.id, {reviewUrl: shortU, reviewSig: entry});
                copyText(reviewShareText(d, order, shortU));
                const w = window.open('', '_blank');
                if(w){ try{ w.document.write('<body style="background:#0a0a0c;color:#a6a49d;font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:92vh;font-size:15px">Creating your short link\u2026</body>'); }catch(e){} }
                if(client) setTimeout(() => pushHub(client.id), 1200);
                fetch(db.settings.inboxUrl, {method:'POST', body: JSON.stringify({kind:'link', ref: code, project: order.project || d.group, who: 'app', body: qs})})
                  .then(r => r.json()).then(j => { if(!j.ok) throw new Error(j.error || 'save failed');
                    if(w) w.location = shortU;
                    showToast('✅ Link copied with the project name & opened'); })
                  .catch(() => { if(w) w.location = u;
                    updateDeliverable(d.id, {reviewUrl: u}); copyText(reviewShareText(d, order, u));
                    alert('Couldn\u2019t save the short link — the full link is on your clipboard instead.'); });
              } else {
                updateDeliverable(d.id, {reviewUrl: u});
                copyText(reviewShareText(d, order, u));
                window.open(u, '_blank');
              }
            }}>🎬 Review room{d.reviewVersions && d.reviewVersions.length > 1 ? ' · V' + d.reviewVersions.length : ''}</button>
            <button className="btn ghost sm" onClick={() => setShowImport(s => !s)}>📥 Import answers</button>
          </div>
          {showImport &&
          <div style={{marginTop:10}}>
            <label className="f">Paste their reply (the "=== REM BRIEF ===" block, or any "field: value" lines)</label>
            <textarea rows="5" value={importTxt} onChange={e => setImportTxt(e.target.value)} placeholder={'topic: Just Listed — 12494 The Gore Rd\nscript: I need one written\norientation: Vertical\n…'}/>
            <div className="flex" style={{marginTop:8}}>
              <span className="small faint">Fills only the fields found — everything else stays untouched.</span>
              <span className="spacer"></span>
              <button className="btn sm" onClick={() => {
                const parsed = parseBriefBlob(importTxt);
                const keys = Object.keys(parsed);
                if(keys.length === 0){ alert('No recognizable fields found — expected lines like "topic: …"'); return; }
                updateDeliverable(d.id, {brief: {...b, ...parsed}});
                setImportTxt(''); setShowImport(false);
              }}>✓ Apply to brief</button>
            </div>
          </div>}
        </div>
      </div>
      {siblings && siblings.length > 1 &&
      <div className="flex" style={{marginTop:12}}>
        <span className="small faint">Copies media type, format, style, song, location, post & delivery specs — topics and scripts stay per-reel.</span>
        <span className="spacer"></span>
        <button className="btn ghost sm" onClick={() => {
          const others = siblings.filter(s => s.id !== d.id);
          if(!confirm(`Apply this brief to the other ${others.length} in "${d.group}"?`)) return;
          others.forEach(s => updateDeliverable(s.id, {mediaType: mediaOf(d),
            brief: {...getBrief(s), orientation: b.orientation, style: b.style, song: b.song, location: b.location, post: b.post, delivery: b.delivery}}));
        }}>⧉ Apply to all {siblings.length} in this pack</button>
      </div>}
    </div>}
  </>);
}

/* ---------------- Clients (contacts page) ---------------- */
function ClientsPage({db, setShowNewClient, orderProgress, setEditingClient, pushHub, showToast}){
  const companies = [...new Set(db.clients.map(companyOf))]
    .sort((a,b) => a === 'Pinnacle' ? -1 : b === 'Pinnacle' ? 1 : a.localeCompare(b));
  const bdays = db.clients.map(c => ({c, nb: nextBirthday(c.birthday)}))
    .filter(x => x.nb && x.nb.days <= 30).sort((a,b) => a.nb.days - b.nb.days);
  return (<>
    <div className="flex" style={{marginBottom:14}}>
      <h3 className="serif" style={{fontSize:22, fontWeight:700}}>Clients</h3>
      <span className="spacer"></span>
      <button className="btn sm" onClick={() => setShowNewClient(true)}>+ Add Client / Agent</button>
    </div>

    {bdays.length > 0 &&
    <div className="card today">
      <h3 style={{fontSize:18}}>🎂 Upcoming Birthdays</h3>
      {bdays.map(({c, nb}) => (
        <div key={c.id} className="flex trow">
          <span className="pill client-review">{nb.days === 0 ? 'Today!' : 'in ' + nb.days + 'd'}</span>
          <span style={{fontWeight:700}}>{c.name}</span>
          <span className="faint small">{nb.date.toLocaleDateString('en-CA', {month:'long', day:'numeric'})}</span>
          <span className="spacer"></span>
          <CopyBtn text={birthdayMsg(c)} label="✉ Birthday note"/>
        </div>))}
    </div>}

    {(() => {
      const quotes = db.orders.filter(o => (o.testimonial || '').trim()).slice(0, 6);
      if(quotes.length === 0) return null;
      return (
      <div className="card">
        <h3 style={{fontSize:18}}>💬 Testimonial Bank</h3>
        {quotes.map(o => { const c = db.clients.find(x => x.id === o.clientId) || {}; return (
          <div key={o.id} className="trow">
            <div className="small" style={{fontStyle:'italic'}}>&ldquo;{o.testimonial}&rdquo;</div>
            <div className="small faint" style={{marginTop:3}}>— {c.name}{o.project ? ' · ' + o.project : ''}{o.rating ? ' · ' + '★'.repeat(o.rating) : ''}</div>
          </div>);})}
      </div>);
    })()}

    {companies.map(co => {
      const members = sortClients(db.clients.filter(c => companyOf(c) === co));
      return (
      <div key={co} style={{marginBottom:20}}>
        <h3 className="serif" style={{fontSize:17, margin:'0 0 10px 4px'}}>{co}</h3>
        <div className="ccards">
          {members.map(c => {
            const os = db.orders.filter(o => o.clientId === c.id);
            const open = os.reduce((a,o) => { const p = orderProgress(o.id); return a + (p.total - p.done); }, 0);
            const marg = os.reduce((a,o) => a + orderMargin(o, c.tier), 0);
            const billed = os.reduce((a,o) => a + orderTotals(o).total, 0);
            const lastBooked = os.reduce((a,o) => o.date > a ? o.date : a, '');
            const rated = os.filter(o => o.rating);
            const avgRating = rated.length ? (rated.reduce((a,o) => a + o.rating, 0) / rated.length).toFixed(1) : null;
            const nb = nextBirthday(c.birthday);
            const em = c.email || c.contact;
            const tel = (c.phone || '').replace(/[^+0-9]/g, '');
            return (
            <div className="ccard" key={c.id}>
              <div className="flex">
                <strong style={{fontSize:16}}>{c.name}</strong>
                <span className="spacer"></span>
                <button className="btn ghost sm" title="Copy this agent's permanent hub link — one page with all their content, no login" onClick={() => {
                  const link = pushHub(c.id);
                  if(!link){ alert('Set the review page URL + inbox first (tap 🎬 on any deliverable once).'); return; }
                  copyText(link);
                  showToast('🏠 Hub updated & link copied — it\u2019s permanent, tell them to bookmark it');
                }}>🏠 Hub</button>
                <button className="btn ghost sm" onClick={() => setEditingClient(c)}>Edit</button>
              </div>
              <div style={{marginTop:5}}><span className={'pill ' + c.tier}>{TIER_LABEL[c.tier] || c.tier}</span>
                {c.tier === 'unlimited' && <span className="small faint" style={{marginLeft:8}}>{money(+(c.retainer !== undefined ? c.retainer : 1750))}/mo{c.retainerStart ? ' since ' + c.retainerStart : ''}{Array.isArray(c.plan) && c.plan.length ? ' · 📦 ' + c.plan.reduce((a, x) => a + (+x.qty || 0), 0) + ' items/mo' : ''}</span>}</div>
              <div className="crows">
                {em && <div>📧 <a href={'mailto:' + em}>{em}</a></div>}
                {c.phone && <div>📱 <a href={'tel:' + tel}>{c.phone}</a></div>}
                {nb && <div>🎂 {nb.date.toLocaleDateString('en-CA', {month:'long', day:'numeric'})} <span className="faint">({nb.days === 0 ? 'today!' : 'in ' + nb.days + 'd'})</span></div>}
                {c.instagram && <div>📸 <a href={'https://instagram.com/' + c.instagram.replace('@','')} target="_blank" rel="noreferrer">@{c.instagram.replace('@','')}</a></div>}
                {!em && !c.phone && !nb && !c.instagram && <div className="faint">No contact details yet — hit Edit to build the profile.</div>}
              </div>
              <div className="cstats small muted">
                {os.length} order{os.length !== 1 ? 's' : ''} · {open > 0 ? <span className="amber">{open} open</span> : '0 open'} · billed {billed > 0 ? money(billed) : '—'}
                {c.tier === 'partner' && marg > 0 && <span className="teal"> · margin {money(marg)}</span>}
                {avgRating && <span style={{color:'#ba7517'}}> · ★ {avgRating}</span>}
              </div>
              <div className="small faint" style={{marginTop:3}}>{lastBooked ? 'Last booked ' + fmtDate(lastBooked) + (daysSince(lastBooked) > 42 ? ' 💤 time for a nudge' : '') : 'Never booked yet'}</div>
              {c.notes && <div className="small muted" style={{marginTop:7}}>📝 {c.notes}</div>}
            </div>);})}
        </div>
      </div>);})}
  </>);
}

/* ---------------- Calendly Inbox ---------------- */
function Inbox({db, syncing, syncMsg, syncCalendly, importBookings, clientTier, applyBookingNew, applyBookingAttach, dismissBooking, orderProgress, addClient, updateSettings}){
  const [tok, setTok] = useState('');
  const [paste, setPaste] = useState('');
  const [clipErr, setClipErr] = useState('');
  const pasteFromClipboard = async () => {
    try {
      const t = await navigator.clipboard.readText();
      if(!t || !t.trim()){ setClipErr('Clipboard is empty.'); return; }
      importBookings(t); setClipErr('');
    } catch(e){ setClipErr('Browser blocked clipboard access — paste into the box below instead.'); }
  };
  return (<>
    <div className="card">
      <div className="flex">
        <div>
          <h3 style={{marginBottom:2}}>Calendly Inbox</h3>
          <p className="small muted">Bookings from calendly.com/hello-reelestatemedia land here for review before entering the pipeline.</p>
        </div>
        <span className="spacer"></span>
        {db.settings.calendlyToken && <>
          <span className="pill delivered">⚡ Connected · auto-syncs every 20 min</span>
          <button className="btn ghost sm" title="Change or remove token" onClick={() => {
            const v = prompt('Calendly Personal Access Token (clear the field to disconnect):', '········');
            if(v === null) return;
            updateSettings(v.trim() && v.trim() !== '········' ? {calendlyToken: v.trim(), calendlyUser: ''} : (v.trim() === '' ? {calendlyToken: '', calendlyUser: '', reviewPageUrl: '', driveApiKey: '', inboxUrl: '', inboxToken: ''} : {}));
          }}>⚙</button>
          <button className="btn ghost sm" disabled={syncing} onClick={syncCalendly}>{syncing ? 'Syncing…' : '⟳ Sync now'}</button>
        </>}
      </div>
      {!db.settings.calendlyToken &&
      <div style={{marginTop:14, background:'var(--panel2)', border:'1px solid var(--line)', borderRadius:10, padding:14}}>
        <div className="small" style={{fontWeight:700, marginBottom:6}}>⚡ Connect Calendly — 2 minutes, once</div>
        <p className="small muted" style={{marginBottom:10}}>
          In Calendly: <strong>Integrations → API &amp; Webhooks → Personal Access Tokens → Generate new token</strong>, copy it, paste it here.
          It's stored only in this browser — never in the site's code.</p>
        <div className="flex">
          <input type="password" placeholder="Paste your Calendly token…" value={tok} onChange={e => setTok(e.target.value)} style={{flex:1}}/>
          <button className="btn sm" disabled={!tok.trim()} onClick={() => { updateSettings({calendlyToken: tok.trim(), calendlyUser: ''}); setTok(''); }}>Connect</button>
        </div>
      </div>}
      <details style={{marginTop:12}}>
        <summary className="small faint" style={{cursor:'pointer'}}>Manual import fallback (paste a bookings JSON)</summary>
        <div className="flex" style={{marginTop:8}}>
          <button className="btn ghost sm" onClick={pasteFromClipboard}>📋 Import from clipboard</button>

/* ---------------- Calendar ---------------- */
function SunLine({ds, enabled}){
  const [sun, setSun] = useState(null);
  useEffect(() => {
    setSun(null);
    if(!enabled || !navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(pos => {
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&daily=sunrise,sunset&start_date=${ds}&end_date=${ds}&timezone=auto`)
        .then(r => r.json()).then(j => { if(j.daily && j.daily.sunset && j.daily.sunset[0]) setSun({rise: j.daily.sunrise[0].slice(11), set: j.daily.sunset[0].slice(11)}); })
        .catch(() => {});
    }, () => {}, {maximumAge: 600000, timeout: 8000});
  }, [ds]);
  if(!sun) return null;
  const gh = (() => { const p = sun.set.split(':').map(Number); const t = new Date(); t.setHours(p[0], p[1] - 60, 0); return String(t.getHours()).padStart(2,'0') + ':' + String(t.getMinutes()).padStart(2,'0'); })();
  return <p className="small faint" style={{margin:'6px 0 0'}}>🌅 {fmtTime(sun.rise)} · 🌇 sunset {fmtTime(sun.set)} · ✨ golden hour ~{fmtTime(gh)}</p>;
}

  const icsEsc = s => String(s || '').replace(/\\/g, '\\\\').replace(/;/g, '\\;').replace(/,/g, '\\,').replace(/\n/g, '\\n');
  const exportIcs = () => {
    const evs = db.deliverables.filter(d => d.shootDate && d.shootDate >= today() && d.status !== 'Delivered')
      .sort((a, b) => a.shootDate.localeCompare(b.shootDate));
    if(evs.length === 0){ alert('No upcoming shoots to export.'); return; }
    const L = ['BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//Reel Estate Media//Pipeline//EN'];
    evs.forEach(d => {
      const o = orderOf(d); const c = db.clients.find(x => x.id === o.clientId) || {};
      const st = d.shootDate.replace(/-/g, '') + 'T' + (d.shootTime || '12:00').replace(':', '') + '00';
      let endT = d.shootEnd;
      if(!endT){ const t = new Date(d.shootDate + 'T' + (d.shootTime || '12:00')); t.setHours(t.getHours() + 2);
        endT = String(t.getHours()).padStart(2, '0') + ':' + String(t.getMinutes()).padStart(2, '0'); }
      const en = d.shootDate.replace(/-/g, '') + 'T' + endT.replace(':', '') + '00';
      L.push('BEGIN:VEVENT', 'UID:' + d.id + '@reelestatemedia', 'DTSTART:' + st, 'DTEND:' + en,
        'SUMMARY:' + icsEsc('🎥 ' + dlTitle(d) + (c.name ? ' — ' + c.name : '')),

    });
    L.push('END:VCALENDAR');
    const blob = new Blob([L.join('\r\n')], {type: 'text/calendar;charset=utf-8'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'REM-shoots.ics';
    document.body.appendChild(a); a.click(); a.remove();

  const orderOf = d => db.orders.find(o => o.id === d.orderId) || {};

function Money({db, clientName, updateOrder, updateSettings, stats, setPrintDoc, addExpense, deleteExpense}){
  const clientOf = cid => db.clients.find(c => c.id === cid) || {};
  const paid = db.orders.filter(o => o.payment === 'paid').reduce((a,o) => a + orderTotals(o).total, 0);
  const hstCollected = db.orders.filter(o => o.payment === 'paid').reduce((a,o) => a + orderTotals(o).tax, 0);
  const tierOf = cid => (db.clients.find(c => c.id === cid) || {}).tier || 'partner';
  const goal = db.settings.pinnacleGoal;

  /* -------- Monthly report -------- */
  const [repMo, setRepMo] = useState(today().slice(0,7));
  const shiftMo = n => setRepMo(k => {
    const d = new Date(+k.slice(0,4), +k.slice(5,7) - 1 + n, 1);
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2,'0');
  });
  const repLabel = new Date(+repMo.slice(0,4), +repMo.slice(5,7) - 1, 15).toLocaleDateString('en-CA', {month:'long', year:'numeric'});
  const moOrders = db.orders.filter(o => o.date && o.date.slice(0,7) === repMo);
  const moSub = moOrders.reduce((a,o) => a + orderTotals(o).sub, 0);
  const moTax = moOrders.reduce((a,o) => a + orderTotals(o).tax, 0);
  const moMargin = moOrders.reduce((a,o) => a + orderMargin(o, tierOf(o.clientId)), 0);
  const moDelivered = db.deliverables.filter(d => d.deliveredDate && d.deliveredDate.slice(0,7) === repMo).length;
  const moCollected = moOrders.filter(o => o.payment === 'paid').reduce((a,o) => a + orderTotals(o).total, 0);
  const moStats = monthStats(db, repMo);
  const [year, setYear] = useState(new Date().getFullYear());
  const yearsAvail = (() => { const ys = new Set([new Date().getFullYear()]);
    db.orders.forEach(o => o.date && ys.add(+o.date.slice(0,4)));
    (db.expenses || []).forEach(e => e.date && ys.add(+e.date.slice(0,4)));
    return [...ys].sort((a,b) => b - a); })();
  const yoy = (cur, prev) => prev > 0 ? Math.round((cur - prev) / prev * 100) : null;
  const [xDesc, setXDesc] = useState(''); const [xAmt, setXAmt] = useState(''); const [xDate, setXDate] = useState(today());
  const closeMonth = () => {
    const unpaid = moOrders.filter(o => o.payment === 'unpaid');
    if(unpaid.length === 0) return;
    if(!confirm(`Close ${repLabel}: mark ${unpaid.length} unpaid order${unpaid.length !== 1 ? 's' : ''} as Invoiced and open the statement?`)) return;
    unpaid.forEach(o => updateOrder(o.id, {payment: 'invoiced'}));
    const cos = [...new Set(unpaid.map(o => companyOf(clientOf(o.clientId))))];
    setPrintDoc({kind: 'statement', month: repMo, company: cos[0]});
  };
  const moOutstanding = moOrders.filter(o => o.payment !== 'paid').reduce((a,o) => a + orderTotals(o).total, 0);

  // Pinnacle margin by month (partner-tier orders, keyed on booking month)
  const byMonth = {};
  db.orders.forEach(o => {
    const m = orderMargin(o, tierOf(o.clientId));
    if(m > 0 && o.date){ const k = o.date.slice(0,7); byMonth[k] = (byMonth[k] || 0) + m; }
  });
  const months = Object.keys(byMonth).sort().reverse();
  const thisMo = today().slice(0,7);
  const cur = byMonth[thisMo] || 0;
  const monthLabel = k => new Date(k + '-15T12:00:00').toLocaleDateString('en-CA', {month:'long', year:'numeric'});

  return (<>

      <div className="flex" style={{marginBottom:12}}>

        <span className="spacer"></span>
        <MonthPicker value={repMo} onChange={setRepMo}/>

      {moOrders.length > 0 &&
      <div className="flex" style={{marginBottom:12}}>
        {[...new Set(moOrders.map(o => companyOf(clientOf(o.clientId))))].map(co =>
          <button key={co} className="btn sm" onClick={() => setPrintDoc({kind:'statement', month: repMo, company: co})}>🖨 {co} Statement</button>)}
        {moOrders.some(o => o.payment === 'unpaid') &&
          <button className="btn ghost sm" onClick={closeMonth}>✓ Close Month — invoice all unpaid</button>}
      </div>}
      <div className="grid-stats" style={{margin:'0 0 14px'}}>
        <div className="stat"><div className="n">{moOrders.length}</div><div className="l">Orders Booked</div></div>
        <div className="stat money"><div className="n">{money(moSub)}</div><div className="l">Booked (pre-tax)</div></div>
        <div className="stat"><div className="n">{moDelivered}</div><div className="l">Deliverables Delivered</div></div>
        <div className="stat"><div className="n teal">{money(moMargin)}</div><div className="l">Pinnacle Margin · Goal {money(goal)}</div></div>
        <div className="stat"><div className="n" style={{color: moStats.costs > 0 ? 'var(--red)' : 'inherit'}}>{money(moStats.costs)}</div><div className="l">Costs</div></div>
        <div className="stat"><div className="n" style={{color: moStats.net >= 0 ? 'var(--teal)' : 'var(--red)'}}>{money(moStats.net)}</div><div className="l">Net Profit</div></div>
        <div className="stat"><div className="n teal">{money(moCollected)}</div><div className="l">Collected</div></div>
        <div className="stat"><div className="n" style={{color: moOutstanding > 0 ? 'var(--red)' : 'inherit'}}>{money(moOutstanding)}</div><div className="l">Outstanding (incl. {money(moTax)} HST)</div></div>
      </div>
      {moOrders.length === 0 && <div className="empty">No orders booked in {repLabel}.</div>}
      {moOrders.length > 0 &&
      <table><thead><tr><th>Project</th><th>Agent / Client</th><th>Total</th><th>Margin</th><th>Payment</th><th></th></tr></thead><tbody>
        {moOrders.map(o => { const t = orderTotals(o); const m = orderMargin(o, tierOf(o.clientId)); return (
          <tr key={o.id}>
            <td><strong>{o.project || 'Untitled'}</strong></td>
            <td className="muted">{clientName(o.clientId)}</td>
            <td className="num">{money(t.total)}</td>
            <td className={m > 0 ? 'teal' : 'faint'}>{m > 0 ? money(m) : '—'}</td>
            <td><span className={'pill ' + o.payment}>{o.payment}</span></td>
            <td><button className="btn ghost sm" onClick={() => setPrintDoc({kind:'order', orderId: o.id})}>🖨</button></td>
          </tr>);})}
      </tbody></table>}
    </div>

    <div className="card">
      <div className="flex" style={{marginBottom:8}}>
        <h3 style={{marginBottom:0}}>Year Overview</h3>
        <span className="spacer"></span>
        <select style={{width:'auto'}} value={year} onChange={e => setYear(+e.target.value)}>
          {yearsAvail.map(y => <option key={y} value={y}>{y}</option>)}
        </select>
      </div>
      <p className="small muted" style={{marginBottom:12}}>Month by month, with change vs the same month the year before.</p>
      <div style={{overflowX:'auto'}}>
      <table><thead><tr><th>Month</th><th>Revenue</th><th>Costs</th><th>Net</th><th>Orders</th><th>Clients</th><th>Services</th><th>Delivered</th><th>Pinnacle</th></tr></thead>
      <tbody>
        {(() => {
          const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          const tot = {rev:0, costs:0, net:0, orders:0, services:0, delivered:0, margin:0};
          const rows = MONTHS.map((mn, i) => {
            const ym = year + '-' + String(i + 1).padStart(2,'0');
            const s = monthStats(db, ym);
            const p = monthStats(db, (year - 1) + '-' + String(i + 1).padStart(2,'0'));
            const dRev = yoy(s.rev, p.rev), dNet = yoy(s.net, p.net);
            tot.rev += s.rev; tot.costs += s.costs; tot.net += s.net; tot.orders += s.orders;
            tot.services += s.services; tot.delivered += s.delivered; tot.margin += s.margin;
            const empty = s.orders === 0 && s.costs === 0 && s.delivered === 0;
            return (
            <tr key={ym} style={empty ? {opacity:.45} : null}>
              <td><strong>{mn}</strong></td>
              <td className="num">{money(s.rev)}{dRev !== null && s.rev !== p.rev &&
                <div className={'small ' + (dRev >= 0 ? 'teal' : '')} style={dRev < 0 ? {color:'var(--red)'} : null}>{dRev >= 0 ? '↑' : '↓'}{Math.abs(dRev)}% vs '{String(year - 1).slice(2)}</div>}</td>
              <td className="muted num">{s.costs > 0 ? money(s.costs) : '—'}</td>
              <td className="num" style={{color: s.net > 0 ? 'var(--teal)' : s.net < 0 ? 'var(--red)' : 'inherit'}}>{money(s.net)}{dNet !== null && s.net !== p.net &&
                <div className={'small ' + (dNet >= 0 ? 'teal' : '')} style={dNet < 0 ? {color:'var(--red)'} : null}>{dNet >= 0 ? '↑' : '↓'}{Math.abs(dNet)}%</div>}</td>
              <td>{s.orders || '—'}</td>
              <td>{s.clients || '—'}</td>
              <td>{s.services || '—'}</td>
              <td>{s.delivered || '—'}</td>
              <td className={s.margin > 0 ? 'teal num' : 'faint'}>{s.margin > 0 ? money(s.margin) : '—'}</td>
            </tr>);
          });
          rows.push(
            <tr key="tot" style={{borderTop:'2px solid var(--cream)'}}>
              <td><strong>Total {year}</strong></td>
              <td className="num"><strong>{money(tot.rev)}</strong></td>
              <td className="muted num">{money(tot.costs)}</td>
              <td className="num" style={{color: tot.net >= 0 ? 'var(--teal)' : 'var(--red)'}}><strong>{money(tot.net)}</strong></td>
              <td><strong>{tot.orders}</strong></td>
              <td>—</td>
              <td><strong>{tot.services}</strong></td>
              <td><strong>{tot.delivered}</strong></td>
              <td className="teal num">{money(tot.margin)}</td>
            </tr>);
          return rows;
        })()}
      </tbody></table>
      </div>
    </div>

    <div className="card">
      <h3>Costs / Expenses</h3>
      <div className="lineitem" style={{gridTemplateColumns:'130px 1fr 110px 90px'}}>
        <input type="date" value={xDate} onChange={e => setXDate(e.target.value)}/>
        <input placeholder="Gas, gear, second shooter, subscriptions…" value={xDesc} onChange={e => setXDesc(e.target.value)}/>
        <input type="number" min="0" step="5" placeholder="$" value={xAmt} onChange={e => setXAmt(e.target.value)}/>
        <button className="btn sm" disabled={!xDesc.trim() || !(+xAmt > 0)} onClick={() => { addExpense({date: xDate, desc: xDesc.trim(), amount: +xAmt}); setXDesc(''); setXAmt(''); }}>Add</button>
      </div>
      {(db.expenses || []).length === 0 && <div className="empty">No costs logged yet — add gas, gear, and crew here so Net Profit means something.</div>}
      {(db.expenses || []).slice(0, 12).map(e => (
        <div key={e.id} className="flex trow">
          <span className="faint small" style={{minWidth:95}}>{fmtDate(e.date)}</span>
          <span>{e.desc}</span>
          <span className="spacer"></span>
          <span className="num">{money(+e.amount)}</span>
          <button title="Close" className="x" onClick={() => deleteExpense(e.id)}>✕</button>
        </div>))}
    </div>

    <div className="grid-stats">
      <div className="stat money"><div className="n">{money(stats.owed)}</div><div className="l">Outstanding</div></div>
      <div className="stat money"><div className="n">{money(paid)}</div><div className="l">Collected (All Time)</div></div>
      <div className="stat"><div className="n">{money(hstCollected)}</div><div className="l">HST Collected</div></div>
    </div>

    <div className="card">
      <div className="flex" style={{marginBottom:6}}>
        <h3 style={{marginBottom:0}}>Pinnacle Margin Tracker</h3>
        <span className="spacer"></span>
        <label className="small faint" style={{textTransform:'uppercase', letterSpacing:'.08em'}}>Monthly goal&nbsp;</label>
        <input type="number" min="0" step="50" style={{width:100}} value={goal}
          onChange={e => updateSettings({pinnacleGoal: Math.max(0, +e.target.value || 0)})}/>
      </div>
      <p className="small muted" style={{marginBottom:14}}>What Pinnacle earns on your work — retail rate billed to their client minus what they pay Reel Estate Media, including the HST retained on the spread.</p>

      <div className="flex" style={{marginBottom:8}}>
        <span className="serif" style={{fontSize:26, fontWeight:600}} >
          <span className="teal">{money(cur)}</span> <span className="faint" style={{fontSize:15}}>of {money(goal)} — {monthLabel(thisMo)}</span>
        </span>
        <span className="spacer"></span>
        <span className={'small ' + (cur >= goal ? 'teal' : 'muted')}>
          {cur >= goal ? '✓ Goal hit' : money(goal - cur) + ' to go'}
        </span>
      </div>
      <div className={'progress' + (cur >= goal && goal > 0 ? ' done' : '')} style={{marginBottom:18}}>
        <div style={{width: Math.min(100, goal ? cur / goal * 100 : 0) + '%'}}></div>
      </div>

      {months.length === 0 && <div className="empty">No partner-tier bookings yet. Margin appears here once Pinnacle orders come in.</div>}
      {months.length > 0 &&
      <table><thead><tr><th>Month</th><th>Pinnacle Made</th><th>vs Goal</th><th style={{width:'40%'}}></th></tr></thead><tbody>
        {months.map(k => { const v = byMonth[k]; const pct = goal ? Math.min(100, v / goal * 100) : 0; return (
          <tr key={k}>
            <td>{monthLabel(k)}</td>
            <td className="teal">{money(v)}</td>
            <td className={v >= goal ? 'teal' : 'muted'}>{goal ? Math.round(v / goal * 100) + '%' : '—'}</td>
            <td><div className={'progress' + (v >= goal && goal > 0 ? ' done' : '')}><div style={{width:pct + '%'}}></div></div></td>
          </tr>);})}
      </tbody></table>}
    </div>
    <div className="card">
      <h3>Invoicing</h3>
      {db.orders.length === 0 && <div className="empty">Nothing to invoice yet.</div>}
      {db.orders.length > 0 &&
      <table><thead><tr><th>Project</th><th>Client</th><th>Subtotal</th><th>HST</th><th>Total</th><th>Status</th></tr></thead><tbody>
        {db.orders.map(o => { const t = orderTotals(o); return (
          <tr key={o.id}>
            <td>{o.project || 'Untitled'}</td>
            <td className="muted">{clientName(o.clientId)}</td>
            <td>{money(t.sub)}</td>
            <td className="muted">{money(t.tax)}</td>
            <td className="num">{money(t.total)}</td>
            <td>
              <select style={{width:'auto'}} value={o.payment} onChange={e => updateOrder(o.id, {payment: e.target.value})}>
                <option value="unpaid">Unpaid</option><option value="invoiced">Invoiced</option><option value="paid">Paid</option>
              </select>
              {o.payment !== 'paid' && o.date && daysSince(o.date) >= 14 &&
                <span className="pill unpaid" style={{marginLeft:6}}>{daysSince(o.date)}d{daysSince(o.date) >= 30 ? ' ⚠' : ''}</span>}
            </td>
          </tr>);})}
      </tbody></table>}
    </div>
    <RateCard/>
  </>);
}

/* ---------------- New Order Modal ---------------- */
function NewOrderModal({db, onClose, onSave, addClient}){
  const [clientId, setClientId] = useState(db.clients[0] ? db.clients[0].id : '');
  const [project, setProject] = useState('');
  const [date, setDate] = useState(today());
  const [hst, setHst] = useState(true);
  const [notes, setNotes] = useState('');
  const [items, setItems] = useState([]);
  const [picker, setPicker] = useState('');
  // inline quick-create client
  const [showQuick, setShowQuick] = useState(false);
  const [qName, setQName] = useState('');
  const [qTier, setQTier] = useState('partner');
  const [qCo, setQCo] = useState('Pinnacle');
  const [qContact, setQContact] = useState('');
  const quickCreate = () => {
    if(!qName.trim()){ alert('Name required'); return; }
    const c = {id: uid(), name: qName.trim(), tier: qTier, company: qCo.trim(), contact: qContact, notes: ''};
    addClient(c);
    setClientId(c.id);
    setShowQuick(false); setQName(''); setQContact('');
  };

  const tier = (db.clients.find(c => c.id === clientId) || {}).tier || 'partner';
  const rateOf = s => rateFor(tier, s);

  const addItem = (sid) => {
    if(!sid) return;
    const s = svc(sid);
    setItems(p => [...p, {serviceId: s.id, name: s.name, qty: 1, price: rateOf(s), retail: s.retail}]);
    setPicker('');
  };
  // re-price items when client tier changes
  useEffect(() => { setItems(p => p.map(i => ({...i, price: rateOf(svc(i.serviceId))}))); }, [clientId]);

  const sub = items.reduce((a,i) => a + i.price * i.qty, 0);
  const tax = hst ? sub * HST : 0;

  const save = () => {
    if(!clientId || items.length === 0){ alert('Pick a client and at least one service.'); return; }
    onSave({id: uid(), clientId, project, date, hst, notes, payment:'unpaid', items});
  };

  return (
  <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
    <div className="modal">
      <div className="flex" style={{justifyContent:'space-between', marginBottom:6}}>
        <h2 style={{marginBottom:0}}>New Booking</h2>
        <button title="Close" className="x" onClick={onClose}>✕</button>
      </div>
      <ClientPicker db={db} value={clientId} onChange={setClientId} />
      <button className="backlink" style={{marginTop:6}} onClick={() => setShowQuick(!showQuick)}>{showQuick ? '× cancel new client' : '+ new client / agent'}</button>
      {showQuick &&
      <div className="brief" style={{marginTop:8}}>
        <div className="frow">
          <div><label className="f">Name</label><input value={qName} onChange={e => setQName(e.target.value)} placeholder="Agent or business name" autoFocus/></div>
          <div>
            <label className="f">Type</label>
            <select value={qTier} onChange={e => { setQTier(e.target.value); if(e.target.value === 'direct') setQCo(''); else if(!qCo) setQCo('Pinnacle'); }}>
              <option value="partner">Pinnacle Agent</option>
              <option value="internal">Pinnacle Internal</option>
              <option value="direct">Direct Client</option>
            </select>
          </div>
        </div>
        <div className="frow" style={{marginBottom:0}}>
          <div><label className="f">Company / Brokerage</label><input value={qCo} onChange={e => setQCo(e.target.value)} placeholder="Pinnacle, or leave blank"/></div>
          <div><label className="f">Contact</label><input value={qContact} onChange={e => setQContact(e.target.value)} placeholder="email / phone"/></div>
        </div>
        <div className="flex" style={{marginTop:10}}>
          <span className="spacer"></span>
          <button className="btn sm" onClick={quickCreate}>Add & Select</button>
        </div>
      </div>}
      <div className="frow" style={{marginTop:10}}>
        <div>
          <label className="f">Booking Date</label>
          <input type="date" value={date} onChange={e => setDate(e.target.value)}/>
        </div>
        <div></div>
      </div>
      <div className="frow one">
        <div>
          <label className="f">Project / Property</label>
          <input placeholder="e.g. 88 Maplecrest Dr, Brampton — or agent brand content" value={project} onChange={e => setProject(e.target.value)}/>
        </div>
      </div>

      <label className="f">Services ({tier === 'direct' ? 'retail rates' : 'REM rates'})</label>
      <select value={picker} onChange={e => addItem(e.target.value)} style={{marginBottom:10}}>
        <option value="">＋ Add a service…</option>
        {CATS.map(cat => (
          <optgroup key={cat} label={cat}>
            {CATALOG.filter(s => s.cat === cat).map(s =>
              <option key={s.id} value={s.id}>{s.name} — {s.tbd ? 'TBD' : money(rateFor(tier, s))}</option>)}
          </optgroup>))}
      </select>

      {items.map((i,ix) => (
        <div className="lineitem" key={ix}>
          <span className="small">{i.name}</span>
          <input type="number" min="1" value={i.qty} onChange={e => setItems(p => p.map((x,j) => j === ix ? {...x, qty: Math.max(1, +e.target.value || 1)} : x))}/>
          <input type="number" min="0" step="5" value={i.price} onChange={e => setItems(p => p.map((x,j) => j === ix ? {...x, price: +e.target.value || 0} : x))}/>
          <button title="Close" className="x" onClick={() => setItems(p => p.filter((_,j) => j !== ix))}>✕</button>
        </div>))}

      <div className="flex" style={{marginTop:10}}>
        <label className="small muted" style={{display:'flex', alignItems:'center', gap:7, cursor:'pointer'}}>
          <input type="checkbox" style={{width:'auto'}} checked={hst} onChange={e => setHst(e.target.checked)}/> Apply 13% HST
        </label>
      </div>
      <div className="frow one" style={{marginTop:10}}>
        <div><label className="f">Notes</label><textarea rows="2" value={notes} onChange={e => setNotes(e.target.value)} placeholder="Access details, agent requests…"/></div>
      </div>

      <div className="totalbar">
        <div className="row muted"><span>Subtotal</span><span>{money(sub)}</span></div>
        <div className="row muted"><span>HST 13%</span><span>{money(tax)}</span></div>
        <div className="row"><span className="grand">Total</span><span className="grand">{money(sub + tax)}</span></div>
        {tier === 'partner' &&
          <div className="row"><span className="teal small">Pinnacle makes on this booking</span>
            <span className="teal small">{money(items.reduce((a,i) => a + Math.max(0, itemRetail(i) - i.price) * i.qty, 0) * (hst ? 1 + HST : 1))}</span></div>}
      </div>
      <div className="modalfoot">
        <button className="btn ghost" onClick={onClose}>Cancel</button>
        <button className="btn" onClick={save}>Create Booking</button>
      </div>
    </div>
  </div>);
}

/* 📦 Monthly content package builder — shared by New/Edit client modals */

    <div style={{marginTop:10}}>

        <div key={x.serviceId} className="flex" style={{gap:8, alignItems:'center', marginBottom:6}}>
          <span className="small" style={{flex:1}}>{sv ? sv.name : x.serviceId}</span>
          <span className="small faint">×</span>
          <input type="number" min="1" style={{width:64}} value={x.qty}
            onChange={e => setPlan(rows.map((r, j) => j === i ? {...r, qty: Math.max(1, +e.target.value || 1)} : r))}/>
          <button className="x" title="Remove from package" onClick={() => setPlan(rows.filter((_, j) => j !== i))}>✕</button>

      <div className="flex" style={{gap:8, alignItems:'center'}}>
        <select style={{flex:1}} value={sel} onChange={e => setSel(e.target.value)}>

      </div>
      <p className="small faint" style={{marginTop:4}}>Set it once: on the 1st of every month a $0 "Monthly Content" order appears with all these deliverables ready to schedule — covered by the retainer. Leave empty to raise months by hand. To tweak one month, edit that order's deliverables (✕ / ✎); the package definition here stays untouched.</p>
    </div>);
}

              <div><label className="f">Monthly retainer (before HST)</label>

              <div><label className="f">Plan started (first billed month)</label>

            <p className="small faint" style={{marginTop:4}}>Invoices auto-raise for every month from the start month through today — back-months included — then on the 1st going forward. Items on their orders price at $0.</p>

        </div>
      </div>
      <div className="frow">
        <div><label className="f">Company / Brokerage</label><input value={company} onChange={e => setCompany(e.target.value)} placeholder="Pinnacle, or leave blank"/></div>
        <div><label className="f">Email</label><input type="email" value={contact} onChange={e => setContact(e.target.value)} placeholder="name@example.com"/></div>
      </div>

        <div><label className="f">Birthday</label><input type="date" value={birthday} onChange={e => setBirthday(e.target.value)}/></div>
      </div>
      <div className="modalfoot">

      </div>
    </div>
  </div>);
}

/* ---------------- Edit Client Modal ---------------- */

  const [birthday, setBirthday] = useState(client.birthday || '');
  const [instagram, setInstagram] = useState(client.instagram || '');
  const [notes, setNotes] = useState(client.notes || '');
  const [showBalance, setShowBalance] = useState(client.showBalance !== undefined ? !!client.showBalance : (client.tier === 'direct' || client.tier === 'unlimited'));

  const [retainerStart, setRetainerStart] = useState(client.retainerStart || today().slice(0, 7));

  <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
    <div className="modal" style={{maxWidth:540}}>
      <div className="flex" style={{justifyContent:'space-between'}}>
        <h2 style={{marginBottom:0}}>Edit {client.name}</h2>
        <button title="Close" className="x" onClick={onClose}>✕</button>
      </div>
      <div className="frow" style={{marginTop:16}}>
        <div><label className="f">Name</label><input value={name} onChange={e => setName(e.target.value)}/></div>
        <div><label className="f">Company / Brokerage</label><input value={company} onChange={e => setCompany(e.target.value)}/></div>
      </div>
      <div className="frow one">
        <div>
          <label className="f">Type</label>
          <select value={tier} onChange={e => setTier(e.target.value)}>

          {tier === 'unlimited' && <div style={{marginTop:8}}>
            <div className="frow">
              <div><label className="f">Monthly retainer (before HST)</label>
                <input type="number" min="0" step="50" value={retainer} onChange={e => setRetainer(e.target.value)}/></div>
              <div><label className="f">Plan started (first billed month)</label>

            <p className="small faint" style={{marginTop:4}}>Missing months from the start month to today backfill automatically. Amount changes apply to newly raised months only — already-raised invoices keep their price (edit those orders directly if needed). Moving the start later removes unpaid pre-start invoices; paid ones are never touched.</p>
          </div>}

      </div>
      <div className="frow">

        <div><label className="f">Phone</label><input type="tel" value={phone} onChange={e => setPhone(e.target.value)} placeholder="(905) 555-0123"/></div>

      <div className="frow">
        <div><label className="f">Birthday</label><input type="date" value={birthday} onChange={e => setBirthday(e.target.value)}/></div>
