<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shoot Brief</title>
<style>
:root{--red:#e3222c;--bg:#0a0a0c;--panel:#161619;--line:#2c2c33;--txt:#f4f1ea;--dim:#a6a49d}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,'Segoe UI',sans-serif;padding:22px 16px 70px;line-height:1.5}
.wrap{max-width:560px;margin:0 auto}
h1{font-family:Georgia,serif;font-size:25px}h1 em{color:var(--red);font-style:italic}
.sub{color:var(--dim);font-size:12px;letter-spacing:.14em;text-transform:uppercase;margin:3px 0 6px;font-weight:600}
.proj{color:var(--dim);font-size:14px;margin-bottom:8px}
.note{color:var(--dim);font-size:12.5px;margin:0 0 20px}
label{display:block;font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);font-weight:700;margin:18px 0 6px}
input,select,textarea{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:13px 12px;font-size:16px;font-family:inherit;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--red)}
.opts{display:flex;gap:8px;flex-wrap:wrap}
.opts button{flex:1;min-width:100px;background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:13px 8px;font-size:14px;cursor:pointer}
.opts button.on{background:var(--red);border-color:var(--red);color:#fff;font-weight:700}
.send{display:block;width:100%;background:var(--red);color:#fff;border:none;border-radius:4px;padding:16px;font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-top:28px;cursor:pointer;text-align:center;text-decoration:none}
.alt{display:block;width:100%;background:transparent;color:var(--txt);border:1px solid #6d6d77;border-radius:4px;padding:14px;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-top:10px;cursor:pointer}
#out{display:none;margin-top:14px}
</style></head><body><div class="wrap">
<h1 id="brand"></h1>
<div class="sub" id="subline"></div>
<div class="proj" id="proj"></div>
<div class="note" id="excl"></div>

<label>Topic / Title — what is this piece about?</label>
<input id="f_topic" placeholder="e.g. Just Listed — 12494 The Gore Rd">

<label>Script</label>
<div class="opts" id="f_script">
  <button type="button" data-v="Needed">I need one written</button>
  <button type="button" data-v="Drafted">I'll write / have a draft</button>
  <button type="button" data-v="N/A">No script needed</button>
</div>

<label>Script link (if you have one)</label>
<input id="f_scriptLink" placeholder="Google Doc link…">

<label>Song / music vibe</label>
<input id="f_song" placeholder="Artist — title, or 'upbeat', 'cinematic', 'your pick'">

<label>Format</label>
<div class="opts" id="f_orientation">
  <button type="button" data-v="Vertical">Vertical 9:16 (Reels)</button>
  <button type="button" data-v="Horizontal">Horizontal 16:9 (YouTube/MLS)</button>
  <button type="button" data-v="Both">Both</button>
</div>

<label>Editing style</label>
<select id="f_style"><option value="">— your call —</option>
<option>Cinematic</option><option>Fast-Paced Social</option><option>Clean & Minimal</option>
<option>Luxury</option><option>Documentary</option><option>Talking Head</option></select>

<label>Style notes — anything specific?</label>
<input id="f_stylenotes" placeholder="warm grade, punchy cuts, captions on…">

<label>Location &amp; access</label>
<textarea id="f_location" rows="3" placeholder="Address · lockbox / who lets us in · parking · pets on site"></textarea>

<label>Post-production must-haves</label>
<input id="f_post" placeholder="Logo sting, captions, CTA end card, phone number…">

<label>Where is this going?</label>
<input id="f_delivery" placeholder="Instagram, MLS, YouTube, all of the above…">

<a class="send" id="sendlink" href="#" >📧 Send answers</a>
<button class="alt" onclick="copyOut()">📋 Copy answers instead</button>
<button class="alt" style="border:none;color:var(--dim);font-size:11px;letter-spacing:.04em" onclick="clearSaved()">✕ Clear my answers &amp; start fresh</button>
<div id="out"><textarea rows="10" id="blob" readonly></textarea>
<div class="note" style="margin-top:8px">Copied! If not — select all &amp; copy, then text it back.</div></div>

<script>
const q = new URLSearchParams(location.search);
const pin = (q.get('t') || 'pin') === 'pin';
const project = q.get('p') || 'your shoot';
const who = q.get('n') || '';
const email = pin ? 'contenthub@rlppinnacle.ca' : 'hello@reelestatemedia.com';
document.getElementById('brand').innerHTML = pin ? 'Content <em>Hub</em>' : 'Reel Estate <em>Media</em>';
document.getElementById('subline').textContent = pin ? 'Royal LePage Pinnacle · Agent Pre-Shoot Brief' : 'Pre-Shoot Brief';
document.getElementById('proj').textContent = project + (who ? ' · for ' + who : '') + ' — takes about 2 minutes. Your answers shape the shoot & the edit.';
document.getElementById('excl').textContent = pin ? 'Exclusively for Royal LePage Pinnacle agents.' : '';
document.title = 'Shoot Brief — ' + (pin ? 'Content Hub' : 'Reel Estate Media');
if(q.get('tp')) document.getElementById('f_topic').value = q.get('tp');
const KEY = 'rem_brief_' + project;
function saveState(){
  try{ localStorage.setItem(KEY, JSON.stringify({
    topic: v('f_topic'), scriptLink: v('f_scriptLink'), song: v('f_song'),
    style: v('f_style'), stylenotes: v('f_stylenotes'),
    location: document.getElementById('f_location').value,
    post: v('f_post'), delivery: v('f_delivery'),
    script: pick('f_script'), orientation: pick('f_orientation')
  })); }catch(e){}
}
function restoreState(){
  try{
    const s = JSON.parse(localStorage.getItem(KEY) || 'null');
    if(!s) return;
    [['f_topic','topic'],['f_scriptLink','scriptLink'],['f_song','song'],['f_style','style'],
     ['f_stylenotes','stylenotes'],['f_location','location'],['f_post','post'],['f_delivery','delivery']]
      .forEach(function(p){ if(s[p[1]]) document.getElementById(p[0]).value = s[p[1]]; });
    [['f_script','script'],['f_orientation','orientation']].forEach(function(p){
      if(s[p[1]]){ const btn = document.querySelector('#' + p[0] + ' button[data-v="' + s[p[1]] + '"]'); if(btn) btn.classList.add('on'); }
    });
  }catch(e){}
}
function clearSaved(){ try{ localStorage.removeItem(KEY); }catch(e){} location.reload(); }
document.addEventListener('input', saveState);
restoreState();
document.querySelectorAll('.opts').forEach(g => g.addEventListener('click', e => {
  if(e.target.tagName !== 'BUTTON') return;
  g.querySelectorAll('button').forEach(x => x.classList.remove('on'));
  e.target.classList.add('on');
  saveState();
}));
function pick(id){ const el = document.querySelector('#' + id + ' button.on'); return el ? el.dataset.v : ''; }
function v(id){ return document.getElementById(id).value.trim(); }
function blob(){
  const style = v('f_style'); const notes = v('f_stylenotes');
  return ['=== REM BRIEF ===','project: ' + project,'topic: ' + v('f_topic'),'script: ' + pick('f_script'),
    'script link: ' + v('f_scriptLink'),'song: ' + v('f_song'),'orientation: ' + pick('f_orientation'),
    'style: ' + (notes ? (style ? style + ' — ' + notes : notes) : style),
    'location: ' + v('f_location').replace(/\n/g, ' | '),'post: ' + v('f_post'),'delivery: ' + v('f_delivery'),
    '=== END ==='].join('\n');
}
document.getElementById('sendlink').addEventListener('click', function(){
  this.href = 'mailto:' + email + '?subject=' + encodeURIComponent('Brief: ' + project) + '&body=' + encodeURIComponent(blob());
  showOut();
});
function copyOut(){ showOut(); const t = document.getElementById('blob'); t.focus(); t.select(); t.setSelectionRange(0, 99999);
  try{ document.execCommand('copy'); }catch(e){}
  if(navigator.clipboard) navigator.clipboard.writeText(t.value).catch(function(){}); }
function showOut(){ document.getElementById('out').style.display = 'block'; document.getElementById('blob').value = blob(); }
</script></div></body></html>
