<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reel Estate Media — Studio Chat</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { background: #0a0a0a; font-family: 'Inter', sans-serif; }
  .font-serif-display { font-family: 'Playfair Display', serif; }

  .scrollbar-thin::-webkit-scrollbar { width: 6px; }
  .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #262626; border-radius: 10px; }
  .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #333333; }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(225,29,42,0.6); }
    50% { opacity: 0.6; box-shadow: 0 0 0 4px rgba(225,29,42,0); }
  }
  .status-dot { animation: pulse-dot 2s ease-in-out infinite; }

  @keyframes fade-up { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg-enter { animation: fade-up 0.35s ease-out both; }

  .send-glow { box-shadow: 0 0 0 1px rgba(225,29,42,0.4), 0 8px 24px -6px rgba(225,29,42,0.55); }
  .send-glow:hover { box-shadow: 0 0 0 1px rgba(225,29,42,0.6), 0 10px 30px -4px rgba(225,29,42,0.75); }

  .film-grain { background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.025) 1px, transparent 0); background-size: 22px 22px; }

  .unread-badge { background: #e11d2a; color: #fff; box-shadow: 0 0 0 1px rgba(225,29,42,0.35), 0 4px 12px -3px rgba(225,29,42,0.6); }
  .date-chip { background: #161616; border: 1px solid #262626; color: #7a7a7a; }

  #sidebar { transition: transform .28s cubic-bezier(.2,.7,.2,1); }
  #backdrop { transition: opacity .28s ease; }
</style>
</head>
<body class="min-h-screen w-full film-grain flex items-center justify-center p-0 sm:p-6">

  <!-- ============ TOKEN GATE ============ -->
  <div id="gate" class="w-full max-w-sm bg-[#141414] border border-[#262626] rounded-2xl shadow-[0_20px_60px_-15px_rgba(0,0,0,0.8)] p-8 mx-4">
    <div class="text-center mb-6">
      <h1 class="font-serif-display text-2xl text-white">Studio <span class="text-[#e11d2a] italic">Chat</span></h1>
      <p class="text-[12px] text-[#8a8a8a] mt-2">Every agent conversation in one place.<br>Paste your admin token to unlock.</p>
    </div>
    <p id="gate-err" class="hidden bg-[#e11d2a]/10 border border-[#e11d2a]/40 text-[#ff8f97] text-[12.5px] rounded-xl px-3.5 py-2.5 mb-4"></p>
    <input id="gate-token" type="password" placeholder="Your inbox token"
      class="w-full bg-[#1a1a1a] border border-[#2a2a2a] text-white placeholder-[#5c5c5c] text-[13px] rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#e11d2a]/60 focus:border-[#e11d2a]/40 transition-all mb-3" />
    <button id="gate-go" class="w-full bg-[#e11d2a] hover:bg-[#c81824] text-white text-[12px] font-bold uppercase tracking-[0.14em] rounded-xl py-3 send-glow transition-all active:scale-[0.98]">Open chat</button>
    <p class="text-[11px] text-[#5c5c5c] text-center mt-4">It's the same token as your Command Centre inbox.<br>Saved on this device so next time you're straight in.</p>
  </div>

  <!-- ============ APP ============ -->
  <div id="app" class="hidden relative w-full max-w-5xl h-screen sm:h-[720px] sm:max-h-[92vh] bg-[#141414] sm:border border-[#262626] sm:rounded-2xl shadow-[0_20px_60px_-15px_rgba(0,0,0,0.8)] flex overflow-hidden">

    <!-- Backdrop (mobile only) -->
    <div id="backdrop" class="absolute inset-0 z-20 bg-black/60 opacity-0 pointer-events-none sm:hidden"></div>

    <!-- ============ SIDEBAR ============ -->
    <aside id="sidebar" class="absolute sm:static inset-y-0 left-0 z-30 flex flex-col w-80 shrink-0 border-r border-[#262626] bg-[#0f0f0f] -translate-x-full sm:translate-x-0">
      <div class="px-5 py-4 border-b border-[#262626] flex items-center justify-between">
        <h2 class="font-serif-display text-xl text-white">Mess<span class="text-[#e11d2a] italic">ages</span></h2>
        <div class="flex items-center gap-2">
          <span id="total-badge" class="unread-badge text-[11px] font-semibold rounded-full px-2 py-0.5" style="display:none">0</span>
          <button id="close-sidebar" class="sm:hidden text-[#7a7a7a] hover:text-white" aria-label="Close">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>

      <div class="px-4 py-3 border-b border-[#262626]">
        <div class="flex items-center gap-2 bg-[#1a1a1a] border border-[#2a2a2a] rounded-full px-3 py-2">
          <svg class="w-4 h-4 text-[#5c5c5c] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="search" type="text" placeholder="Search brokerages, agents, projects" class="w-full bg-transparent outline-none text-[13px] text-white placeholder-[#5c5c5c]" />
        </div>
      </div>

      <div id="convo-list" class="flex-1 overflow-y-auto scrollbar-thin"></div>

      <div class="px-5 py-3 border-t border-[#262626] text-[11px] text-[#5c5c5c] flex items-center justify-between">
        <span id="agent-count"></span>
        <button id="lock-btn" class="hover:text-white transition-colors" title="Forget token on this device">🔒 Lock</button>
      </div>
    </aside>

    <!-- ============ CHAT PANE ============ -->
    <div class="flex-1 flex flex-col min-w-0">

      <div class="flex items-center justify-between px-4 sm:px-6 py-4 border-b border-[#262626] bg-[#111111]">
        <div class="flex items-center gap-3 min-w-0">
          <button id="open-sidebar" class="sm:hidden text-[#7a7a7a] hover:text-white shrink-0" aria-label="Open conversations">
            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div id="hdr-avatar" class="w-10 h-10 rounded-full bg-gradient-to-br from-[#262626] to-[#141414] border border-[#2e2e2e] flex items-center justify-center text-[#e11d2a] font-serif-display font-semibold text-sm shrink-0"></div>
          <div class="min-w-0">
            <h1 id="hdr-name" class="font-serif-display text-lg sm:text-xl text-white leading-tight tracking-wide truncate"></h1>
            <div class="flex items-center gap-1.5 mt-0.5">
              <span class="w-1.5 h-1.5 rounded-full bg-[#e11d2a] status-dot"></span>
              <p id="hdr-role" class="text-[10px] uppercase tracking-[0.18em] text-[#7a7a7a] truncate"></p>
            </div>
          </div>
        </div>
        <div class="flex items-center gap-1 shrink-0">
          <button id="pin-btn" class="text-[#7a7a7a] hover:text-white transition-colors" aria-label="Pin conversation" title="Pin to top">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4h6l-1 7 3 3v2H7v-2l3-3-1-7z"/><line x1="12" y1="16" x2="12" y2="21"/></svg>
          </button>
        </div>
      </div>

      <div id="thread" class="flex-1 overflow-y-auto scrollbar-thin px-4 sm:px-6 py-6 space-y-5"></div>

      <div class="border-t border-[#262626] bg-[#111111] px-4 sm:px-5 py-4">
        <p id="input-label" class="text-[10px] uppercase tracking-[0.18em] text-[#5c5c5c] mb-2 ml-1"></p>
        <div class="flex items-center gap-2 sm:gap-3">
          <input id="file-input" type="file" multiple accept="image/*" class="hidden" />
          <button id="attach-btn" class="shrink-0 w-10 h-10 flex items-center justify-center rounded-full text-[#8a8a8a] hover:text-white hover:bg-[#1c1c1c] transition-colors" aria-label="Attach photo" title="Attach a photo">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a5.5 5.5 0 0 1-7.78-7.78l9.19-9.19a3.5 3.5 0 0 1 4.95 4.95l-9.2 9.19a1.5 1.5 0 0 1-2.12-2.12l8.49-8.49"/></svg>
          </button>
          <div class="flex-1">
            <input id="chat-input" type="text" placeholder="Write a message…" class="w-full bg-[#1a1a1a] border border-[#2a2a2a] text-white placeholder-[#5c5c5c] text-[14px] rounded-full pl-4 pr-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-[#e11d2a]/60 focus:border-[#e11d2a]/40 transition-all" />
          </div>
          <button id="send-btn" class="shrink-0 w-11 h-11 rounded-full bg-[#e11d2a] hover:bg-[#c81824] text-white flex items-center justify-center send-glow transition-all active:scale-95" aria-label="Send message">
            <svg class="w-5 h-5 translate-x-[1px]" viewBox="0 0 24 24" fill="currentColor"><path d="M2.94 2.94a1.5 1.5 0 0 1 1.62-.33l17 7a1.5 1.5 0 0 1 0 2.78l-17 7a1.5 1.5 0 0 1-2.06-1.85L4.9 12 2.5 5.46a1.5 1.5 0 0 1 .44-2.52z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

<script>
  // ============================================================
  // Studio chat — YOUR side of the agent messages.
  // Sidebar is the full tree: Brokerage ▸ Agent ▸ (Direct + Projects).
  // Unlocks with your admin token; one ?token= fetch returns all rows:
  //   hub   rows — build the tree (newest hub per agent wins; stale
  //               duplicates only shown if they hold message history)
  //   msg   rows — messages (photos ride inside bodies)
  //   read  rows — synced read markers (badges + Seen tags)
  //   react rows — synced emoji reactions
  // Replies post as from:'jag' → red Reel Estate Media bubbles on the
  // agent side, and never email you back. Pins stay on this device.
  // ============================================================
  const ENDPOINT = 'https://script.google.com/macros/s/AKfycbyALH9lG_dzg13ooj1brWBifZfAWVcZ3JgtJc617PPLii4kK1igFyU4Gu41Lzwy5gGEiw/exec';
  const TOKEN_KEY = 'rem_admin_token_v1';   // shared with login.html?admin and the Command Centre button
  const READ_KEY = 'rem_studio_read_v1';
  const PIN_KEY = 'rem_studio_pins_v1';
  const POLL_MS = 30000;
  const MY_SIDE = 'j';          // reactions ledger: 'a' = agent, 'j' = studio

  const $ = (s) => document.querySelector(s);
  const convoList = $('#convo-list');
  const thread = $('#thread');
  const sidebar = $('#sidebar');
  const backdrop = $('#backdrop');

  const esc = (s) => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const slug = s => String(s).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  const initialsOf = name => String(name).split(/\s+/).map(w => w[0]).filter(Boolean).slice(0,2).join('').toUpperCase() || '•';

  // ---------- state ----------
  let TOKEN = '';
  let agents = [];              // {key, name, brokerage, initials, hubIdx, stale, convos:[...]}
  let activeId = '';
  let searchTerm = '';
  let reactMap = {};            // msgId -> emoji -> {a:0|1, j:0|1}
  let expanded = new Set();     // 'b:<brokerage>' and 'a:<agent key>'
  let firstBuild = true;
  let pollTimer = null;

  const allConvos = () => agents.flatMap(ag => ag.convos);
  const convoById = id => allConvos().find(c => c.id === id);
  const agentOf = c => agents.find(ag => ag.key === c.key);
  const brokerageName = ag => ag.brokerage || 'Independent';

  // ---------- read state (synced via 'read' rows + local overlay) ----------
  let serverRead = {};
  let agentRead = {};
  function localRead(){ try { return JSON.parse(localStorage.getItem(READ_KEY)) || {}; } catch(e){ return {}; } }
  const readTs = id => { const l = localRead()[id] || '', s = serverRead[id] || ''; return l > s ? l : s; };
  function markRead(id){
    const c = convoById(id); if (!c || !c.lastTs) return;
    const hadUnread = unreadOf(c) > 0;
    const st = localRead();
    if (c.lastTs > (st[id] || '')){
      st[id] = c.lastTs;
      try { localStorage.setItem(READ_KEY, JSON.stringify(st)); } catch(e){}
    }
    if (hadUnread){
      serverRead[id] = c.lastTs;
      fetch(ENDPOINT, { method:'POST', body: JSON.stringify({
        kind:'read', ref: c.key, project: c.label, dname:'',
        who: 'Reel Estate Media', from:'jag', body: c.lastTs
      })}).catch(() => {});
    }
  }
  const unreadOf = c => {
    const since = readTs(c.id);
    return c.messages.filter(m => m.side === 'in' && m.ts > since).length;
  };
  const agentUnread = ag => ag.convos.reduce((s,c) => s + unreadOf(c), 0);

  // ---------- pins (personal — this device) ----------
  function pins(){ try { return JSON.parse(localStorage.getItem(PIN_KEY)) || []; } catch(e){ return []; } }
  const isPinned = id => pins().indexOf(id) > -1;
  function togglePin(id){
    let p = pins();
    p = p.indexOf(id) > -1 ? p.filter(x => x !== id) : p.concat([id]);
    try { localStorage.setItem(PIN_KEY, JSON.stringify(p)); } catch(e){}
    renderSidebar();
    if (id === activeId) paintPinBtn();
  }
  function paintPinBtn(){
    const btn = $('#pin-btn');
    const on = isPinned(activeId);
    btn.classList.toggle('text-[#e11d2a]', on);
    btn.classList.toggle('text-[#7a7a7a]', !on);
    btn.querySelector('svg').setAttribute('fill', on ? 'currentColor' : 'none');
    btn.title = on ? 'Unpin from top' : 'Pin to top';
  }
  $('#pin-btn').addEventListener('click', () => togglePin(activeId));

  // ---------- body encoding (photos ride inside msg bodies) ----------
  function parseBody(body){
    const s = String(body || '');
    if (s.charAt(0) === '{'){
      try { const o = JSON.parse(s); if (o && o.__rc) return { text: String(o.t || ''), atts: o.att || [] }; } catch(e){}
    }
    return { text: s, atts: [] };
  }

  // ---------- build model from the inbox rows ----------
  function generalLabel(ag){ return (ag.name || 'Agent') + ' — Content Hub'; }
  function projectLabel(ag, title){ return (ag.name || 'Agent') + ' — ' + title; }

  function buildFromRows(rows){
    const rowIdx = r => parseInt(String(r.id || '').slice(1), 10) || 0;
    const hubs = {};
    rows.forEach(r => { if (r.kind === 'hub') hubs[String(r.ref)] = r; });

    const byKey = {};
    Object.keys(hubs).forEach(key => {
      let man = {};
      try { man = JSON.parse(String(hubs[key].body || '{}')); } catch(e){}
      const name = man.agent || man.n || String(hubs[key].project || key);
      const ag = { key, name, brokerage: man.brokerage || '', initials: initialsOf(name), hubIdx: rowIdx(hubs[key]), convos: [] };
      ag.convos.push({ id: key + '|general', key, name: ag.name, sub: 'Direct chat', initials: ag.initials, kind: 'direct', label: generalLabel(ag), messages: [], lastTs: '' });
      (man.projects || man.items || []).forEach(x => {
        const title = x.t != null ? x.t : (x.ttl || '');
        if (!title) return;
        ag.convos.push({ id: key + '|p-' + slug(title), key, name: title, sub: x.p != null ? x.p : (x.proj || ''), initials: initialsOf(title), kind: 'project', label: projectLabel(ag, title), messages: [], lastTs: '' });
      });
      byKey[key] = ag;
    });

    serverRead = {}; agentRead = {}; reactMap = {};
    rows.forEach(r => {
      if (r.kind !== 'msg' && r.kind !== 'read' && r.kind !== 'react') return;
      const side = r.from === 'jag' ? 'j' : 'a';
      if (r.kind === 'react'){
        try {
          const o = JSON.parse(String(r.body || '{}'));
          if (!o.m || !o.e) return;
          const ent = (reactMap[o.m] = reactMap[o.m] || {});
          const st = (ent[o.e] = ent[o.e] || {a:0, j:0});
          st[side] = o.op === '-' ? 0 : 1;
        } catch(e){}
        return;
      }
      const key = String(r.ref);
      if (!byKey[key]){
        const name = String(r.who || key);
        byKey[key] = { key, name, brokerage: '', initials: initialsOf(name), hubIdx: -1, convos: [
          { id: key + '|general', key, name, sub: 'Direct chat', initials: initialsOf(name), kind: 'direct', label: '', messages: [], lastTs: '' }
        ]};
      }
      const ag = byKey[key];
      const c = ag.convos.find(x => x.label === String(r.project || '')) || ag.convos[0];
      if (r.kind === 'read'){
        const tgt = side === 'j' ? serverRead : agentRead;
        const ts = String(r.body || '');
        if (ts > (tgt[c.id] || '')) tgt[c.id] = ts;
        return;
      }
      const b = parseBody(r.body);
      c.messages.push({
        id: String(r.id || ''),
        ts: String(r.ts || ''),
        side: side === 'j' ? 'out' : 'in',
        who: side === 'j' ? 'You' : (r.who || ag.name),
        text: b.text, atts: b.atts
      });
    });

    Object.values(byKey).forEach(ag => ag.convos.forEach(c => {
      c.messages.sort((x,y) => x.ts < y.ts ? -1 : 1);
      if (c.messages.length) c.lastTs = c.messages[c.messages.length - 1].ts;
    }));

    // Dedupe: several hubs sharing one agent name = old pushes. The newest hub
    // is the live one; older duplicates only stay if they hold real history.
    const msgCount = ag => ag.convos.reduce((s,c) => s + c.messages.length, 0);
    const byName = {};
    Object.values(byKey).forEach(ag => {
      const k = ag.name.trim().toLowerCase();
      (byName[k] = byName[k] || []).push(ag);
    });
    Object.values(byName).forEach(group => {
      group.sort((x,y) => y.hubIdx - x.hubIdx);
      group.forEach((ag, i) => {
        ag.stale = i > 0;
        ag.hidden = i > 0 && msgCount(ag) === 0;
      });
    });

    const lastOf = ag => ag.convos.reduce((m,c) => c.lastTs > m ? c.lastTs : m, '');
    agents = Object.values(byKey).filter(ag => !ag.hidden)
      .sort((x,y) => lastOf(y) < lastOf(x) ? -1 : 1);

    if (firstBuild){
      firstBuild = false;
      agents.forEach(ag => expanded.add('b:' + brokerageName(ag)));
    }
    if (!convoById(activeId)){
      const first = agents[0] && agents[0].convos[0];
      activeId = first ? first.id : '';
      if (first){ expanded.add('a:' + agents[0].key); expanded.add('b:' + brokerageName(agents[0])); }
    }
  }

  // ---------- time ----------
  function dayOf(ts){
    const d = new Date(ts); if (isNaN(d)) return '';
    const now = new Date();
    const mid = x => new Date(x.getFullYear(), x.getMonth(), x.getDate()).getTime();
    const diff = Math.round((mid(now) - mid(d)) / 86400000);
    if (diff === 0) return 'Today';
    if (diff === 1) return 'Yesterday';
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric' }) + (d.getFullYear() !== now.getFullYear() ? ', ' + d.getFullYear() : '');
  }
  function timeOf(ts){
    const d = new Date(ts); if (isNaN(d)) return '';
    let h = d.getHours(); const m = String(d.getMinutes()).padStart(2,'0');
    const ap = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
    return h + ':' + m + ' ' + ap;
  }
  const sideTime = ts => { const day = dayOf(ts); return day === 'Today' ? timeOf(ts) : day; };

  // ---------- linkify ----------
  function linkify(text) {
    if (!text) return '';
    const urlRe = /((?:https?:\/\/|www\.)[^\s<]+|(?<![@\w.])(?:[a-z0-9](?:[a-z0-9-]*[a-z0-9])?\.)+(?:com|net|org|io|co|media|dev|app|me|tv|xyz|info|biz|us|uk|ca|au|edu|gov|ai|so|to|link|site|online|studio|agency|film|films|video)(?:\/[^\s<]*)?)/gi;
    let out = '', last = 0, m;
    while ((m = urlRe.exec(text))) {
      out += esc(text.slice(last, m.index));
      let url = m[0], trail = '';
      const tm = url.match(/[.,!?)\]'"]+$/);
      if (tm) { trail = tm[0]; url = url.slice(0, url.length - trail.length); }
      const href = /^https?:\/\//i.test(url) ? url : 'https://' + url;
      out += `<a href="${esc(href)}" target="_blank" rel="noopener noreferrer" class="underline underline-offset-2 break-all font-medium">${esc(url)}</a>` + esc(trail);
      last = m.index + m[0].length;
    }
    out += esc(text.slice(last));
    return out;
  }

  // ---------- sidebar: Brokerage ▸ Agent ▸ Project tree ----------
  const badge = n => n > 0 ? `<span class="unread-badge text-[10px] font-semibold rounded-full min-w-[18px] h-[18px] grid place-items-center px-1 shrink-0">${n}</span>` : '';
  const chevron = open => `<svg class="w-3.5 h-3.5 shrink-0 transition-transform ${open?'rotate-90':''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;
  const pinIcon = `<svg class="w-3 h-3 text-[#e11d2a] shrink-0" viewBox="0 0 24 24" fill="currentColor"><path d="M9 4h6l-1 7 3 3v2H7v-2l3-3-1-7z"/></svg>`;
  const buildingIcon = `<svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M6 21V7l6-4 6 4v14"/><path d="M10 9h.01M14 9h.01M10 13h.01M14 13h.01M10 17h.01M14 17h.01"/></svg>`;

  function previewOf(c){
    const last = c.messages[c.messages.length - 1];
    if (!last) return 'No messages yet';
    const txt = last.text || (last.atts && last.atts.length ? '📷 Photo' : '');
    return (last.side === 'out' ? 'You: ' : '') + txt;
  }

  function convoRow(c, indent){
    const un = unreadOf(c);
    const active = c.id === activeId;
    const ag = agentOf(c) || {};
    const line2 = indent
      ? previewOf(c)
      : (ag.name || '') + (ag.brokerage ? ' · ' + ag.brokerage : '');
    return `<button data-convo="${esc(c.id)}" class="w-full text-left ${indent ? 'pl-[3.6rem]' : 'pl-4'} pr-3 py-2 flex items-center gap-2.5 transition-colors ${active ? 'bg-[#1a1a1a] border-l-2 border-[#e11d2a]' : 'hover:bg-[#161616] border-l-2 border-transparent'}">
      <span class="w-7 h-7 rounded-${c.kind === 'direct' ? 'full' : 'lg'} bg-gradient-to-br from-[#242424] to-[#141414] border border-[#2a2a2a] grid place-items-center text-[10px] font-serif-display ${un?'text-[#e11d2a]':'text-[#8a8a8a]'} shrink-0">${esc(c.initials)}</span>
      <span class="min-w-0 flex-1">
        <span class="flex items-center gap-1.5">
          <span class="text-[13px] ${un?'text-white font-semibold':'text-[#c4c4c4]'} truncate">${esc(c.kind === 'direct' && indent ? 'Direct chat' : c.name)}</span>
          ${isPinned(c.id) ? pinIcon : ''}
          <span class="ml-auto text-[10px] text-[#5c5c5c] shrink-0">${esc(c.lastTs ? sideTime(c.lastTs) : '')}</span>
        </span>
        <span class="flex items-center justify-between gap-2 mt-0.5">
          <span class="text-[12px] text-[#8a8a8a] truncate">${esc(line2)}</span>${badge(un)}
        </span>
      </span>
    </button>`;
  }

  const convosSorted = ag => ag.convos.slice().sort((x,y) =>
    ((isPinned(y.id)?1:0) - (isPinned(x.id)?1:0)) ||
    ((x.kind==='direct'?1:0) !== (y.kind==='direct'?1:0) ? ((y.kind==='direct'?1:0) - (x.kind==='direct'?1:0)) : 0) ||
    ((y.lastTs||'') < (x.lastTs||'') ? -1 : 1));

  function renderSidebar(){
    const total = agents.reduce((s,ag) => s + agentUnread(ag), 0);
    $('#total-badge').textContent = total;
    $('#total-badge').style.display = total ? '' : 'none';
    $('#agent-count').textContent = agents.length + ' agent' + (agents.length === 1 ? '' : 's');

    const term = searchTerm.trim().toLowerCase();
    if (term){
      const hits = allConvos().filter(c => {
        const ag = agentOf(c) || {};
        return c.name.toLowerCase().includes(term) || (c.sub||'').toLowerCase().includes(term)
          || (ag.name||'').toLowerCase().includes(term) || (ag.brokerage||'').toLowerCase().includes(term);
      });
      convoList.innerHTML = hits.length
        ? hits.map(c => convoRow(c, false)).join('')
        : `<div class="px-5 py-10 text-center text-[12px] text-[#6a6a6a] leading-relaxed">No results for<br><span class="text-[#8a8a8a]">"${esc(searchTerm)}"</span></div>`;
      return;
    }

    if (!agents.length){
      convoList.innerHTML = `<div class="px-6 py-12 text-center text-[12.5px] text-[#6a6a6a] leading-relaxed">No agent hubs yet.<br>Push a hub from your Command Centre and it appears here automatically.</div>`;
      return;
    }

    // group agents by brokerage, both levels sorted by pin-presence then recency
    const lastOfAg = ag => ag.convos.reduce((m,c) => c.lastTs > m ? c.lastTs : m, '');
    const pinInAg = ag => ag.convos.some(c => isPinned(c.id));
    const groups = {};
    agents.forEach(ag => { const b = brokerageName(ag); (groups[b] = groups[b] || []).push(ag); });
    const brokerageList = Object.keys(groups).sort((x,y) =>
      ((groups[y].some(pinInAg)?1:0) - (groups[x].some(pinInAg)?1:0)) ||
      (Math.max(...groups[y].map(a=>lastOfAg(a)||'').map(s=>s||'')) < Math.max(...groups[x].map(a=>lastOfAg(a)||'').map(s=>s||'')) ? -1 : 1));

    convoList.innerHTML = brokerageList.map(bName => {
      const bOpen = expanded.has('b:' + bName);
      const bAgents = groups[bName].slice().sort((x,y) =>
        ((pinInAg(y)?1:0) - (pinInAg(x)?1:0)) || (lastOfAg(y) < lastOfAg(x) ? -1 : 1));
      const bUnread = bAgents.reduce((s,ag) => s + agentUnread(ag), 0);
      let html = `<button data-node="b:${esc(bName)}" class="w-full text-left px-3 py-2.5 flex items-center gap-2 hover:bg-[#161616] transition-colors text-[#8a8a8a]">
        ${chevron(bOpen)}
        ${buildingIcon}
        <span class="flex-1 text-[11px] font-semibold uppercase tracking-[0.1em] text-white truncate">${esc(bName)}</span>
        ${badge(bUnread)}
      </button>`;
      if (bOpen){
        html += bAgents.map(ag => {
          const aOpen = expanded.has('a:' + ag.key);
          const aUn = agentUnread(ag);
          const main = ag.convos.find(c => c.kind === 'direct');
          const aActive = main && main.id === activeId;
          let ah = `<div class="flex items-stretch ${aActive ? 'bg-[#1a1a1a] border-l-2 border-[#e11d2a]' : 'border-l-2 border-transparent'}">
            <button data-node="a:${esc(ag.key)}" class="pl-6 pr-1 flex items-center text-[#7a7a7a] hover:text-white transition-colors" aria-label="Toggle projects">${chevron(aOpen)}</button>
            <button ${main ? `data-convo="${esc(main.id)}"` : ''} class="flex-1 min-w-0 text-left pr-3 py-2 flex items-center gap-2 hover:bg-[#161616] transition-colors" title="${esc(ag.name)} — direct chat">
              <span class="w-6 h-6 rounded-full bg-gradient-to-br from-[#262626] to-[#141414] border border-[#2e2e2e] grid place-items-center text-[9px] font-serif-display ${aUn?'text-[#e11d2a]':'text-[#9a9a9a]'} shrink-0">${esc(ag.initials)}</span>
              <span class="flex-1 min-w-0 flex items-center gap-1.5">
                <span class="text-[13px] ${aUn?'text-white':'text-[#c4c4c4]'} truncate">${esc(ag.name)}</span>
                ${ag.stale ? '<span class="text-[9px] uppercase tracking-[0.1em] text-[#6a6a6a] border border-[#2a2a2a] rounded px-1 shrink-0">old</span>' : ''}
                ${(main && isPinned(main.id)) ? pinIcon : ''}
              </span>
              ${badge(aUn)}
            </button>
          </div>`;
          if (aOpen) ah += convosSorted(ag).filter(c => c.kind !== 'direct').map(c => convoRow(c, true)).join('');
          return ah;
        }).join('');
      }
      return html;
    }).join('');
  }

  let suppressClick = false;
  convoList.addEventListener('click', e => {
    if (suppressClick) { suppressClick = false; return; }
    const node = e.target.closest('[data-node]');
    if (node && !e.target.closest('[data-convo]')){
      const key = node.dataset.node;
      if (expanded.has(key)) expanded.delete(key); else expanded.add(key);
      renderSidebar();
      return;
    }
    const b = e.target.closest('[data-convo]');
    if (b) selectConversation(b.dataset.convo);

  // Right-click / long-press / swipe-right to pin.
  const ctxMenu = document.createElement('div');
  ctxMenu.id = 'ctx-menu';
  ctxMenu.className = 'fixed z-[70] hidden min-w-[168px] bg-[#1a1a1a] border border-[#2a2a2a] rounded-xl shadow-[0_12px_32px_-8px_rgba(0,0,0,0.85)] py-1';
  document.body.appendChild(ctxMenu);
  let ctxTargetId = null;
  function openContextMenu(id, x, y){
    ctxTargetId = id;
    const on = isPinned(id);
    ctxMenu.innerHTML = `<button class="ctx-pin w-full text-left px-3 py-2 text-[13px] text-white hover:bg-[#262626] flex items-center gap-2.5">
      <svg class="w-4 h-4 ${on?'text-[#e11d2a]':'text-[#8a8a8a]'}" viewBox="0 0 24 24" fill="${on?'currentColor':'none'}" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4h6l-1 7 3 3v2H7v-2l3-3-1-7z"/><line x1="12" y1="16" x2="12" y2="21"/></svg>
      ${on ? 'Unpin from top' : 'Pin to top'}
    </button>`;
    ctxMenu.classList.remove('hidden');
    ctxMenu.style.left = Math.min(x, window.innerWidth - ctxMenu.offsetWidth - 8) + 'px';
    ctxMenu.style.top = Math.min(y, window.innerHeight - ctxMenu.offsetHeight - 8) + 'px';
  }
  function closeContextMenu(){ ctxMenu.classList.add('hidden'); ctxTargetId = null; }
  ctxMenu.addEventListener('click', e => { if (e.target.closest('.ctx-pin')) { togglePin(ctxTargetId); closeContextMenu(); } });
  document.addEventListener('click', e => { if (!ctxMenu.classList.contains('hidden') && !e.target.closest('#ctx-menu')) closeContextMenu(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeContextMenu(); });
  window.addEventListener('resize', closeContextMenu);
  convoList.addEventListener('scroll', closeContextMenu);
  convoList.addEventListener('contextmenu', e => {
    const row = e.target.closest('[data-convo]');
    if (!row) return;
    e.preventDefault();
    openContextMenu(row.dataset.convo, e.clientX, e.clientY);
  });
  let touchStart = null, lpTimer = null;
  convoList.addEventListener('touchstart', e => {
    const row = e.target.closest('[data-convo]');
    if (!row) return;
    const tt = e.touches[0];
    touchStart = { x: tt.clientX, y: tt.clientY, id: row.dataset.convo };
    lpTimer = setTimeout(() => { suppressClick = true; openContextMenu(row.dataset.convo, tt.clientX, tt.clientY); lpTimer = null; }, 500);
  }, { passive: true });
  convoList.addEventListener('touchmove', e => {
    if (!touchStart) return;
    const tt = e.touches[0];
    if (Math.abs(tt.clientX - touchStart.x) > 10 || Math.abs(tt.clientY - touchStart.y) > 10) { if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; } }
  }, { passive: true });
  convoList.addEventListener('touchend', e => {
    if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; }
    if (!touchStart) return;
    const ch = e.changedTouches[0];
    const dx = ch.clientX - touchStart.x, dy = ch.clientY - touchStart.y;
    if (dx > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) { suppressClick = true; togglePin(touchStart.id); }
    touchStart = null;
  });

  // ---------- reactions ----------
  function chipData(msgId){
    const ent = reactMap[msgId] || {};
    const out = [];
    Object.keys(ent).forEach(e => {
      const n = (ent[e].a ? 1 : 0) + (ent[e].j ? 1 : 0);
      if (n > 0) out.push({ e, n, mine: !!ent[e][MY_SIDE] });
    });
    return out;
  }
  function reactionChips(m){
    if (!m.id) return '';
    const chips = chipData(m.id);
    if (!chips.length) return '';
    const align = m.side === 'in' ? '' : 'justify-end';
    return `<div class="flex flex-wrap gap-1 mt-1.5 ${align}">` + chips.map(c =>
      `<button class="reaction-chip flex items-center gap-1 rounded-full px-2 py-[3px] text-[12px] border transition-colors ${c.mine ? 'border-[#e11d2a] bg-[#e11d2a]/20 text-white' : 'border-[#2a2a2a] bg-[#1a1a1a] text-[#c4c4c4] hover:border-[#3a3a3a]'}" data-mid="${esc(m.id)}" data-emoji="${c.e}"><span>${c.e}</span>${c.n > 1 ? `<span class="text-[11px] text-[#8a8a8a]">${c.n}</span>` : ''}</button>`
    ).join('') + `</div>`;
  }
  function applyReaction(msgId, emoji){
    const c = convoById(activeId); if (!c || !msgId) return;
    const ent = (reactMap[msgId] = reactMap[msgId] || {});
    const st = (ent[emoji] = ent[emoji] || {a:0, j:0});
    const nowOn = !st[MY_SIDE];
    st[MY_SIDE] = nowOn ? 1 : 0;
    renderThread();
    fetch(ENDPOINT, { method:'POST', body: JSON.stringify({
      kind:'react', ref: c.key, project: c.label, dname:'',
      who: 'Reel Estate Media', from:'jag',
      body: JSON.stringify({ m: msgId, e: emoji, op: nowOn ? '+' : '-' })
    })}).catch(() => {});
  }

  // ---------- messages ----------
  function attachmentsHTML(atts){
    return (atts || []).map(at => {
      if (at.k === 'image' && at.d){
        return `<button type="button" class="attach-image block w-full" data-url="${esc(at.d)}"><img src="${esc(at.d)}" alt="${esc(at.n || 'photo')}" class="rounded-xl w-full max-h-60 object-cover cursor-zoom-in"></button>`;
      }
      return '';
    }).join('');
  }

  function buildMessage(m, seen){
    const inSide = m.side === 'in';
    const colAlign = inSide ? 'items-start' : 'items-end ml-auto';
    const rowDir = inSide ? '' : 'flex-row-reverse';
    const bubbleCls = inSide
      ? 'bg-[#1c1c1c] border border-[#262626] text-[#b3b3b3] rounded-2xl rounded-tl-md shadow-sm'
      : 'bg-[#e11d2a] text-white rounded-2xl rounded-tr-md shadow-[0_6px_20px_-6px_rgba(225,29,42,0.5)]';
    const timeAlign = inSide ? 'ml-1' : 'mr-1';
    const hasAtt = m.atts && m.atts.length;
    const inner = hasAtt
      ? `<div class="flex flex-col gap-1.5 min-w-[140px]">${attachmentsHTML(m.atts)}${m.text ? `<div class="px-2 pb-0.5">${linkify(m.text)}</div>` : ''}</div>`
      : linkify(m.text);
    const pad = hasAtt ? 'p-1.5' : 'px-4 py-3';
    const trigger = m.id
      ? `<button class="react-trigger opacity-0 group-hover:opacity-100 focus:opacity-100 transition-opacity shrink-0 w-7 h-7 grid place-items-center rounded-full bg-[#1a1a1a] border border-[#2a2a2a] text-[#8a8a8a] hover:text-white" data-mid="${esc(m.id)}" aria-label="Add reaction"><svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg></button>`
      : '';
    const bubble = `<div class="react-bubble ${bubbleCls} ${pad} text-[14px] leading-relaxed ${m.id ? 'cursor-pointer' : ''} select-none" data-mid="${esc(m.id || '')}">${inner}</div>`;
    return `<div class="group flex flex-col ${colAlign} max-w-[80%] msg-enter">
      <div class="flex items-center gap-2 ${rowDir}">${bubble}${trigger}</div>
      ${reactionChips(m)}
      <span class="text-[10px] text-[#5c5c5c] mt-1.5 ${timeAlign} tracking-wide">${esc((inSide && m.who ? m.who + ' · ' : '') + timeOf(m.ts))}${seen ? ' · <span class="text-[#e11d2a] font-semibold">Seen</span>' : ''}</span>
    </div>`;
  }

  function renderThread(){
    const c = convoById(activeId);
    if (!c){ thread.innerHTML = ''; return; }
    const ag = agentOf(c) || {};
    const parts = c.name.split(' ');
    $('#hdr-name').innerHTML = esc(parts[0]) + (parts.length > 1 ? ' <span class="text-[#e11d2a] italic">' + esc(parts.slice(1).join(' ')) + '</span>' : '');
    $('#hdr-role').textContent = c.kind === 'direct'
      ? ((ag.brokerage ? ag.brokerage + ' · ' : '') + 'Direct chat')
      : (ag.name + (c.sub ? ' · ' + c.sub : ''));
    $('#hdr-avatar').textContent = c.initials;
    $('#input-label').textContent = 'Replying as Reel Estate Media · ' + (c.kind === 'direct' ? ag.name : ag.name + ' — ' + c.name);
    $('#chat-input').placeholder = 'Message ' + (c.kind === 'direct' ? ag.name : ag.name + ' about ' + c.name) + '…';
    paintPinBtn();

    const since = readTs(c.id);
    const unreadCount = c.messages.filter(m => m.side === 'in' && m.ts > since).length;
    let html = '', curDay = null, unreadShown = false;

    if (!c.messages.length){
      html = `<div class="h-full flex flex-col items-center justify-center text-center gap-2 py-16">
        <div class="w-12 h-12 rounded-full bg-[#1a1a1a] border border-[#262626] grid place-items-center text-[#e11d2a] font-serif-display text-lg">${esc(c.initials)}</div>
        <p class="text-[13px] text-[#8a8a8a] max-w-[34ch]">No messages yet — anything you send lands on ${esc(ag.name || 'the agent')}'s hub as Reel Estate Media.</p>
      </div>`;
    } else {
      const theirTs = agentRead[c.id] || '';
      let lastOut = -1;
      c.messages.forEach((m,i) => { if (m.side === 'out') lastOut = i; });
      c.messages.forEach((m, i) => {
        const d = dayOf(m.ts);
        if (d !== curDay){
          curDay = d;
          html += `<div class="flex items-center gap-3"><div class="flex-1 h-px bg-[#262626]"></div><span class="text-[10px] uppercase tracking-[0.18em] date-chip rounded-full px-3 py-1">${esc(d)}</span><div class="flex-1 h-px bg-[#262626]"></div></div>`;
        }
        if (!unreadShown && unreadCount && m.side === 'in' && m.ts > since){
          unreadShown = true;
          html += `<div class="flex items-center gap-3"><div class="flex-1 h-px" style="background:linear-gradient(90deg,transparent,rgba(225,29,42,0.5))"></div><span class="text-[10px] uppercase tracking-[0.18em] font-semibold text-[#e11d2a] flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-[#e11d2a]"></span>${unreadCount} unread message${unreadCount>1?'s':''}</span><div class="flex-1 h-px" style="background:linear-gradient(90deg,rgba(225,29,42,0.5),transparent)"></div></div>`;
        }
        html += buildMessage(m, i === lastOut && !!theirTs && theirTs >= m.ts);
      });
    }
    thread.innerHTML = html;
    thread.scrollTop = thread.scrollHeight;
  }

  function expandPathTo(id){
    const c = convoById(id); if (!c) return;
    const ag = agentOf(c); if (!ag) return;
    expanded.add('a:' + ag.key);
    expanded.add('b:' + brokerageName(ag));
  }
  function selectConversation(id){
    if (activeId && convoById(activeId)) markRead(activeId);
    activeId = id;
    expandPathTo(id);
    renderThread();
    markRead(id);
    renderSidebar();
    closeDrawer();
    $('#chat-input').focus();
  }

  // ---------- mobile drawer ----------
  function openDrawer(){ sidebar.classList.remove('-translate-x-full'); backdrop.classList.remove('opacity-0','pointer-events-none'); }
  function closeDrawer(){
    if (window.innerWidth >= 640) return;
    sidebar.classList.add('-translate-x-full'); backdrop.classList.add('opacity-0','pointer-events-none');
  }
  $('#open-sidebar').addEventListener('click', openDrawer);
  $('#close-sidebar').addEventListener('click', closeDrawer);
  backdrop.addEventListener('click', closeDrawer);

  // ---------- toast ----------
  const toast = document.createElement('div');
  toast.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 z-[80] hidden bg-[#1a1a1a] border border-[#2a2a2a] text-white text-[13px] rounded-full px-4 py-2 shadow-[0_10px_30px_-8px_rgba(0,0,0,0.85)]';
  document.body.appendChild(toast);
  let toastTimer = null;
  function showToast(msg){
    toast.textContent = msg;

    toastTimer = setTimeout(() => toast.classList.add('hidden'), 2600);

  // ---------- send ----------
  function postMsg(c, body){
    return fetch(ENDPOINT, { method:'POST', body: JSON.stringify({
      kind:'msg', ref: c.key, project: c.label || generalLabel(agentOf(c) || {name:''}), dname:'',
      who: 'Reel Estate Media', from:'jag', body
    })});
  }
  function sendMessage(){
    const input = $('#chat-input');
    const text = input.value.trim();
    if (!text) return;
    const c = convoById(activeId); if (!c) return;
    input.value = '';
    const now = new Date().toISOString();
    c.messages.push({ id:'', ts: now, side:'out', who:'You', text, atts: [] });
    c.lastTs = now;
    markRead(activeId);
    renderThread();
    renderSidebar();
    postMsg(c, text).then(() => setTimeout(() => loadAll().catch(()=>{}), 1500)).catch(() => {});
  }
  $('#send-btn').addEventListener('click', sendMessage);
  $('#chat-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

  // ---------- attachments (photos, compressed to fit the backend) ----------
  function compressImage(file){
    return new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        URL.revokeObjectURL(url);
        const steps = [[900, 0.72], [640, 0.6], [440, 0.5], [320, 0.42]];
        for (let i = 0; i < steps.length; i++){
          const maxW = steps[i][0], qual = steps[i][1];
          const scale = Math.min(1, maxW / Math.max(img.width, img.height));
          const cv = document.createElement('canvas');
          cv.width = Math.max(1, Math.round(img.width * scale));
          cv.height = Math.max(1, Math.round(img.height * scale));
          cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
          const d = cv.toDataURL('image/jpeg', qual);
          if (d.length < 42000) return resolve(d);
        }
        reject(new Error('too big'));
      };
      img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('bad image')); };
      img.src = url;
    });
  }
  const fileInput = $('#file-input');
  $('#attach-btn').addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', async () => {
    if (!fileInput.files.length) return;
    const c = convoById(activeId); if (!c) return;
    const files = [...fileInput.files];
    fileInput.value = '';
    const caption = $('#chat-input').value.trim();
    $('#chat-input').value = '';
    let first = true;
    for (const f of files){
      if (!f.type.startsWith('image/')){ showToast('Only photos can be sent here for now.'); continue; }
      try {
        const d = await compressImage(f);
        const body = JSON.stringify({ __rc:1, t: first ? caption : '', att: [{ k:'image', n: f.name, d }] });
        const now = new Date().toISOString();
        c.messages.push({ id:'', ts: now, side:'out', who:'You', text: first ? caption : '', atts: [{ k:'image', n: f.name, d }] });
        c.lastTs = now;
        first = false;
        renderThread(); renderSidebar();
        await postMsg(c, body);
      } catch(e){
        showToast("Couldn't send " + f.name + ' — try a smaller photo.');
      }
    }
    markRead(activeId);
    setTimeout(() => loadAll().catch(()=>{}), 1500);
  });

  // ---------- lightbox ----------
  const lightbox = document.createElement('div');
  lightbox.id = 'lightbox';
  lightbox.className = 'fixed inset-0 z-[60] hidden items-center justify-center bg-black/90 p-6';
  lightbox.innerHTML = `
    <button id="lightbox-close" class="absolute top-4 right-4 w-10 h-10 grid place-items-center rounded-full bg-white/10 hover:bg-white/20 text-white transition-colors" aria-label="Close">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <img id="lightbox-img" class="max-w-full max-h-full rounded-lg object-contain" alt="" />`;
  document.body.appendChild(lightbox);
  function openLightbox(url){
    lightbox.querySelector('#lightbox-img').src = url;
    lightbox.classList.remove('hidden');
    lightbox.classList.add('flex');
  }
  function closeLightbox(){
    lightbox.classList.add('hidden');
    lightbox.classList.remove('flex');
    lightbox.querySelector('#lightbox-img').src = '';
  }
  lightbox.addEventListener('click', e => { if (e.target === lightbox || e.target.closest('#lightbox-close')) closeLightbox(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  // ---------- emoji picker + panel ----------
  const REACT_EMOJIS = ['👍','❤️','😂','🔥','🎬','✅'];
  const EMOJI_CATEGORIES = [
    { name:'Smileys', items:[
      ['😀','grin happy smile'],['😃','happy smile joy'],['😄','happy laugh smile'],['😁','grin beam'],['😆','laugh haha'],['😅','sweat laugh nervous'],['🤣','rofl laughing'],['😂','joy tears laugh cry'],['🙂','slight smile'],['🙃','upside down silly'],['😉','wink'],['😊','blush smile happy'],['😇','angel innocent'],['🥰','love hearts adore'],['😍','heart eyes love'],['🤩','star struck wow'],['😘','kiss blow'],['😗','kiss'],['😚','kiss closed'],['😋','yum tasty'],['😛','tongue'],['😜','wink tongue silly'],['🤪','zany crazy'],['😝','tongue squint'],['🤗','hug hands'],['🤭','giggle oops'],['🤫','shh quiet'],['🤔','thinking hmm'],['😐','neutral meh'],['😑','expressionless'],['😶','no mouth speechless'],['😏','smirk'],['😒','unamused'],['🙄','eye roll'],['😬','grimace awkward'],['😌','relieved calm'],['😔','sad pensive'],['😪','sleepy tired'],['🤤','drool'],['😴','sleep zzz'],['😷','mask sick'],['🤒','sick thermometer'],['🤕','hurt bandage'],['🥳','party celebrate'],['🥺','pleading puppy'],['😢','cry sad tear'],['😭','sob crying'],['😤','huff steam'],['😠','angry'],['😡','rage mad red'],['🤬','swearing curse'],['😳','flushed shock'],['🥵','hot heat'],['🥶','cold freeze'],['😨','fear scared'],['😰','anxious sweat'],['😱','scream shock'],['🤯','mind blown'],['😎','cool sunglasses'],['🤓','nerd geek'],['🧐','monocle inspect'],
    ]},
    { name:'Gestures', items:[
      ['👍','thumbs up like yes good approve'],['👎','thumbs down dislike no'],['👌','ok okay perfect'],['🤌','pinch chef italian'],['🤏','pinch small tiny'],['✌️','peace victory'],['🤞','fingers crossed luck'],['🤟','love you'],['🤘','rock horns metal'],['🤙','call me shaka'],['👈','left point'],['👉','right point'],['👆','up point'],['👇','down point'],['☝️','up index'],['✋','hand stop high five'],['🤚','back hand'],['🖐️','hand fingers'],['🖖','vulcan spock'],['👋','wave hello bye hi'],['🤝','handshake deal agree'],['🙏','pray thanks please'],['✍️','write hand'],['💪','muscle strong flex'],['👏','clap applause bravo'],['🙌','raise hands praise'],['👐','open hands'],['🤲','palms up'],['🫶','heart hands love'],
    ]},
    { name:'Hearts', items:[
      ['❤️','red heart love'],['🧡','orange heart'],['💛','yellow heart'],['💚','green heart'],['💙','blue heart'],['💜','purple heart'],['🖤','black heart'],['🤍','white heart'],['🤎','brown heart'],['💔','broken heart'],['❣️','heart exclamation'],['💕','two hearts'],['💞','revolving hearts'],['💓','beating heart'],['💗','growing heart'],['💖','sparkling heart'],['💘','heart arrow cupid'],['💝','heart gift'],['💟','heart decoration'],['❤️‍🔥','heart fire burning love'],
    ]},
    { name:'Production', items:[
      ['🎬','clapper film shoot action movie'],['🎥','movie camera film'],['📽️','projector film'],['🎞️','film strip reel'],['📸','camera flash photo'],['📷','camera photo'],['🎦','cinema'],['📹','video camera'],['🎙️','mic studio record'],['🎧','headphones audio'],['💻','laptop computer'],['🖥️','desktop monitor'],['📱','phone mobile'],['📝','memo note edit'],['✏️','pencil write'],['📌','pin'],['📎','paperclip attach'],['📁','folder'],['📅','calendar date'],['⏰','alarm clock time'],['⏱️','stopwatch timer'],['🔔','bell notify'],['🚀','rocket launch ship fast'],['✅','check done complete yes tick'],['☑️','checkbox ticked'],['✔️','check mark tick'],['❌','cross no wrong x'],['⭐','star'],['🌟','glowing star sparkle'],['💥','boom collision'],['⚡','lightning fast bolt'],['🔥','fire lit hot flame'],['💯','hundred perfect'],['🎉','party tada celebrate'],['🎊','confetti'],['🏆','trophy win award'],['🥇','gold medal first'],
    ]},
    { name:'Symbols', items:[
      ['👀','eyes look watch'],['🙈','see no evil monkey'],['💡','idea bulb light'],['💬','speech bubble chat'],['💭','thought bubble'],['❓','question'],['❗','exclamation'],['‼️','double exclamation'],['⁉️','interrobang'],['💤','zzz sleep'],['🆗','ok button'],['🆒','cool button'],['🆕','new button'],['🔴','red circle'],['🟠','orange circle'],['🟡','yellow circle'],['🟢','green circle'],['🔵','blue circle'],['🟣','purple circle'],['⚫','black circle'],['⚪','white circle'],
    ]},
  ];

  const picker = document.createElement('div');
  picker.id = 'reaction-picker';
  picker.className = 'fixed z-50 hidden items-center gap-0.5 bg-[#1a1a1a] border border-[#2a2a2a] rounded-full px-2 py-1.5 shadow-[0_10px_30px_-8px_rgba(0,0,0,0.85)]';
  picker.innerHTML = REACT_EMOJIS.map(e => `<button class="picker-emoji w-8 h-8 grid place-items-center rounded-full hover:bg-[#262626] transition-colors text-[18px] leading-none" data-emoji="${e}" aria-label="React ${e}">${e}</button>`).join('')
    + `<span class="w-px h-5 bg-[#2a2a2a] mx-0.5"></span>`
    + `<button class="picker-more w-8 h-8 grid place-items-center rounded-full hover:bg-[#262626] text-[#8a8a8a] hover:text-white transition-colors" aria-label="More emojis"><svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>`;
  document.body.appendChild(picker);

  const emojiPanel = document.createElement('div');
  emojiPanel.id = 'emoji-panel';
  emojiPanel.className = 'fixed z-50 hidden flex-col w-[320px] max-w-[92vw] h-[300px] bg-[#141414] border border-[#2a2a2a] rounded-2xl shadow-[0_16px_40px_-10px_rgba(0,0,0,0.85)] overflow-hidden';
  emojiPanel.innerHTML = `
    <div class="p-2 border-b border-[#262626] shrink-0">
      <div class="flex items-center gap-2 bg-[#1a1a1a] border border-[#2a2a2a] rounded-full px-3 py-1.5">
        <svg class="w-4 h-4 text-[#5c5c5c] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="emoji-search" type="text" placeholder="Search emoji" class="w-full bg-transparent outline-none text-[13px] text-white placeholder-[#5c5c5c]" />
      </div>
    </div>
    <div id="emoji-grid" class="flex-1 overflow-y-auto scrollbar-thin p-2"></div>`;
  document.body.appendChild(emojiPanel);

  const emojiBtn = e => `<button class="panel-emoji h-8 grid place-items-center rounded-lg hover:bg-[#262626] transition-colors text-[18px] leading-none" data-emoji="${e}" aria-label="React ${e}">${e}</button>`;
  function renderEmojiGrid(qq){
    const grid = emojiPanel.querySelector('#emoji-grid');
    const query = (qq || '').trim().toLowerCase();
    if (query){
      const matches = [];
      EMOJI_CATEGORIES.forEach(cat => cat.items.forEach(([e, k]) => { if (k.includes(query) || e === qq) matches.push(e); }));
      grid.innerHTML = matches.length
        ? `<div class="grid grid-cols-8 gap-0.5">${matches.map(emojiBtn).join('')}</div>`
        : `<div class="py-12 text-center text-[12px] text-[#6a6a6a]">No emoji found</div>`;
    } else {
      grid.innerHTML = EMOJI_CATEGORIES.map(cat =>
        `<div class="px-1 pt-2 pb-1 text-[10px] uppercase tracking-[0.15em] text-[#6a6a6a]">${cat.name}</div><div class="grid grid-cols-8 gap-0.5">${cat.items.map(([e]) => emojiBtn(e)).join('')}</div>`
      ).join('');
    }
  }
  emojiPanel.querySelector('#emoji-search').addEventListener('input', e => renderEmojiGrid(e.target.value));

  let targetMid = null;
  function place(el, anchorEl){
    const r = anchorEl.getBoundingClientRect();
    const left = Math.min(Math.max(8, r.left), window.innerWidth - el.offsetWidth - 8);
    let top = r.top - el.offsetHeight - 8;
    if (top < 8) top = Math.min(r.bottom + 8, window.innerHeight - el.offsetHeight - 8);
    el.style.left = left + 'px';
    el.style.top = top + 'px';
  }
  function openPicker(mid, anchorEl){ targetMid = mid; emojiPanel.classList.add('hidden'); emojiPanel.classList.remove('flex'); picker.classList.remove('hidden'); picker.classList.add('flex'); place(picker, anchorEl); }
  function openPanel(anchorEl){
    picker.classList.add('hidden'); picker.classList.remove('flex');
    const search = emojiPanel.querySelector('#emoji-search');
    search.value = ''; renderEmojiGrid('');
    emojiPanel.classList.remove('hidden'); emojiPanel.classList.add('flex');
    place(emojiPanel, anchorEl);
    search.focus();
  }
  function closeReactUI(){ picker.classList.add('hidden'); picker.classList.remove('flex'); emojiPanel.classList.add('hidden'); emojiPanel.classList.remove('flex'); targetMid = null; }

  picker.addEventListener('click', e => {
    if (e.target.closest('.picker-more')) { openPanel(e.target.closest('.picker-more')); return; }
    const b = e.target.closest('.picker-emoji');
    if (!b) return;
    if (targetMid) applyReaction(targetMid, b.dataset.emoji);
    closeReactUI();
  });
  emojiPanel.addEventListener('click', e => {
    const b = e.target.closest('.panel-emoji');
    if (!b) return;
    if (targetMid) applyReaction(targetMid, b.dataset.emoji);
    closeReactUI();
  });

  thread.addEventListener('click', e => {
    if (e.target.closest('a')) return;
    const img = e.target.closest('.attach-image');
    if (img) { openLightbox(img.dataset.url); return; }
    const trig = e.target.closest('.react-trigger');
    if (trig) { openPicker(trig.dataset.mid, trig); return; }
    const chip = e.target.closest('.reaction-chip');
    if (chip) { applyReaction(chip.dataset.mid, chip.dataset.emoji); return; }
    const bub = e.target.closest('.react-bubble');
    if (bub && bub.dataset.mid) { openPicker(bub.dataset.mid, bub); return; }
  });
  document.addEventListener('click', e => {
    if (picker.classList.contains('hidden') && emojiPanel.classList.contains('hidden')) return;
    if (e.target.closest('#reaction-picker') || e.target.closest('#emoji-panel') || e.target.closest('.react-trigger') || e.target.closest('.react-bubble')) return;
    closeReactUI();
  });
  window.addEventListener('resize', closeReactUI);
  thread.addEventListener('scroll', closeReactUI);

  // ---------- data loading ----------
  function loadAll(){
    return fetch(ENDPOINT + '?token=' + encodeURIComponent(TOKEN))
      .then(r => r.json())
      .then(j => {
        if (!j.ok) throw new Error(j.error || 'load failed');
        buildFromRows(j.rows || []);
        renderSidebar();
        renderThread();
      });
  }

  // ---------- gate ----------
  function unlock(){
    const tok = $('#gate-token').value.trim();
    if (!tok){ gateErr('Paste your token first — it\'s the one from your inbox script.'); return; }
    $('#gate-go').textContent = 'Opening…';
    TOKEN = tok;
    loadAll()
      .then(() => {
        try { localStorage.setItem(TOKEN_KEY, TOKEN); } catch(e){}
        $('#gate').classList.add('hidden');
        $('#app').classList.remove('hidden');
        if (activeId) markRead(activeId);
        renderSidebar();
        if (!pollTimer) pollTimer = setInterval(() => loadAll().catch(()=>{}), POLL_MS);
      })
      .catch(err => {
        $('#gate-go').textContent = 'Open chat';
        gateErr(String(err.message || err) === 'bad token'
          ? "That token isn't right — copy it from the top of your inbox script."
          : "Couldn't reach the server — check your connection and try again.");
      });
  }
  function gateErr(t){ const e = $('#gate-err'); e.textContent = t; e.classList.remove('hidden'); }
  $('#gate-go').addEventListener('click', unlock);
  $('#gate-token').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });

  $('#lock-btn').addEventListener('click', () => {
    try { localStorage.removeItem(TOKEN_KEY); } catch(e){}
    location.reload();
  });

  $('#search').addEventListener('input', e => { searchTerm = e.target.value; renderSidebar(); });

  // Auto-unlock if the token is already on this device (saved here, via
  // login.html?admin, or handed over by the Command Centre's 💬 Chat button)
  try {
    const saved = localStorage.getItem(TOKEN_KEY);
    if (saved){ $('#gate-token').value = saved; unlock(); }
  } catch(e){}
</script>
</body>
