          <span class="min-w-0">
            <span class="block text-[13px] text-[#d4d4d4] truncate">${esc(ag.name)}</span>
            <span class="block text-[11px] text-[#6a6a6a] truncate">${esc(ag.brokerage || 'Independent')}</span>
          </span>
        </label>`).join('') || '<p class="text-[12px] text-[#6a6a6a] text-center py-6">No agents yet — push a hub first.</p>'}
      </div>
      <div class="px-5 py-4 border-t border-[#262626]">
        <button id="grp-save" class="w-full bg-[#e11d2a] hover:bg-[#c81824] disabled:opacity-50 text-white text-[12px] font-bold uppercase tracking-[0.14em] rounded-xl py-3 send-glow transition-all active:scale-[0.99]">${editing ? 'Save changes' : 'Create team'}</button>
        ${editing ? '<button id="grp-off" class="w-full mt-2 text-[11px] font-semibold text-[#6a6a6a] hover:text-[#e11d2a] py-1.5 transition-colors">Delete this team</button>' : ''}
        <p class="text-[11px] text-[#5c5c5c] text-center mt-2.5">${editing ? 'Everyone in the team can rename it or change its photo — members are yours to manage.' : "Only you can create teams — agents can't."}</p>
      </div>
    </div>`;
    grpRefreshFooter();
  }
  function openGroupModal(c){
    grpEditing = c || null;
    grpPicId = c ? (c.pic || '') : '';
    renderGrpModal();
    grpModal.classList.remove('hidden');
    grpModal.classList.add('flex');
    const nm = grpModal.querySelector('#grp-name');
    if (nm && !c) nm.focus();
  }
  function closeGrpModal(){ grpModal.classList.add('hidden'); grpModal.classList.remove('flex'); grpEditing = null; }

  function postGroup(gid, meta){
    return fetch(ENDPOINT, { method:'POST', body: JSON.stringify({
      kind:'group', ref: gid, project:'', dname:'',
      who: 'Reel Estate Media', from:'jag', body: JSON.stringify(meta)
    })});
  }
  async function grpSave(){
    const name = (grpModal.querySelector('#grp-name').value || '').trim();
    const desc = (grpModal.querySelector('#grp-desc').value || '').trim();
    const members = [...grpModal.querySelectorAll('input[data-key]:checked')].map(x => x.dataset.key);
    if (!name){ showToast('Give the team a name first.'); return; }
    if (!members.length){ showToast('Pick at least one agent for the team.'); return; }
    const editing = grpEditing;
    const gid = editing ? editing.gid : 'grp-' + Math.random().toString(36).slice(2, 10);
    const btn = grpModal.querySelector('#grp-save');
    btn.disabled = true; btn.textContent = editing ? 'Saving…' : 'Creating…';
    try { await postGroup(gid, { name, desc, pic: grpPicId, members, on: true }); } catch(e){}
    const nameOf = k => { const ag = agents.find(a2 => a2.key === k); return ag ? ag.name : k; };
    if (editing){
      editing.name = name; editing.pic = grpPicId; editing.desc = desc;
      editing.members = members; editing.memberNames = members.map(nameOf);
      editing.sub = '👥 Group · ' + (members.length + 1) + ' people';
      closeGrpModal();
      showToast('👥 Team updated');
      renderSidebar(); renderThread();
    } else {
      const c = { id: 'g|' + gid, gid, key: gid, kind: 'group', label: '',
        name, pic: grpPicId, desc, members, memberNames: members.map(nameOf),
        sub: '👥 Group · ' + (members.length + 1) + ' people',
        initials: '👥', messages: [], lastTs: '' };
      groupConvos.push(c);
      expanded.add('g:' + gid);
      closeGrpModal();
      showToast("👥 Team created — the group chat is live in every member's hub");
      selectConversation(c.id);
    }
    setTimeout(() => loadAll().catch(()=>{}), 1500);
  }
  grpModal.addEventListener('click', async e => {
    if (e.target === grpModal || e.target.closest('#grp-close')){ closeGrpModal(); return; }
    if (e.target.closest('#grp-pic-btn')){ grpModal.querySelector('#grp-pic-input').click(); return; }
    if (e.target.closest('#grp-save')){ grpSave(); return; }
    const off = e.target.closest('#grp-off');
    if (off){
      if (!off.dataset.armed){
        off.dataset.armed = '1';
        off.textContent = 'Tap again to delete — the group chat disappears for everyone';
        off.classList.add('text-[#e11d2a]');
        setTimeout(() => { delete off.dataset.armed; off.textContent = 'Delete this group'; off.classList.remove('text-[#e11d2a]'); }, 3000);
        return;
      }
      const g = grpEditing;
      closeGrpModal();
      if (g){
        try { await postGroup(g.gid, { name: g.name, desc: g.desc || '', pic: g.pic, members: g.members, on: false }); } catch(e2){}
        groupConvos = groupConvos.filter(x => x.gid !== g.gid);
        if (activeId === g.id){ const first = allConvos()[0]; activeId = first ? first.id : ''; }
        showToast('Team deleted');
        renderSidebar(); renderThread();
        setTimeout(() => loadAll().catch(()=>{}), 1500);
      }
      return;
    }
  });
  grpModal.addEventListener('change', async e => {
    if (e.target.closest('input[data-key]')){ grpRefreshFooter(); return; }
    const inp = e.target.closest('#grp-pic-input');
    if (inp && inp.files && inp.files.length){
      const f = inp.files[0];
      inp.value = '';
      const wrap = grpModal.querySelector('#grp-pic-wrap');
      try {
        showToast('Uploading photo…');
        grpPicId = await uploadToDrive(f);
        if (wrap) wrap.innerHTML = grpAvatarHtml();
        showToast('Photo set — save to apply');
      } catch(e2){ showToast("Couldn't upload that photo — try another one."); }
    }
  });
  grpModal.addEventListener('keydown', e => { if (e.key === 'Enter' && e.target.id === 'grp-name') grpSave(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && !grpModal.classList.contains('hidden')) closeGrpModal(); });
  $('#grp-edit-btn').addEventListener('click', () => {
    const c = convoById(activeId);
    if (c && c.kind === 'group') openGroupModal(c);
  });

  // ---------- 📌 pins ----------
  function pinMessage(mid){
    const c = convoById(activeId); if (!c || !mid) return;
    const msg = c.messages.find(m => m.id === mid); if (!msg) return;
    const meta = { m: mid, t: String(msg.text || (msg.poll ? '🗳 ' + (msg.poll.q || 'Poll') : (msg.atts && msg.atts.length ? '📎 ' + (msg.atts[0].n || 'attachment') : ''))).slice(0, 140), w: 'Reel Estate Media' };
    pinMsg[c.id] = meta;
    renderThread();
    showToast('📌 Pinned — everyone in this chat sees it at the top');
    fetch(ENDPOINT, { method:'POST', body: JSON.stringify({
      kind:'pin', ref: c.key, project: c.label || '', dname:'',
      who: 'Reel Estate Media', from:'jag', body: JSON.stringify(meta)
    })}).catch(() => {});
  }
  function clearPin(){
    const c = convoById(activeId); if (!c) return;
    pinMsg[c.id] = null;
    renderThread();
    fetch(ENDPOINT, { method:'POST', body: JSON.stringify({
      kind:'pin', ref: c.key, project: c.label || '', dname:'',
      who: 'Reel Estate Media', from:'jag', body: JSON.stringify({ m:'' })
    })}).catch(() => {});
  }

  // ---------- 🗳 polls ----------
  function votePoll(mid, i){
    const c = convoById(activeId); if (!c || !mid) return;
    const me = 'Reel Estate Media';
    const ent = (voteMap[mid] = voteMap[mid] || {});
    const retract = ent[me] === i;
    if (retract) delete ent[me]; else ent[me] = i;
    renderThread();
    fetch(ENDPOINT, { method:'POST', body: JSON.stringify({
      kind:'vote', ref: c.key, project: c.label || '', dname:'',
      who: me, from:'jag', body: JSON.stringify({ m: mid, i: retract ? -1 : i, w: me })
    })}).catch(() => {});
  }

  const pollModal = document.createElement('div');
  pollModal.id = 'poll-modal';
  pollModal.className = 'fixed inset-0 z-[75] hidden items-center justify-center bg-black/70 p-4';
  pollModal.innerHTML = `
    <div class="w-full max-w-sm bg-[#141414] border border-[#262626] rounded-2xl shadow-[0_20px_60px_-15px_rgba(0,0,0,0.9)]">
      <div class="px-5 py-4 border-b border-[#262626] flex items-center justify-between">
        <h3 class="font-serif-display text-lg text-white">New <span class="text-[#e11d2a] italic">poll</span></h3>
        <button id="poll-close" class="text-[#7a7a7a] hover:text-white" aria-label="Close">✕</button>
      </div>
      <div class="px-5 py-4 space-y-2.5">
        <input id="poll-q" type="text" maxlength="120" placeholder="Ask the question — e.g. Which shoot day works?"
          class="w-full bg-[#1a1a1a] border border-[#2a2a2a] text-white placeholder-[#5c5c5c] text-[14px] rounded-xl px-4 py-2.5 focus:outline-none focus:border-[#e11d2a]/60">
        ${[1,2,3,4].map(i => `<input data-opt="${i}" type="text" maxlength="60" placeholder="Option ${i}${i > 2 ? ' (optional)' : ''}"
          class="w-full bg-[#1a1a1a] border border-[#2a2a2a] text-white placeholder-[#5c5c5c] text-[13px] rounded-xl px-4 py-2 focus:outline-none focus:border-[#e11d2a]/60">`).join('')}
      </div>
      <div class="px-5 pb-5">
        <button id="poll-send" class="w-full bg-[#e11d2a] hover:bg-[#c81824] text-white text-[12px] font-bold uppercase tracking-[0.14em] rounded-xl py-3 send-glow transition-all active:scale-[0.99]">Send poll</button>
        <p class="text-[11px] text-[#5c5c5c] text-center mt-2.5">One tap to vote, tap again to change — results update live for everyone.</p>
      </div>
    </div>`;
  document.body.appendChild(pollModal);
  function openPollModal(){
    pollModal.querySelector('#poll-q').value = '';
    pollModal.querySelectorAll('[data-opt]').forEach(x => x.value = '');
    pollModal.classList.remove('hidden'); pollModal.classList.add('flex');
    pollModal.querySelector('#poll-q').focus();
  }
  function closePollModal(){ pollModal.classList.add('hidden'); pollModal.classList.remove('flex'); }
  $('#poll-btn').addEventListener('click', openPollModal);
  pollModal.addEventListener('click', e => {
    if (e.target === pollModal || e.target.closest('#poll-close')){ closePollModal(); return; }
    if (e.target.closest('#poll-send')){
      const c = convoById(activeId); if (!c) return;
      const q2 = pollModal.querySelector('#poll-q').value.trim();
      const opts = [...pollModal.querySelectorAll('[data-opt]')].map(x => x.value.trim()).filter(Boolean);
      if (!q2){ showToast('Give the poll a question first.'); return; }
      if (opts.length < 2){ showToast('A poll needs at least two options.'); return; }
      closePollModal();
      const poll = { q: q2, o: opts };
      const now = new Date().toISOString();
      c.messages.push({ id:'', ts: now, side:'out', who:'You', text:'', atts: [], q: null, poll });
      c.lastTs = now;
      renderThread(); renderSidebar();
      postMsg(c, JSON.stringify({ __rc:1, t:'', poll })).then(() => setTimeout(() => loadAll().catch(()=>{}), 1500)).catch(() => {});
    }
  });

  // ---------- @ mention picker (group chats) ----------
  const mentionPop = document.createElement('div');
  mentionPop.id = 'mention-pop';
  mentionPop.className = 'fixed z-50 hidden flex-col min-w-[200px] max-w-[280px] bg-[#141414] border border-[#2a2a2a] rounded-xl shadow-[0_16px_40px_-10px_rgba(0,0,0,0.85)] overflow-hidden py-1';
  document.body.appendChild(mentionPop);
  function closeMentionPop(){ mentionPop.classList.add('hidden'); mentionPop.classList.remove('flex'); }
  function refreshMentionPop(){
    const c = convoById(activeId);
    const input = $('#chat-input');
    if (!c || c.kind !== 'group'){ closeMentionPop(); return; }
    const mm = input.value.match(/@([\w]*)$/);
    if (!mm){ closeMentionPop(); return; }
    const part = mm[1].toLowerCase();
    const cands = (c.memberNames || []).concat(['everyone']).filter(n => !part || n.toLowerCase().indexOf(part) === 0 || n.split(' ')[0].toLowerCase().indexOf(part) === 0);
    if (!cands.length){ closeMentionPop(); return; }
    mentionPop.innerHTML = cands.map(n => `<button class="mention-pick w-full text-left px-3.5 py-2 text-[13px] text-white hover:bg-[#262626] flex items-center gap-2" data-name="${esc(n)}">
      <span class="text-[#e11d2a] font-bold">@</span>${esc(n === 'everyone' ? 'everyone — nudge the whole team' : n)}</button>`).join('');
    mentionPop.classList.remove('hidden'); mentionPop.classList.add('flex');
    place(mentionPop, input);
  }
  $('#chat-input').addEventListener('input', refreshMentionPop);
  mentionPop.addEventListener('click', e => {
    const b = e.target.closest('.mention-pick');
    if (!b) return;
    const input = $('#chat-input');
    const nm = b.dataset.name === 'everyone' ? 'everyone' : b.dataset.name.split(' ')[0];
    input.value = input.value.replace(/@[\w]*$/, '@' + nm + ' ');
    closeMentionPop();
    input.focus();
  });
  document.addEventListener('click', e => {
    if (mentionPop.classList.contains('hidden')) return;
    if (e.target.closest('#mention-pop') || e.target.closest('#chat-input')) return;
    closeMentionPop();
  });

  // ---------- data loading ----------
  function loadAll(){
    return fetch(ENDPOINT + '?token=' + encodeURIComponent(TOKEN))
      .then(r => r.json())
      .then(j => {
        if (!j.ok) throw new Error(j.error || 'load failed');
        buildFromRows(j.rows || []);
        renderSidebar();
        renderThread();
      });
  }

  // ---------- gate ----------
  function unlock(){
    const tok = $('#gate-token').value.trim();
    if (!tok){ gateErr('Paste your token first — it\'s the one from your inbox script.'); return; }
    $('#gate-go').textContent = 'Opening…';
    TOKEN = tok;
    loadAll()
      .then(() => {
        try { localStorage.setItem(TOKEN_KEY, TOKEN); } catch(e){}
        $('#gate').classList.add('hidden');
        $('#app').classList.remove('hidden');
        if (activeId) markRead(activeId);
        renderSidebar();
        if (!pollTimer) pollTimer = setInterval(() => loadAll().catch(()=>{}), POLL_MS);
      })
      .catch(err => {
        $('#gate-go').textContent = 'Open chat';
        gateErr(String(err.message || err) === 'bad token'
          ? "That token isn't right — copy it from the top of your inbox script."
          : "Couldn't reach the server — check your connection and try again.");
      });
  }
  function gateErr(t){ const e = $('#gate-err'); e.textContent = t; e.classList.remove('hidden'); }
  $('#gate-go').addEventListener('click', unlock);
  $('#gate-token').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });

  $('#lock-btn').addEventListener('click', () => {
    try { localStorage.removeItem(TOKEN_KEY); } catch(e){}
    location.reload();
  });

  $('#search').addEventListener('input', e => { searchTerm = e.target.value; renderSidebar(); });

  // Auto-unlock if the token is already on this device (saved here, via
  // login.html?admin, or handed over by the Command Centre's 💬 Chat button)
  try {
    const saved = localStorage.getItem(TOKEN_KEY);
    if (saved){ $('#gate-token').value = saved; unlock(); }
  } catch(e){}
</script>
</body>
</html>
